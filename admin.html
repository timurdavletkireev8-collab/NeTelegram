<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Школьный мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <h1>⚙️ Админ-панель</h1>
            <div class="user-info">
                <span>Администратор: Учитель</span>
                <button id="logout-btn">Выйти</button>
            </div>
        </header>

        <div class="admin-content">
            <div class="admin-sidebar">
                <button class="tab-btn active" data-tab="pending">На подтверждении</button>
                <button class="tab-btn" data-tab="approved">Подтверждённые</button>
                <button class="tab-btn" data-tab="blocked">Заблокированные</button>
            </div>

            <div class="admin-main">
                <!-- Pending Users Tab -->
                <div id="pending-tab" class="tab-content active">
                    <h2>Новые регистрации (требуют подтверждения)</h2>
                    <div id="pending-list" class="users-list">
                        <!-- Users will be loaded here -->
                    </div>
                </div>

                <!-- Approved Users Tab -->
                <div id="approved-tab" class="tab-content">
                    <h2>Подтверждённые пользователи</h2>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="Поиск по ФИО или логину...">
                        <select id="class-filter">
                            <option value="">Все классы</option>
                            <option value="5А">5А</option>
                            <option value="5Б">5Б</option>
                            <option value="6А">6А</option>
                            <option value="6Б">6Б</option>
                            <option value="7А">7А</option>
                            <option value="7Б">7Б</option>
                            <option value="8А">8А</option>
                            <option value="8Б">8Б</option>
                            <option value="9А">9А</option>
                            <option value="9Б">9Б</option>
                            <option value="10А">10А</option>
                            <option value="10Б">10Б</option>
                            <option value="11А">11А</option>
                            <option value="11Б">11Б</option>
                        </select>
                    </div>
                    <div id="approved-list" class="users-list">
                        <!-- Users will be loaded here -->
                    </div>
                </div>

                <!-- Blocked Users Tab -->
                <div id="blocked-tab" class="tab-content">
                    <h2>Заблокированные пользователи</h2>
                    <div id="blocked-list" class="users-list">
                        <!-- Users will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for password reset -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <h3>Сброс пароля</h3>
            <p>Введите новый пароль для пользователя <span id="modal-username"></span>:</p>
            <input type="password" id="new-password" placeholder="Новый пароль">
            <div class="modal-actions">
                <button id="confirm-reset">Подтвердить</button>
                <button id="cancel-reset">Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
