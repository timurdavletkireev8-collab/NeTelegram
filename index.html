<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTelegram</title>
<link rel="icon" href="favicon.png">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
--bg:#000000;
--surface:#1c1c1d;
--surface-2:#2a2a2c;
--accent:#0088cc;
--text:#ffffff;
--text-muted:#8e8e93;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;}
body{background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}

.app{display:flex;flex-direction:column;height:100dvh;}

header{
position:sticky;
top:0;
background:rgba(28,28,29,.85);
backdrop-filter:blur(12px);
padding:14px;
display:flex;
align-items:center;
gap:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}
header img{width:28px;height:28px;}
header h1{font-size:17px;font-weight:600;letter-spacing:.3px;}

.tabs{display:flex;background:var(--surface);}
.tab{
flex:1;
padding:12px;
text-align:center;
font-size:13px;
letter-spacing:.5px;
color:var(--text-muted);
cursor:pointer;
transition:.25s;
}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent);}

.page{flex:1;overflow:auto;padding:12px;display:none;}
.page.active{display:block;animation:fade .25s ease;}

@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.chat-item{
background:var(--surface);
padding:16px;
border-radius:14px;
margin-bottom:10px;
font-size:14px;
letter-spacing:.3px;
cursor:pointer;
transition:.2s;
border:1px solid transparent;
}
.chat-item:hover{border-color:rgba(255,255,255,0.06);}

.diary-card{
margin-top:40px;
background:linear-gradient(145deg,#1c1c1d,#111);
padding:24px;
border-radius:20px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

button{
background:var(--accent);
border:none;
padding:12px 18px;
border-radius:12px;
color:#fff;
font-size:14px;
letter-spacing:.4px;
cursor:pointer;
transition:.2s;
}
button:active{transform:scale(.97);}

.chat-window{
position:fixed;
inset:0;
background:var(--bg);
display:none;
flex-direction:column;
z-index:20;
}
.chat-window.active{display:flex;}

.chat-header{
padding:12px;
display:flex;
align-items:center;
gap:10px;
background:rgba(28,28,29,.9);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.back{color:var(--accent);cursor:pointer;font-size:14px;}

.messages{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:14px;
font-size:13px;
line-height:1.4;
animation:pop .2s ease;
}

@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.mine{
align-self:flex-end;
background:var(--accent);
}

.other{
align-self:flex-start;
background:var(--surface);
}

.msg-name{font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:3px;}
.msg-time{font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;text-align:right;}

.input-area{
padding:10px 10px 40px;
background:rgba(28,28,29,.9);
display:flex;
gap:8px;
backdrop-filter:blur(10px);
border-top:1px solid rgba(255,255,255,0.05);
}

.input-area input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:var(--surface-2);
color:var(--text);
font-size:14px;
outline:none;
}

.modal{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:50;
}

.modal-box{
width:85%;
background:var(--surface);
padding:24px;
border-radius:18px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

.modal input{
margin-top:12px;
padding:12px;
width:100%;
border-radius:12px;
border:none;
background:var(--surface-2);
color:#fff;
}

</style>
</head>
<body>

<div class="app">
<header>
<img src="favicon.png">
<h1>NeTelegram</h1>
</header>

<div class="tabs">
<div class="tab active" onclick="switchTab(event,'chats')">ЧАТЫ</div>
<div class="tab" onclick="switchTab(event,'diary')">ДНЕВНИК</div>
</div>

<div id="chats" class="page active">
<div class="chat-item" onclick="openChat()">БЕСЕДА 8А</div>
</div>

<div id="diary" class="page">
<div class="diary-card">
<h3 style="margin-bottom:10px">Дневник</h3>
<button onclick="window.open('https://one.astrobl.ru/authorize','_blank')">ОТКРЫТЬ</button>
</div>
</div>
</div>

<div id="chatWindow" class="chat-window">
<div class="chat-header">
<div class="back" onclick="closeChat()">Назад</div>
<div style="font-size:14px">БЕСЕДА 8А</div>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msgInput" placeholder="Сообщение">
<button onclick="sendMessage()">OK</button>
</div>
</div>

<div id="modal" class="modal" style="display:none">
<div class="modal-box">
<div style="margin-bottom:10px">Введите имя</div>
<input id="nameInput">
<br><br>
<button onclick="saveName()">Продолжить</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
authDomain:"netelegram-d8c52.firebaseapp.com",
databaseURL:"https://netelegram-d8c52-default-rtdb.firebaseio.com",
projectId:"netelegram-d8c52",
storageBucket:"netelegram-d8c52.firebasestorage.app",
messagingSenderId:"214817548440",
appId:"1:214817548440:web:05e6113620f7ce7a9548ed"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let username=localStorage.getItem('name');
if(!username){document.getElementById('modal').style.display='flex';}

function saveName(){
const name=document.getElementById('nameInput').value.trim();
if(name){localStorage.setItem('name',name);username=name;document.getElementById('modal').style.display='none';}
}

function switchTab(e,tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
e.target.classList.add('active');
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(tab).classList.add('active');
}

function openChat(){document.getElementById('chatWindow').classList.add('active');}
function closeChat(){document.getElementById('chatWindow').classList.remove('active');}

function sendMessage(){
const input=document.getElementById('msgInput');
const text=input.value.trim();
if(!text)return;

const msg={name:username,text,time:Date.now()};
db.ref('messages').push(msg);
input.value='';
}

const messagesDiv=document.getElementById('messages');

db.ref('messages').on('child_added',snap=>{
const m=snap.val();

const wrap=document.createElement('div');
wrap.className='msg '+(m.name===username?'mine':'other');

wrap.innerHTML=`
<div class="msg-name">${m.name}</div>
<div>${m.text}</div>
<div class="msg-time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
`;

messagesDiv.appendChild(wrap);
messagesDiv.scrollTop=messagesDiv.scrollHeight;
});
</script>

</body>
</html>
