<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crew - Школьный класс</title>
    <style>
        /* Основные настройки для мобильных устройств */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Чтобы не было лишнего скролла страницы */
        }

        /* Шапка сайта */
        header {
            background-color: #fff;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ddd; /* Заглушка, если файла нет */
        }

        .brand-name {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .badge {
            background-color: #ffeded;
            color: #ff4d4d;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #ff4d4d;
        }

        /* Навигация (Вкладки) */
        nav {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: #ff4d4d;
            border-bottom: 3px solid #ff4d4d;
        }

        /* Контент вкладок */
        .content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            display: none;
            height: 100%;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Стиль Чата */
        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 0.95rem;
            position: relative;
        }

        .message .meta {
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: block;
        }

        /* Мои сообщения (красные, справа) */
        .message.my {
            align-self: flex-end;
            background-color: #ff4d4d;
            color: white;
            border-bottom-right-radius: 2px;
        }

        /* Чужие сообщения (серые, слева) */
        .message.others {
            align-self: flex-start;
            background-color: #e4e6eb;
            color: #050505;
            border-bottom-left-radius: 2px;
        }

        /* Поле ввода */
        .chat-input-area {
            background: #fff;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
        }

        #send-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        /* Стиль Дневника */
        #diary-tab {
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .btn-link {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="avatar.png" alt="Crew" class="avatar" onerror="this.src='https://via.placeholder.com/40'">
            <span class="brand-name">Crew</span>
        </div>
        <div class="badge">только свои</div>
    </header>

    <nav>
        <button class="tab-btn active" onclick="openTab('chat')">Чат</button>
        <button class="tab-btn" onclick="openTab('diary')">Дневник</button>
    </nav>

    <div class="content">
        
        <div id="chat-tab" class="tab-content active">
            <div id="chat-messages">
                <div class="message others">
                    <span class="meta">Админ • 08:30</span>
                    Привет всем! Добро пожаловать в Crew.
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
                <button id="send-btn">-></button>
            </div>
        </div>

        <div id="diary-tab" class="tab-content">
            <p>Для просмотра оценок и домашнего задания:</p>
            <a href="https://school.mosreg.ru" target="_blank" class="btn-link">Открыть дневник</a>
        </div>

    </div>

    <script>
        // Функция переключения вкладок
        function openTab(tabName) {
            // Скрываем все вкладки
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            
            // Снимаем активность с кнопок
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Активируем нужную вкладку
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // Добавляем активный класс кнопке (через поиск по тексту или индексу)
            event.currentTarget.classList.add('active');
        }

        // Логика чата
        const sendBtn = document.getElementById('send-btn');
        const input = document.getElementById('message-input');
        const chatMessages = document.getElementById('chat-messages');

        function sendMessage() {
            const text = input.value.trim();
            if (text !== "") {
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                                now.getMinutes().toString().padStart(2, '0');

                // Создаем элемент сообщения
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message my';
                msgDiv.innerHTML = `
                    <span class="meta">Я • ${timeStr}</span>
                    ${text}
                `;

                // Добавляем в чат
                chatMessages.appendChild(msgDiv);
                
                // Очищаем ввод
                input.value = "";
                
                // Прокрутка вниз
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // Обработка клика и Enter
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
