<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:image" content="preview.png">
    <meta property="og:title" content="NeTelegram — Классное приложение">
    <meta property="og:description" content="Чат 8А и школьный дневник">
    
    <title>NeTelegram</title>
    
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #151515;
            --surface-hover: #222222;
            --accent-color: #2a85ff;
            --accent-gradient: linear-gradient(135deg, #2a85ff 0%, #00c6ff 100%);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(21, 21, 21, 0.85);
            --glass-blur: blur(25px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ЛОГОТИП И НАЗВАНИЕ --- */
        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(42, 133, 255, 0.3);
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-bar {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-brand {
            display: none; /* Скрыто на мобилках */
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .nav-btn.active {
            color: var(--accent-color);
        }

        .nav-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        /* --- КОНТЕНТ --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- ШАПКА --- */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title {
            font-size: 19px;
            font-weight: 700;
        }

        .header-brand-mobile {
            font-size: 16px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- ВКЛАДКИ --- */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ЧАТЫ --- */
        .chat-list {
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background-color: var(--surface-color);
            border-radius: 20px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background-color: var(--surface-hover);
            border-color: var(--border-color);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            margin-right: 15px;
            box-shadow: 0 4px 15px rgba(42, 133, 255, 0.2);
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-last-msg {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .pin-badge {
            color: var(--accent-color);
            font-size: 12px;
        }

        /* --- КНОПКА ДОБАВИТЬ --- */
        .fab {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(42, 133, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .fab:active { transform: scale(0.9); }

        /* --- ДНЕВНИК --- */
        .diary-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .diary-card {
            background: var(--surface-color);
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
        }

        .btn-premium {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(42, 133, 255, 0.3);
        }

        /* --- ДЕСКТОП (ПК) --- */
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
            }

            .nav-bar {
                flex-direction: column;
                width: 300px;
                height: 100%;
                justify-content: flex-start;
                border-top: none;
                border-right: 1px solid var(--border-color);
                padding: 40px 20px;
            }

            .nav-brand {
                display: block;
            }

            .nav-btn {
                flex-direction: row;
                padding: 16px 20px;
                border-radius: 16px;
                font-size: 16px;
                gap: 15px;
                margin-bottom: 10px;
                justify-content: flex-start;
            }

            .nav-btn.active {
                background: rgba(42, 133, 255, 0.1);
            }

            .header-brand-mobile {
                display: none;
            }

            .chat-list {
                max-width: 700px;
                margin: 0 auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="nav-bar">
            <div class="nav-brand brand-wrapper">
                <img src="favicon.png" alt="Logo" class="brand-logo">
                <span>NeTelegram</span>
            </div>
            
            <button class="nav-btn active" onclick="switchTab('chats', 'Чаты', this)">
                <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z"/></svg>
                Чаты
            </button>

            <button class="nav-btn" onclick="switchTab('diary', 'Дневник', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM7 7H17V9H7V7Z"/></svg>
                Дневник
            </button>
        </nav>

        <main class="main-content">
            
            <header class="header">
                <div class="header-title" id="page-name">Чаты</div>
                
                <div class="header-brand-mobile brand-wrapper">
                    <img src="favicon.png" alt="Logo" class="brand-logo">
                    <span>NeTelegram</span>
                </div>
            </header>

            <div id="tab-chats" class="tab-content active">
                <div class="chat-list">
                    <div class="chat-item">
                        <div class="chat-avatar">8А</div>
                        <div class="chat-info">
                            <div class="chat-name">БЕСЕДА 8А <span class="pin-badge">📌</span></div>
                            <span class="chat-last-msg">Александр: Дз по физике скиньте пж</span>
                        </div>
                    </div>

                    <div style="text-align: center; color: var(--text-secondary); margin-top: 60px; font-size: 14px; opacity: 0.6;">
                        Новые чаты появятся здесь автоматически
                    </div>
                </div>
                
                <button class="fab">+</button>
            </div>

            <div id="tab-diary" class="tab-content">
                <div class="diary-container">
                    <div class="diary-card">
                        <h2>Электронный дневник</h2>
                        <p style="color: var(--text-secondary); margin-top: 12px;">Здесь будет твоё расписание и успеваемость.</p>
                        <button class="btn-premium">Войти в дневник</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        function switchTab(id, name, btn) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            // Деактивируем все кнопки
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Активируем нужную вкладку и кнопку
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
            
            // Обновляем заголовок в шапке
            document.getElementById('page-name').innerText = name;
        }
    </script>
</body>
</html>
