<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram 8A Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0088cc;
            --bg: #000000;
            --surface: #1c1c1d;
            --text: #ffffff;
            --text-gray: #8e8e93;
            --my-msg: #2b5278;
            --other-msg: #212121;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- ЭКРАН РЕГИСТРАЦИИ --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .auth-card {
            background: var(--surface); padding: 40px 25px; border-radius: 28px; width: 100%; max-width: 380px;
            text-align: center; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        .auth-input {
            width: 100%; padding: 18px; margin: 25px 0; border-radius: 15px; border: 2px solid #333;
            background: #2c2c2e; color: white; font-size: 1.1rem; outline: none; text-align: center;
        }
        .auth-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--primary); color: white; font-weight: 700; font-size: 1rem; cursor: pointer;
        }

        /* --- ШАПКА --- */
        header { 
            padding: 15px 20px; background: var(--surface); 
            display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #333; 
        }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .brand { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }

        /* --- НАВИГАЦИЯ --- */
        nav { display: flex; background: var(--surface); padding: 5px; border-bottom: 0.5px solid #333; }
        .nav-btn { 
            flex: 1; padding: 12px; border: none; background: none; 
            color: var(--text-gray); font-weight: 700; font-size: 0.9rem; transition: 0.2s;
        }
        .nav-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* --- КОНТЕНТ --- */
        .content-stack { flex: 1; position: relative; }
        .view { position: absolute; inset: 0; display: none; flex-direction: column; }
        .view.active { display: flex; }

        /* --- СПИСОК ЧАТОВ --- */
        .chat-list-item {
            display: flex; align-items: center; padding: 18px 20px; gap: 15px; 
            border-bottom: 0.5px solid #222; cursor: pointer;
        }
        .chat-list-item:active { background: #1a1a1a; }
        .avatar-circle { 
            width: 55px; height: 55px; background: linear-gradient(135deg, #0088cc, #005580); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; 
        }
        .chat-meta h4 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 6px; }
        .chat-meta p { margin: 5px 0 0; color: var(--text-gray); font-size: 0.9rem; }

        /* --- ОКНО ЧАТА (ПОЛНЫЙ ЭКРАН) --- */
        #chat-window { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: none; flex-direction: column;
        }
        .chat-win-header { 
            padding: 10px 15px; background: var(--surface); display: flex; 
            align-items: center; gap: 15px; border-bottom: 0.5px solid #333; 
        }
        #messages-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 12px;
        }
        .bubble { 
            max-width: 85%; padding: 12px 16px; border-radius: 20px; 
            font-size: 1rem; line-height: 1.4; position: relative;
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble.my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--other-msg); border-bottom-left-radius: 4px; }
        .msg-info { display: block; font-size: 0.75rem; color: #40a7e3; font-weight: 800; margin-bottom: 3px; }
        .msg-time { font-size: 0.65rem; opacity: 0.5; text-align: right; margin-top: 5px; }

        /* --- ПАНЕЛЬ ВВОДА --- */
        .input-panel { 
            background: var(--surface); padding: 12px 15px 40px; 
            display: flex; gap: 10px; align-items: center; border-top: 0.5px solid #333;
        }
        #main-input { 
            flex: 1; background: #242425; border: none; color: white; 
            padding: 14px 20px; border-radius: 25px; outline: none; font-size: 1rem;
        }
        .send-icon { color: var(--primary); background: none; border: none; font-weight: 900; font-size: 1.1rem; }

        /* --- ДНЕВНИК --- */
        .diary-page { align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .diary-card { background: var(--surface); padding: 40px 20px; border-radius: 30px; width: 100%; border: 1px solid #333; }
        .ext-btn { 
            display: inline-block; background: var(--primary); color: white; 
            text-decoration: none; padding: 18px 30px; border-radius: 18px; 
            font-weight: 800; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,136,204,0.3);
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="margin:0; font-size: 2.2rem;">NeTelegram</h1>
            <p style="color: var(--text-gray); margin-top:10px;">Мессенджер 8А класса</p>
            <input type="text" id="reg-name" class="auth-input" placeholder="Твое имя" maxlength="16">
            <button class="auth-btn" onclick="saveUser()">Войти в IT</button>
        </div>
    </div>

    <header>
        <img src="favicon.png" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=8A&background=0088cc&color=fff'">
        <span class="brand">NeTelegram</span>
    </header>

    <nav>
        <button class="nav-btn active" id="tab-c" onclick="showView('chats')">ЧАТЫ</button>
        <button class="nav-btn" id="tab-d" onclick="showView('diary')">ДНЕВНИК</button>
    </nav>

    <div class="content-stack">
        <div id="view-chats" class="view active">
            <div class="chat-list-item" onclick="openChat(true)">
                <div class="avatar-circle">👥</div>
                <div class="chat-meta">
                    <h4>БЕСЕДА 8А <span style="color:var(--primary)">📌</span></h4>
                    <p id="preview-text">Загрузка последних сообщений...</p>
                </div>
            </div>
        </div>

        <div id="view-diary" class="view diary-page">
            <div class="diary-card">
                <div style="font-size: 5rem">📕</div>
                <h2 style="margin:15px 0">Мой Дневник</h2>
                <p style="color: var(--text-gray)">Все оценки и домашнее задание на официальном портале</p>
                <a href="https://one.astrobl.ru/authorize" target="_blank" class="ext-btn">ПЕРЕЙТИ В ДНЕВНИК</a>
            </div>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-win-header">
            <button onclick="openChat(false)" style="background:none; border:none; color:var(--primary); font-size: 2rem; padding:0 10px;">←</button>
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight: 800; font-size: 1.1rem;">БЕСЕДА 8А</span>
                <span style="font-size: 0.75rem; color: var(--text-gray);">online</span>
            </div>
        </div>
        <div id="messages-box"></div>
        <div class="input-panel">
            <input type="text" id="main-input" placeholder="Сообщение..." autocomplete="off">
            <button class="send-icon" onclick="pushMessage()">ОТПР.</button>
        </div>
    </div>

    <script>
        // ТВОЙ КОНФИГ ИЗ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const msgRef = db.ref('messages_8a');

        let myName = localStorage.getItem('nt_user');

        // Проверка авторизации
        if (!myName) {
            document.getElementById('auth-screen').style.display = 'flex';
        }

        function saveUser() {
            const input = document.getElementById('reg-name').value.trim();
            if (input.length > 1) {
                localStorage.setItem('nt_user', input);
                myName = input;
                document.getElementById('auth-screen').style.display = 'none';
            }
        }

        // Навигация
        function showView(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.getElementById('tab-' + (v === 'chats' ? 'c' : 'd')).classList.add('active');
        }

        function openChat(show) {
            const win = document.getElementById('chat-window');
            win.style.display = show ? 'flex' : 'none';
            if(show) scrollToEnd();
        }

        // Работа с базой
        function pushMessage() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (text === "") return;

            msgRef.push({
                user: myName,
                text: text,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                ts: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = "";
        }

        // Слушаем новые сообщения
        msgRef.limitToLast(50).on('child_added', (snap) => {
            const data = snap.val();
            const isMy = data.user === myName;
            
            const div = document.createElement('div');
            div.className = `bubble ${isMy ? 'my' : 'other'}`;
            div.innerHTML = `
                ${!isMy ? `<span class="msg-info">${data.user}</span>` : ''}
                ${data.text}
                <div class="msg-time">${data.time}</div>
            `;
            
            const box = document.getElementById('messages-box');
            box.appendChild(div);
            scrollToEnd();
            
            // Обновляем текст в списке чатов
            document.getElementById('preview-text').innerText = `${data.user}: ${data.text}`;
        });

        function scrollToEnd() {
            const box = document.getElementById('messages-box');
            box.scrollTop = box.scrollHeight;
        }

        // Отправка по Enter
        document.getElementById('main-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') pushMessage();
        });
    </script>
</body>
</html>
