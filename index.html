<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { 
            background: #000; color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100dvh; overflow: hidden; margin: 0; 
        }
        
        .glass-header { 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-top: calc(0.8rem + var(--sat));
        }

        .glass-nav { 
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-bottom: calc(0.5rem + var(--sab));
            height: calc(70px + var(--sab));
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s; }
        .nav-item.active { color: #3b82f6; }
        .nav-item.inactive { color: #52525b; }

        .msg-bubble { max-width: 82%; padding: 10px 14px; font-size: 15px; line-height: 1.4; position: relative; cursor: pointer; }
        .my-msg { background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 18px 18px 4px 18px; }
        .other-msg { background: #1c1c1e; border-radius: 18px 18px 18px 4px; }

        .admin-glow { position: relative; padding: 2px; background: linear-gradient(45deg, #ff3b30, #ff9500); border-radius: 50%; }
        .admin-glow img { border: 2px solid #000; }
        
        .reply-line { border-left: 2px solid rgba(255,255,255,0.5); padding-left: 8px; margin-bottom: 4px; font-size: 12px; opacity: 0.8; }
        .swipe-container { transition: transform 0.15s ease-out; touch-action: pan-y; }

        .hidden { display: none !important; }
        .tap-effect:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-10 transition-all duration-500">
        <div class="w-full max-w-sm text-center">
            <img src="favicon.png" class="w-20 h-20 rounded-2xl mx-auto mb-6 shadow-2xl">
            <h1 id="auth-title" class="text-3xl font-extrabold mb-8">Регистрация</h1>
            <form id="auth-form" class="space-y-4">
                <div id="reg-fields"><input type="text" id="reg-nick" class="w-full p-4 bg-zinc-900 border border-white/5 rounded-2xl outline-none" placeholder="Имя"></div>
                <input type="tel" id="reg-phone" class="w-full p-4 bg-zinc-900 border border-white/5 rounded-2xl outline-none" placeholder="Телефон">
                <input type="password" id="reg-pass" class="w-full p-4 bg-zinc-900 border border-white/5 rounded-2xl outline-none" placeholder="Пароль">
                <button type="submit" id="auth-submit-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl tap-effect">Создать аккаунт</button>
            </form>
            <button id="toggle-auth" class="mt-6 text-zinc-500 text-sm font-medium">Уже есть аккаунт? <span class="text-blue-500">Войти</span></button>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-full bg-[#000]">
        <header class="glass-header px-6 py-4 flex justify-between items-center z-50">
            <div class="flex items-center gap-3">
                <img src="favicon.png" class="w-8 h-8 rounded-lg">
                <span class="text-xl font-extrabold tracking-tight">NeTelegram</span>
            </div>
            <div onclick="switchTab('profile')" class="tap-effect">
                <div id="admin-frame-h"><img id="h-avatar" class="w-9 h-9 rounded-full object-cover bg-zinc-800"></div>
            </div>
        </header>

        <div id="tab-chats" class="flex-1 overflow-y-auto">
            <div onclick="openChat('chat_8a')" class="px-6 py-4 flex items-center gap-4 active:bg-zinc-900 transition-all">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg font-black text-xl">8А</div>
                <div class="flex-1 border-b border-white/5 pb-4">
                    <div class="flex justify-between items-center"><span class="font-bold">Беседа 8А</span><span class="text-[10px] text-blue-500 font-bold uppercase">Pin</span></div>
                    <p class="text-xs text-zinc-500 truncate">Нажмите для общения</p>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="hidden flex-1 overflow-y-auto p-8 text-center">
            <div id="p-avatar-box" class="w-32 h-32 mx-auto rounded-[2.5rem] relative mb-4 cursor-pointer" onclick="changePhoto()">
                <img id="p-avatar" class="w-full h-full rounded-[2.5rem] object-cover bg-zinc-900 border border-white/10">
                <div class="absolute -bottom-2 -right-2 bg-blue-600 p-2 rounded-full border-4 border-black"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg></div>
            </div>
            <h3 id="p-username" class="text-2xl font-black">...</h3>
            <p id="p-userphone" class="text-zinc-500 text-sm mb-8">...</p>
            <div class="space-y-3 text-left">
                <div onclick="editData('username')" class="p-5 bg-zinc-900 rounded-2xl flex justify-between items-center tap-effect"><span>Изменить имя</span><svg class="w-5 h-5 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></div>
                <button onclick="logout()" class="w-full p-5 text-red-500 font-bold bg-red-500/10 rounded-2xl tap-effect">Выйти</button>
            </div>
        </div>

        <nav class="glass-nav flex justify-around items-center">
            <button onclick="switchTab('chats')" id="nav-c" class="nav-item active">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12c0 1.91.54 3.68 1.46 5.19L2 22l4.81-1.46C8.32 21.46 10.09 22 12 22c5.53 0 10-4.47 10-10S17.53 2 12 2z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Чаты</span>
            </button>
            <button onclick="switchTab('profile')" id="nav-p" class="nav-item inactive">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Профиль</span>
            </button>
        </nav>
    </div>

    <div id="chat-win" class="hidden fixed inset-0 z-[110] bg-black flex flex-col">
        <header class="glass-header px-4 py-3 flex items-center gap-4">
            <button onclick="closeChat()" class="p-2 text-blue-500 tap-effect"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M15 19l-7-7 7-7"/></svg></button>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xs shadow-lg">8А</div>
                <div><h3 class="font-bold text-sm">Беседа 8А</h3><p class="text-[10px] text-green-500 font-bold uppercase">В сети</p></div>
            </div>
        </header>

        <div id="pinned-msg" class="hidden bg-zinc-900/90 border-b border-white/5 p-3 flex items-center justify-between text-xs">
            <div class="truncate flex items-center gap-2"><div class="w-1 h-6 bg-blue-500 rounded-full"></div><div><p class="text-blue-500 font-bold">Закреплено</p><p id="pin-text" class="truncate opacity-60"></p></div></div>
            <button onclick="unpin()" class="p-2 opacity-50">✕</button>
        </div>

        <div id="chat-flow" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

        <div id="reply-box" class="hidden px-4 py-2 bg-zinc-900 border-t border-white/5 flex items-center justify-between">
            <div class="border-l-2 border-blue-500 pl-3"><p id="reply-name" class="text-blue-500 text-[10px] font-bold"></p><p id="reply-text" class="text-zinc-400 text-xs truncate"></p></div>
            <button onclick="cancelReply()" class="p-2">✕</button>
        </div>

        <form id="chat-form" class="p-4 bg-black border-t border-white/5 flex items-end gap-3 pb-[calc(1rem + var(--sab))]">
            <label class="p-3 bg-zinc-900 rounded-2xl text-zinc-400 tap-effect">
                <input type="file" id="f-in" class="hidden" accept="image/*">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </label>
            <input type="text" id="m-in" class="flex-1 bg-zinc-900 p-4 rounded-2xl outline-none text-sm" placeholder="Сообщение..." autocomplete="off">
            <button type="submit" class="bg-blue-600 p-4 rounded-2xl text-white shadow-lg tap-effect"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onChildAdded, onChildRemoved, onChildChanged, push, remove, update, off, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const conf = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };
        const app = initializeApp(conf);
        const db = getDatabase(app);
        
        let user = JSON.parse(localStorage.getItem('user_data'));
        let isLoginMode = false;
        let replyingTo = null;

        if (user) startApp();

        // ФИКС КНОПКИ ВОЙТИ
        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-title').innerText = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('toggle-auth').innerHTML = isLoginMode ? 'Нет аккаунта? <span class="text-blue-500">Регистрация</span>' : 'Уже есть аккаунт? <span class="text-blue-500">Войти</span>';
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const ph = document.getElementById('reg-phone').value.trim();
            const ps = document.getElementById('reg-pass').value.trim();
            const ni = document.getElementById('reg-nick').value.trim();
            if (!ph || !ps) return;

            if (isLoginMode) {
                const s = await get(child(ref(db), `users/${ph}`));
                if (s.exists() && s.val().password === ps) login(ph, s.val());
                else Swal.fire('Ошибка', 'Неверный телефон или пароль', 'error');
            } else {
                if (!ni) return;
                const data = { username: ni, password: ps, photo: "", role: (ph === "+79225941382" ? "admin" : "user") };
                await set(ref(db, `users/${ph}`), data);
                login(ph, data);
            }
        };

        function login(ph, d) {
            localStorage.setItem('user_data', JSON.stringify({ ...d, phone: ph }));
            location.reload();
        }

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.querySelectorAll('#h-avatar, #p-avatar').forEach(img => img.src = user.photo || 'favicon.png');
            document.getElementById('p-username').innerText = user.username;
            document.getElementById('p-userphone').innerText = user.phone;
            if (user.role === 'admin') {
                document.getElementById('p-avatar-box').classList.add('admin-glow');
                document.getElementById('admin-frame-h').classList.add('admin-glow');
            }
        }

        window.switchTab = (t) => {
            document.getElementById('tab-chats').classList.toggle('hidden', t !== 'chats');
            document.getElementById('tab-profile').classList.toggle('hidden', t !== 'profile');
            document.getElementById('nav-c').className = t === 'chats' ? 'nav-item active' : 'nav-item inactive';
            document.getElementById('nav-p').className = t === 'profile' ? 'nav-item active' : 'nav-item inactive';
        };

        let currentChatRef = null;
        window.openChat = (id) => {
            document.getElementById('chat-win').classList.remove('hidden');
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = "";
            onValue(ref(db, `pinned/chat_8a`), (s) => {
                const p = s.val();
                document.getElementById('pinned-msg').classList.toggle('hidden', !p);
                if (p) document.getElementById('pin-text').innerText = p.text;
            });
            currentChatRef = ref(db, `messages/${id}`);
            onChildAdded(currentChatRef, (s) => renderMessage(s.key, s.val()));
            onChildRemoved(currentChatRef, (s) => document.getElementById(s.key)?.remove());
            onChildChanged(currentChatRef, (s) => {
                const el = document.getElementById(s.key);
                if (el) el.querySelector('.msg-text').innerText = s.val().text;
            });
        };

        function renderMessage(id, m) {
            if (document.getElementById(id)) return;
            const isMe = m.phone === user.phone;
            const html = `
                <div id="${id}" class="swipe-container flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <div class="msg-bubble ${isMe ? 'my-msg' : 'other-msg'}" onclick="showMsgMenu('${id}', '${m.text}', ${isMe}, '${m.name}')">
                        ${m.reply ? `<div class="reply-line"><b>${m.reply.name}</b><br>${m.reply.text}</div>` : ''}
                        ${!isMe ? `<span class="text-[10px] font-bold text-blue-400 block mb-1 uppercase">${m.name}</span>` : ''}
                        ${m.file ? `<img src="${m.file}" class="rounded-lg mb-2 max-h-60 object-cover">` : ''}
                        <span class="msg-text">${m.text}</span>
                        <span class="text-[9px] opacity-40 block text-right mt-1">${m.time}</span>
                    </div>
                </div>
            `;
            const flow = document.getElementById('chat-flow');
            flow.insertAdjacentHTML('beforeend', html);
            flow.scrollTop = flow.scrollHeight;
            setupSwipe(id, m.name, m.text);
        }

        function setupSwipe(id, name, text) {
            const el = document.getElementById(id);
            let startX = 0;
            el.addEventListener('touchstart', (e) => startX = e.touches[0].clientX, {passive: true});
            el.addEventListener('touchmove', (e) => {
                let diff = e.touches[0].clientX - startX;
                if (diff < -50) el.style.transform = `translateX(-60px)`;
                else if (diff > 0) el.style.transform = `translateX(0)`;
            }, {passive: true});
            el.addEventListener('touchend', () => {
                if (el.style.transform === 'translateX(-60px)') {
                    replyingTo = { name, text };
                    document.getElementById('reply-box').classList.remove('hidden');
                    document.getElementById('reply-name').innerText = name;
                    document.getElementById('reply-text').innerText = text;
                    document.getElementById('m-in').focus();
                }
                setTimeout(() => el.style.transform = `translateX(0)`, 200);
            });
        }

        window.showMsgMenu = async (id, text, isMe, name) => {
            const canEdit = isMe || user.role === 'admin';
            await Swal.fire({
                background: '#18181b', color: '#fff', showConfirmButton: false,
                html: `
                    <div class="flex flex-col text-left font-bold gap-2">
                        <button onclick="Swal.clickConfirm(); copyText('${text}')" class="p-4 bg-white/5 rounded-xl">Копировать</button>
                        ${canEdit ? `<button onclick="Swal.clickConfirm(); editMsg('${id}','${text}')" class="p-4 bg-white/5 rounded-xl text-blue-400">Изменить</button>` : ''}
                        ${canEdit ? `<button onclick="Swal.clickConfirm(); delMsg('${id}')" class="p-4 bg-white/5 rounded-xl text-red-500">Удалить</button>` : ''}
                        ${isMe ? `<button onclick="Swal.clickConfirm(); pinMsg('${text}')" class="p-4 bg-white/5 rounded-xl text-yellow-500">Закрепить</button>` : ''}
                    </div>
                `
            });
        };

        window.copyText = (t) => navigator.clipboard.writeText(t);
        window.delMsg = (id) => remove(ref(db, `messages/chat_8a/${id}`));
        window.editMsg = async (id, old) => {
            const { value: nt } = await Swal.fire({ input: 'text', inputValue: old, background:'#18181b', color:'#fff' });
            if (nt) update(ref(db, `messages/chat_8a/${id}`), { text: nt });
        };
        window.pinMsg = (t) => set(ref(db, `pinned/chat_8a`), { text: t });
        window.unpin = () => remove(ref(db, `pinned/chat_8a`));
        window.cancelReply = () => { replyingTo = null; document.getElementById('reply-box').classList.add('hidden'); };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('m-in');
            const fileInput = document.getElementById('f-in');
            const file = fileInput.files[0];
            if (!input.value.trim() && !file) return;

            const msgData = {
                phone: user.phone, name: user.username, text: input.value,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            };
            if (replyingTo) msgData.reply = replyingTo;

            const send = (f = "") => {
                if (f) msgData.file = f;
                push(ref(db, `messages/chat_8a`), msgData);
                input.value = ""; cancelReply();
                fileInput.value = "";
            };

            if (file) {
                const r = new FileReader();
                r.onload = () => send(r.result);
                r.readAsDataURL(file);
            } else send();
        };

        window.changePhoto = () => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const f = e.target.files[0];
                const r = new FileReader();
                r.onload = async () => {
                    await update(ref(db, `users/${user.phone}`), { photo: r.result });
                    user.photo = r.result;
                    localStorage.setItem('user_data', JSON.stringify(user));
                    location.reload();
                };
                r.readAsDataURL(f);
            };
            input.click();
        };

        window.closeChat = () => document.getElementById('chat-win').classList.add('hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
        window.editData = async (f) => {
            const { value: v } = await Swal.fire({ title: `Новое имя`, input: 'text', background: '#18181b', color: '#fff' });
            if (v) {
                await update(ref(db, `users/${user.phone}`), { [f]: v });
                user[f] = v; localStorage.setItem('user_data', JSON.stringify(user));
                location.reload();
            }
        };
    </script>
</body>
</html>
