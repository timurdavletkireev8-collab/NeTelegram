<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>NeTelegram</title>

    <style>
        :root {
            --bg: #000;
            --surface: #121212;
            --accent: #007AFF;
            --accent-gradient: linear-gradient(180deg, #007AFF 0%, #0051FF 100%);
            --text: #fff;
            --text-secondary: #8E8E93;
            --glass: rgba(18, 18, 18, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- ЭКРАН РЕГИСТРАЦИИ --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .auth-card {
            width: 100%; max-width: 350px; text-align: center;
        }
        .auth-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,122,255,0.4); }
        .auth-input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            padding: 16px; border-radius: 15px; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none;
        }
        .auth-btn {
            width: 100%; background: var(--accent-gradient); border: none; padding: 16px;
            border-radius: 15px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer;
        }

        /* --- ГЛАВНЫЙ ИНТЕРФЕЙС --- */
        header {
            padding: 55px 20px 15px; background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 12px;
        }
        header img { width: 32px; height: 32px; border-radius: 8px; }
        header span { font-weight: 800; font-size: 20px; }

        main { flex: 1; overflow-y: auto; padding: 10px 16px 120px; height: calc(100vh - 150px); }
        .section-title { font-size: 32px; font-weight: 700; margin: 15px 0; }

        .chat-card {
            background: var(--surface); padding: 15px; border-radius: 22px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 0.5px solid var(--border);
        }
        .avatar { width: 55px; height: 55px; border-radius: 18px; background: var(--accent-gradient); 
                  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; }
        
        /* --- ОКНО ЧАТА (ОТКРЫТОЕ) --- */
        #chat-window {
            position: fixed; inset: 0; background: var(--bg); z-index: 500;
            display: none; flex-direction: column;
        }
        .chat-header {
            padding: 50px 20px 15px; background: var(--surface); display: flex; align-items: center; gap: 15px;
        }
        .back-btn { font-size: 24px; color: var(--accent); cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .msg-remote { background: var(--surface); align-self: flex-start; }
        .msg-own { background: var(--accent); align-self: flex-end; }
        
        .input-area {
            padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
            background: var(--glass); backdrop-filter: blur(20px); display: flex; gap: 10px;
        }

        /* --- ТАББАР --- */
        .tabbar {
            position: fixed; bottom: 0; width: 100%; background: var(--glass);
            backdrop-filter: blur(25px); border-top: 0.5px solid var(--border);
            display: flex; padding: 10px 0 30px; justify-content: space-around;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); font-size: 11px; text-decoration: none; }
        .tab-item.active { color: var(--accent); }
        .tab-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <img src="favicon.png" class="auth-logo">
            <h2 style="margin-bottom: 10px;">Добро пожаловать</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Введите данные для входа в NeTelegram</p>
            <input type="text" id="reg-nick" class="auth-input" placeholder="Никнейм">
            <input type="tel" id="reg-phone" class="auth-input" placeholder="Номер телефона">
            <input type="password" id="reg-pass" class="auth-input" placeholder="Пароль">
            <button class="auth-btn" onclick="registerUser()">Создать аккаунт</button>
        </div>
    </div>

    <header>
        <img src="favicon.png">
        <span>NeTelegram</span>
    </header>

    <main id="main-list">
        <h1 class="section-title">Чаты</h1>
        <div class="chat-card" onclick="openChat('8А')">
            <div class="avatar">8А</div>
            <div style="flex:1">
                <div style="display:flex; justify-content:space-between">
                    <b>БЕСЕДА 8А 📌</b>
                    <span style="color:var(--text-secondary); font-size:12px">14:51</span>
                </div>
                <p style="color:var(--text-secondary); font-size:14px">Александр: Дз по физике...</p>
            </div>
        </div>
    </main>

    <div id="chat-window">
        <div class="chat-header">
            <span class="back-btn" onclick="closeChat()">❮</span>
            <div class="avatar" style="width:40px; height:40px; font-size:14px" id="chat-icon">8А</div>
            <b id="chat-name">Беседа 8А</b>
        </div>
        <div class="messages-area" id="msg-container">
            <div class="msg-bubble msg-remote">Привет всем! Это NeTelegram 🚀</div>
        </div>
        <div class="input-area">
            <input type="text" id="msg-input" class="auth-input" style="margin-bottom:0" placeholder="Сообщение...">
            <button class="auth-btn" style="width:60px" onclick="sendMsg()">></button>
        </div>
    </div>

    <nav class="tabbar">
        <div class="tab-item active"><svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z"/></svg>Чаты</div>
        <div class="tab-item"><svg viewBox="0 0 24 24"><path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM12 11H7V13H12V11Z"/></svg>Дневник</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ЛОГИКА РЕГИСТРАЦИИ ---
        window.registerUser = async () => {
            const nick = document.getElementById('reg-nick').value;
            const phone = document.getElementById('reg-phone').value;
            if(!nick || !phone) return alert("Заполни поля!");

            localStorage.setItem('userNick', nick);
            document.getElementById('auth-screen').style.display = 'none';
            
            // Сохраняем юзера в базу
            await setDoc(doc(db, "users", phone), { nickname: nick, phone: phone });
        };

        // Проверка входа
        if(localStorage.getItem('userNick')) {
            document.getElementById('auth-screen').style.display = 'none';
        }

        // --- ЛОГИКА ЧАТА ---
        window.openChat = (name) => {
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-name').innerText = name;
            loadMessages();
        };

        window.closeChat = () => {
            document.getElementById('chat-window').style.display = 'none';
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value) return;

            await addDoc(collection(db, "messages"), {
                text: input.value,
                user: localStorage.getItem('userNick'),
                time: Date.now()
            });
            input.value = "";
        };

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('msg-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isOwn = data.user === localStorage.getItem('userNick');
                    container.innerHTML += `
                        <div class="msg-bubble ${isOwn ? 'msg-own' : 'msg-remote'}">
                            <small style="display:block; font-size:10px; opacity:0.6">${data.user}</small>
                            ${data.text}
                        </div>
                    `;
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
