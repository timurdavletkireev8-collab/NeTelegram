<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeTelegram</title>
    <style>
        /* --- ПРЕМИАЛЬНАЯ ТЁМНАЯ ТЕМА (ПЕРЕМЕННЫЕ) --- */
        :root {
            --bg-color: #000000;
            --surface-color: #151515;
            --surface-hover: #222222;
            --accent-color: #2a85ff;
            --accent-gradient: linear-gradient(135deg, #2a85ff 0%, #00c6ff 100%);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(21, 21, 21, 0.7);
            --glass-blur: blur(20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР (АДАПТИВНОСТЬ) --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column; /* По умолчанию для мобильных */
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-bar {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-brand {
            display: none; /* Скрыто на мобильных */
            font-size: 22px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            width: 100%;
            padding: 10px 0;
        }

        .nav-btn:hover {
            color: #b0b0b0;
        }

        .nav-btn.active {
            color: var(--accent-color);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: transform 0.2s ease;
        }

        .nav-btn.active svg {
            transform: scale(1.1);
        }

        /* --- ОСНОВНАЯ ОБЛАСТЬ --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- ШАПКА --- */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-brand {
            font-size: 16px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- ВКЛАДКИ --- */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- СПИСОК ЧАТОВ --- */
        .chat-list {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background-color: var(--surface-color);
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s;
        }

        .chat-item:active {
            transform: scale(0.98);
        }

        .chat-item:hover {
            background-color: var(--surface-hover);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(42, 133, 255, 0.3);
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-last-message {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .pin-icon {
            color: var(--text-secondary);
            font-size: 14px;
            transform: rotate(45deg);
        }

        /* Плавающая кнопка создания чата */
        .fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 300;
            box-shadow: 0 8px 20px rgba(42, 133, 255, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .fab:hover {
            transform: scale(1.05);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* --- ДНЕВНИК --- */
        .diary-wrapper {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .diary-card {
            background-color: var(--surface-color);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .diary-card h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .diary-card p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.5;
        }

        .btn-premium {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(42, 133, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 133, 255, 0.4);
        }

        .btn-premium:active {
            transform: translateY(0);
        }

        /* =========================================================
           АДАПТИВНОСТЬ ДЛЯ ПК (Десктопная версия)
           ========================================================= */
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row; /* Навигация слева, контент справа */
                max-width: 1200px;
                margin: 0 auto;
                border-left: 1px solid var(--border-color);
                border-right: 1px solid var(--border-color);
            }

            .nav-bar {
                flex-direction: column;
                justify-content: flex-start;
                width: 250px;
                border-top: none;
                border-right: 1px solid var(--border-color);
                padding: 30px 10px;
                background-color: transparent;
            }

            .nav-brand {
                display: block; /* Показываем логотип в боковом меню */
            }

            .nav-btn {
                flex-direction: row;
                padding: 15px 20px;
                border-radius: 12px;
                font-size: 16px;
                justify-content: flex-start;
                gap: 15px;
            }

            .nav-btn:hover {
                background-color: var(--surface-hover);
            }

            .nav-btn.active {
                background-color: rgba(42, 133, 255, 0.1);
            }

            .header-brand {
                display: none; /* Скрываем логотип в шапке, так как он есть слева */
            }

            .main-content {
                background-color: var(--bg-color);
            }

            .chat-list, .diary-wrapper {
                padding: 20px 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="nav-bar">
            <div class="nav-brand">NeTelegram</div>
            <button class="nav-btn active" onclick="openTab('chats', 'Чаты', this)">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H5.17L4 17.17V4H20V16Z"/>
                    <path d="M7 9H17V11H7V9Z"/>
                    <path d="M7 13H14V15H7V13Z"/>
                </svg>
                Чаты
            </button>
            <button class="nav-btn" onclick="openTab('diary', 'Дневник', this)">
                <svg viewBox="0 0 24 24">
                    <path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.11 21 21 20.1 21 19V5C21 3.9 20.11 3 19 3ZM19 19H5V5H19V19Z"/>
                    <path d="M7 7H17V9H7V7Z"/>
                    <path d="M7 11H17V13H7V11Z"/>
                    <path d="M7 15H14V17H7V15Z"/>
                </svg>
                Дневник
            </button>
        </nav>

        <main class="main-content">
            
            <header class="header">
                <div class="header-title" id="page-title">Чаты</div>
                <div class="header-brand">NeTelegram</div>
            </header>

            <div id="tab-chats" class="tab-content active">
                <div class="chat-list">
                    
                    <div class="chat-item">
                        <div class="chat-avatar">8А</div>
                        <div class="chat-info">
                            <div class="chat-name">
                                БЕСЕДА 8А
                            </div>
                            <div class="chat-last-message">Александр: Дз по физике скиньте пж</div>
                        </div>
                        <div class="chat-meta">
                            <div class="pin-icon">📌</div>
                        </div>
                    </div>

                    <div style="text-align: center; color: var(--text-secondary); margin-top: 40px; font-size: 14px;">
                        Здесь будут появляться новые доступные чаты
                    </div>

                </div>
                
                <button class="fab" title="Создать чат">+</button>
            </div>

            <div id="tab-diary" class="tab-content">
                <div class="diary-wrapper">
                    <div class="diary-card">
                        <h3>Электронный дневник</h3>
                        <p>Здесь будет отображаться ваше актуальное расписание занятий, домашние задания и оценки.</p>
                        <button class="btn-premium">Открыть дневник</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        function openTab(tabId, titleText, btnElement) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Убираем активный класс у кнопок
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Показываем выбранную вкладку
            document.getElementById('tab-' + tabId).classList.add('active');

            // Делаем кнопку активной
            btnElement.classList.add('active');

            // Меняем заголовок в шапке
            document.getElementById('page-title').innerText = titleText;
        }
    </script>
</body>
</html>
