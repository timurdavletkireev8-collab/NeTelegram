<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTelegram V2</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
--bg:#000;
--glass:rgba(28,28,29,.75);
--border:rgba(255,255,255,.06);
--accent:#0088cc;
--text:#fff;
--muted:#8e8e93;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
color:#fff;
font-family:-apple-system,Segoe UI,Roboto;
height:100dvh;
overflow:hidden;
}

/* layout */
.app{display:flex;flex-direction:column;height:100dvh}

/* header */
.header{
position:sticky;
top:0;
z-index:10;
background:var(--glass);
backdrop-filter:blur(16px);
padding:14px;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
}

/* tabs */
.tabs{display:flex;background:var(--glass)}
.tab{
flex:1;text-align:center;padding:12px;font-size:13px;color:var(--muted);cursor:pointer
}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}

/* pages */
.page{flex:1;overflow:auto;padding:12px;display:none}
.page.active{display:block}

/* chat list */
.chat{
padding:14px;
border-radius:14px;
background:#111;
margin-bottom:10px;
border:1px solid var(--border);
cursor:pointer;
}
.chat-title{font-size:14px}
.chat-last{font-size:12px;color:var(--muted);margin-top:4px}
.chat-status{font-size:11px;color:var(--accent);margin-top:2px}

/* chat window */
.chat-win{
position:fixed;inset:0;
background:#000;
display:none;
flex-direction:column;
}
.chat-win.active{display:flex}

/* messages */
.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:14px;
font-size:13px;
}

.mine{align-self:flex-end;background:var(--accent)}
.other{align-self:flex-start;background:#1c1c1d}

.time{font-size:10px;color:#aaa;margin-top:4px;text-align:right}

/* input */
.input{
display:flex;
gap:8px;
padding:10px 10px 50px;
background:var(--glass);
backdrop-filter:blur(12px);
border-top:1px solid var(--border);
}
.input input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1c1c1d;
color:#fff;
}
.input button{
background:var(--accent);
border:none;
padding:12px;
border-radius:10px;
color:#fff;
}

/* typing */
.typing{
font-size:12px;
color:var(--muted);
padding:5px 10px;
}

/* modal */
.modal{
position:fixed;inset:0;background:#000;
display:flex;align-items:center;justify-content:center;
}
.box{
background:#1c1c1d;
padding:20px;
border-radius:14px;
width:80%;
text-align:center;
}
</style>
</head>

<body>

<div class="app">

<div class="header">NeTelegram</div>

<div class="tabs">
<div class="tab active" onclick="tab(event,'chats')">ЧАТЫ</div>
<div class="tab" onclick="tab(event,'diary')">ДНЕВНИК</div>
</div>

<div id="chats" class="page active">
<div class="chat" onclick="openChat('8a')">
<div class="chat-title">БЕСЕДА 8А</div>
<div id="last_8a" class="chat-last"></div>
<div id="status_8a" class="chat-status"></div>
</div>
</div>

<div id="diary" class="page">
<button onclick="window.open('https://one.astrobl.ru/authorize')">ОТКРЫТЬ</button>
</div>

</div>

<!-- CHAT -->
<div id="chatWin" class="chat-win">
<div class="header">
<div onclick="closeChat()" style="cursor:pointer;color:#0088cc">Назад</div>
</div>

<div id="msgs" class="messages"></div>
<div id="typing" class="typing"></div>

<div class="input">
<input id="text">
<button onclick="send()">OK</button>
</div>
</div>

<!-- modal -->
<div id="modal" class="modal" style="display:none">
<div class="box">
Введите имя
<input id="name">
<br><br>
<button onclick="save()">Продолжить</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
authDomain:"netelegram-d8c52.firebaseapp.com",
databaseURL:"https://netelegram-d8c52-default-rtdb.firebaseio.com",
projectId:"netelegram-d8c52"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem('name');
let uid=localStorage.getItem('uid');

if(!uid){
uid='u'+Math.random().toString(36).slice(2);
localStorage.setItem('uid',uid);
}

if(!user){
document.getElementById('modal').style.display='flex';
}

function save(){
let n=document.getElementById('name').value.trim();
if(n){
user=n;
localStorage.setItem('name',n);
document.getElementById('modal').style.display='none';
initPresence();
}
}

/* presence */
function initPresence(){
let ref=db.ref('presence/'+uid);
ref.set({name:user,online:true});
ref.onDisconnect().set({name:user,online:false});
}
if(user) initPresence();

/* tabs */
function tab(e,id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
e.target.classList.add('active');
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* chat */
let currentChat='8a';

function openChat(id){
currentChat=id;
document.getElementById('chatWin').classList.add('active');
loadMessages();
}

function closeChat(){
document.getElementById('chatWin').classList.remove('active');
}

/* send */
function send(){
let txt=document.getElementById('text').value.trim();
if(!txt)return;

db.ref('chats/'+currentChat+'/messages').push({
uid,
name:user,
text:txt,
time:firebase.database.ServerValue.TIMESTAMP
});

document.getElementById('text').value='';
}

/* typing */
let typingRef=db.ref('typing/'+currentChat+'/'+uid);

document.getElementById('text').addEventListener('input',()=>{
typingRef.set(true);
setTimeout(()=>typingRef.set(false),1500);
});

db.ref('typing/'+currentChat).on('value',snap=>{
let data=snap.val()||{};
let users=Object.keys(data).filter(id=>data[id] && id!==uid);
document.getElementById('typing').innerText = users.length ? 'печатает...' : '';
});

/* messages */
function loadMessages(){
const msgs=document.getElementById('msgs');
msgs.innerHTML='';

db.ref('chats/'+currentChat+'/messages').limitToLast(100)
.on('child_added',snap=>{
let m=snap.val();

let el=document.createElement('div');
el.className='msg '+(m.uid===uid?'mine':'other');

el.innerHTML=`
<div>${m.text}</div>
<div class="time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
`;

msgs.appendChild(el);
scroll();
updateLast(m);
});
}

/* last message */
function updateLast(m){
document.getElementById('last_8a').innerText = m.name+': '+m.text;
}

/* scroll */
function scroll(){
setTimeout(()=>{
let el=document.getElementById('msgs');
el.scrollTop=el.scrollHeight;
},100);
}

/* presence UI */
db.ref('presence').on('value',snap=>{
let users=snap.val()||{};
let online=Object.values(users).filter(u=>u.online).length;
document.getElementById('status_8a').innerText = 'онлайн: '+online;
});
</script>

</body>
</html>
