<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram — Орион</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        :root { 
            --sat: env(safe-area-inset-top); 
            --sab: env(safe-area-inset-bottom);
            --bg-dark: #050505;
            --surface: #0c0c0c;
            --surface-elevated: #121212;
            --accent: #2f6ef0;
            --accent-glow: rgba(47, 110, 240, 0.2);
            --border-dim: #1a1a1a;
        }
        body { 
            background: var(--bg-dark); 
            color: #eef2ff; 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            overflow: hidden; 
            margin: 0; 
        }
        
        /* glass-morphism 3.0 */
        .glass-header {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(28px) saturate(200%);
            border-bottom: 0.5px solid rgba(255,255,255,0.06);
            padding-top: calc(1rem + var(--sat));
        }
        .glass-nav {
            background: rgba(8, 8, 8, 0.92);
            backdrop-filter: blur(24px);
            border-top: 0.5px solid rgba(255,255,255,0.05);
            padding-bottom: calc(0.7rem + var(--sab));
        }
        
        /* message bubbles — premium */
        .msg-bubble { 
            max-width: 82%; 
            padding: 12px 18px; 
            font-size: 15px;
            line-height: 1.45;
            letter-spacing: -0.2px;
            transition: all 0.12s ease;
        }
        .my-msg { 
            background: var(--accent); 
            border-radius: 26px 26px 6px 26px;
            box-shadow: 0 6px 14px rgba(47, 110, 240, 0.2);
        }
        .other-msg { 
            background: var(--surface-elevated); 
            border-radius: 26px 26px 26px 6px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        
        /* admin glow ultra */
        .admin-glow { 
            position: relative;
            background: radial-gradient(circle at 30% 20%, #ffb347, #ff5e00);
            border-radius: 50%;
            padding: 2px;
        }
        .admin-badge-mini {
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            background: #ff4d1e; font-size: 7px; font-weight: 800;
            padding: 2px 8px; border-radius: 40px; color: white;
            white-space: nowrap; letter-spacing: 0.3px;
        }
        
        /* custom scroll */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 20px;
        }
        
        input, textarea {
            background: transparent;
        }
        .tap-effect:active { transform: scale(0.97); opacity: 0.85; transition: 0.05s; }
        .hidden { display: none !important; }
        
        .animate-float {
            animation: floatIn 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes floatIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* card style for diary */
        .diary-card {
            background: var(--surface);
            border-radius: 32px;
            border: 0.5px solid var(--border-dim);
            transition: all 0.2s;
        }
        .nav-icon {
            transition: all 0.2s ease;
        }
        .active-tab {
            color: var(--accent);
            filter: drop-shadow(0 0 6px rgba(47,110,240,0.4));
        }
        .pinned-message-bar {
            background: rgba(18,18,24,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--accent);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 500;
        }
        .reply-preview {
            background: rgba(47,110,240,0.12);
            border-left: 3px solid var(--accent);
            border-radius: 18px;
            padding: 8px 12px;
        }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6 transition-all duration-500">
        <div class="w-full max-w-sm text-center">
            <div class="relative inline-block mb-5">
                <div class="w-28 h-28 rounded-[32px] bg-gradient-to-br from-[#2f6ef0] to-[#0e2a5e] flex items-center justify-center shadow-2xl">
                    <span class="text-5xl font-black tracking-tighter text-white">NT</span>
                </div>
            </div>
            <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">NeTelegram</h1>
            <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-[0.3em] mt-2">ORION EDITION</p>
            
            <form id="auth-form" class="mt-12 space-y-4">
                <div id="reg-fields" class="space-y-4">
                    <input type="text" id="reg-nick" class="w-full p-4 bg-[#0c0c0c] border border-[#1f1f1f] rounded-2xl outline-none focus:border-[#2f6ef0] transition text-white placeholder:text-zinc-600" placeholder="Твое имя">
                </div>
                <input type="tel" id="reg-phone" class="w-full p-4 bg-[#0c0c0c] border border-[#1f1f1f] rounded-2xl outline-none focus:border-[#2f6ef0] transition text-white placeholder:text-zinc-600" placeholder="Номер телефона">
                <input type="password" id="reg-pass" class="w-full p-4 bg-[#0c0c0c] border border-[#1f1f1f] rounded-2xl outline-none focus:border-[#2f6ef0] transition text-white placeholder:text-zinc-600" placeholder="Пароль">
                <button type="submit" class="w-full bg-white text-black font-extrabold py-4 rounded-2xl shadow-xl tap-effect mt-2">Продолжить</button>
            </form>
            <button id="toggle-auth" class="mt-6 text-zinc-400 text-sm font-medium">Уже есть аккаунт? <span class="text-[#2f6ef0]">Войти</span></button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden flex-col h-full bg-[#050505]">
        <header class="glass-header px-5 py-4 flex justify-between items-center z-50">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-[#2f6ef0] to-[#1a4bc0] flex items-center justify-center">
                    <span class="font-black text-sm">NT</span>
                </div>
                <h1 class="text-xl font-black tracking-tight">NeTelegram</h1>
            </div>
            <div id="h-avatar-wrap" class="relative tap-effect cursor-pointer" onclick="switchTab('profile')">
                <div id="admin-frame-h">
                    <img id="h-avatar" class="w-9 h-9 rounded-full object-cover bg-zinc-800 border border-white/10">
                </div>
            </div>
        </header>

        <!-- CHATS TAB -->
        <div id="tab-chats" class="flex-1 overflow-y-auto px-4 pt-2 pb-4">
            <div onclick="openChat('chat_8a')" class="mb-2 bg-[#0c0c0c] rounded-3xl p-4 flex items-center gap-4 active:bg-white/5 transition-all tap-effect border border-white/5">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2f6ef0] to-[#0f3b9e] flex items-center justify-center shadow-lg">
                    <span class="font-black text-xl text-white">8А</span>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-[17px]">Беседа 8А</span>
                        <span class="text-[9px] text-[#2f6ef0] font-black uppercase bg-[#2f6ef0]/10 px-2 py-0.5 rounded-full">PIN</span>
                    </div>
                    <p class="text-[13px] text-zinc-400 font-medium truncate">#классныйчат</p>
                </div>
            </div>
            <!-- заглушка для атмосферы -->
            <div class="mt-8 text-center opacity-30 text-xs text-zinc-600">— только для избранных —</div>
        </div>

        <!-- DIARY TAB (дневник) -->
        <div id="tab-diary" class="hidden flex-1 overflow-y-auto p-5 space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-black tracking-tight">Дневник</h2>
                <button onclick="addDiaryEntry()" class="bg-[#2f6ef0] px-4 py-2 rounded-full text-xs font-bold tap-effect">+ запись</button>
            </div>
            <div id="diary-list" class="space-y-4">
                <!-- записи будут динамически подгружаться из firebase -->
                <div class="diary-card p-5 text-center text-zinc-500 text-sm">Нет записей. Напиши первую ✦</div>
            </div>
        </div>

        <!-- PROFILE TAB -->
        <div id="tab-profile" class="hidden flex-1 overflow-y-auto p-6 space-y-8">
            <div class="flex flex-col items-center">
                <div id="p-avatar-box" class="w-28 h-28 rounded-[2.5rem] relative mb-5 cursor-pointer tap-effect" onclick="changeProfilePhoto()">
                    <div id="p-admin-tag" class="admin-badge-mini hidden">ADMIN</div>
                    <img id="p-avatar" class="w-full h-full rounded-[2.5rem] object-cover bg-zinc-900 border-2 border-white/10">
                </div>
                <h3 id="p-username" class="text-2xl font-black">...</h3>
                <p id="p-userphone" class="text-zinc-500 text-sm font-medium mt-1">...</p>
                <button onclick="changeProfilePhoto()" class="mt-3 text-[#2f6ef0] text-xs font-bold bg-white/5 px-5 py-2 rounded-full">обновить фото</button>
            </div>
            <div class="space-y-3">
                <div onclick="editData('username')" class="p-5 bg-[#0c0c0c] rounded-2xl flex justify-between items-center tap-effect cursor-pointer border border-white/5">
                    <span class="font-semibold">Изменить имя</span>
                    <svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="editData('password')" class="p-5 bg-[#0c0c0c] rounded-2xl flex justify-between items-center tap-effect cursor-pointer border border-white/5">
                    <span class="font-semibold">Сменить пароль</span>
                    <svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <button onclick="logout()" class="w-full p-5 text-red-400 font-bold bg-red-500/10 rounded-2xl tap-effect border border-red-500/20">Выйти из аккаунта</button>
            </div>
        </div>

        <!-- BOTTOM NAVIGATION (Чаты, Дневник, Профиль) -->
        <nav class="glass-nav flex justify-around items-center px-8 py-2.5">
            <button onclick="switchTab('chats')" id="nav-c" class="nav-icon p-2 text-[#2f6ef0] tap-effect">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h16v12H5.17L4 17.17V4m0-2c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2H4z"/><path d="M8 9h8v2H8zm0 4h5v2H8z"/></svg>
            </button>
            <button onclick="switchTab('diary')" id="nav-d" class="nav-icon p-2 text-zinc-600 tap-effect">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 7h10v2H7zm0 4h10v2H7zm0 4h7v2H7z"/></svg>
            </button>
            <button onclick="switchTab('profile')" id="nav-p" class="nav-icon p-2 text-zinc-600 tap-effect">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>
        </nav>
    </div>

    <!-- CHAT WINDOW -->
    <div id="chat-win" class="hidden fixed inset-0 z-[110] bg-[#050505] flex flex-col">
        <header class="glass-header px-4 py-4 flex items-center gap-3">
            <button onclick="closeChat()" class="p-2 text-[#2f6ef0] tap-effect">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#2f6ef0] to-[#0f3b9e] flex items-center justify-center">
                    <span class="font-black text-sm">8А</span>
                </div>
                <div>
                    <h3 class="font-bold text-base">Беседа 8А</h3>
                    <p class="text-[10px] text-emerald-500 font-bold">✦ online</p>
                </div>
            </div>
        </header>

        <div id="pinned-bar" class="pinned-message-bar hidden" onclick="scrollToPinned()">
            <span class="font-black mr-1">📌</span> Закреплено: <span id="pinned-text" class="font-medium"></span>
        </div>

        <div id="chat-flow" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

        <div id="reply-preview-area" class="hidden px-4 pt-2 bg-[#0c0c0c] border-t border-white/5">
            <div class="reply-preview flex justify-between items-center">
                <div class="text-sm"><span class="font-bold text-[#2f6ef0]" id="reply-preview-name"></span> <span class="text-zinc-300" id="reply-preview-text"></span></div>
                <button onclick="clearReply()" class="text-zinc-400 text-xs bg-white/10 px-3 py-1 rounded-full">отмена</button>
            </div>
        </div>

        <form id="chat-form" class="p-3 bg-[#050505] border-t border-white/5 flex items-end gap-2 pb-[calc(0.8rem+var(--sab))]">
            <label class="p-3 bg-[#0f0f0f] rounded-2xl text-zinc-400 tap-effect">
                <input type="file" id="f-in" class="hidden" accept="image/*,video/*">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </label>
            <div class="flex-1 bg-[#0f0f0f] rounded-2xl px-4 py-2.5 border border-white/5">
                <input type="text" id="m-in" class="w-full bg-transparent outline-none text-sm placeholder:text-zinc-600" placeholder="Сообщение..." autocomplete="off">
            </div>
            <button type="submit" class="bg-[#2f6ef0] p-3.5 rounded-2xl text-white shadow-lg tap-effect">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onChildAdded, onChildRemoved, onChildChanged, push, remove, update, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const conf = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };
        const app = initializeApp(conf);
        const db = getDatabase(app);
        
        let user = JSON.parse(localStorage.getItem('user_data'));
        let isLogin = false;
        if (user) startApp();

        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('reg-fields').classList.toggle('hidden', isLogin);
            document.getElementById('toggle-auth').innerHTML = isLogin ? 'Нет аккаунта? <span class="text-[#2f6ef0]">Регистрация</span>' : 'Уже есть аккаунт? <span class="text-[#2f6ef0]">Войти</span>';
        };
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const ph = document.getElementById('reg-phone').value.trim();
            const ps = document.getElementById('reg-pass').value.trim();
            const ni = document.getElementById('reg-nick').value.trim();
            if (isLogin) {
                const s = await get(child(ref(db), `users/${ph}`));
                if (s.exists() && s.val().password === ps) login(ph, s.val());
                else Swal.fire({ icon: 'error', title: 'Ошибка', text: 'Неверный телефон или пароль', background: '#0c0c0c', color: '#fff' });
            } else {
                if (!ni || !ph) return Swal.fire('Стоп', 'Заполни имя и номер', 'warning');
                const data = { username: ni, password: ps, photo: "", role: (ph === "+79225941382" ? "admin" : "user") };
                await set(ref(db, `users/${ph}`), data);
                login(ph, data);
            }
        };
        function login(ph, d) { localStorage.setItem('user_data', JSON.stringify({ ...d, phone: ph })); location.reload(); }

        function startApp() {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }, 300);
            document.getElementById('h-avatar').src = user.photo || 'favicon.png';
            document.getElementById('p-avatar').src = user.photo || 'favicon.png';
            document.getElementById('p-username').innerText = user.username;
            document.getElementById('p-userphone').innerText = user.phone;
            if (user.role === 'admin') {
                document.getElementById('p-avatar-box').classList.add('admin-glow');
                document.getElementById('p-admin-tag').classList.remove('hidden');
                document.getElementById('admin-frame-h').classList.add('admin-glow');
            }
            loadDiaryEntries();
        }

        window.changeProfilePhoto = async () => {
            const { value: url } = await Swal.fire({ title: 'URL фото', input: 'text', background: '#0c0c0c', color: '#fff' });
            if (url && url.startsWith('http')) {
                await update(ref(db, `users/${user.phone}`), { photo: url });
                user.photo = url; localStorage.setItem('user_data', JSON.stringify(user)); location.reload();
            }
        };

        // TABS (Чаты, Дневник, Профиль)
        window.switchTab = (tab) => {
            document.getElementById('tab-chats').classList.toggle('hidden', tab !== 'chats');
            document.getElementById('tab-diary').classList.toggle('hidden', tab !== 'diary');
            document.getElementById('tab-profile').classList.toggle('hidden', tab !== 'profile');
            const c = document.getElementById('nav-c'), d = document.getElementById('nav-d'), p = document.getElementById('nav-p');
            [c,d,p].forEach(btn => btn.classList.remove('active-tab', 'text-[#2f6ef0]'));
            if (tab === 'chats') { c.classList.add('active-tab', 'text-[#2f6ef0]'); c.classList.remove('text-zinc-600'); }
            else if (tab === 'diary') { d.classList.add('active-tab', 'text-[#2f6ef0]'); d.classList.remove('text-zinc-600'); }
            else { p.classList.add('active-tab', 'text-[#2f6ef0]'); p.classList.remove('text-zinc-600'); }
            if(tab === 'diary') loadDiaryEntries();
        };

        // ДНЕВНИК (firebase)
        async function loadDiaryEntries() {
            const diaryRef = ref(db, `diary/${user.phone}`);
            const snap = await get(diaryRef);
            const container = document.getElementById('diary-list');
            if (!snap.exists() || Object.keys(snap.val()).length === 0) {
                container.innerHTML = `<div class="diary-card p-5 text-center text-zinc-500 text-sm">✦ нет записей. создай первую</div>`;
                return;
            }
            let entries = Object.entries(snap.val()).map(([id, val]) => ({ id, ...val })).sort((a,b) => b.timestamp - a.timestamp);
            container.innerHTML = entries.map(entry => `
                <div class="diary-card p-5 space-y-2" data-id="${entry.id}">
                    <div class="flex justify-between items-center"><span class="text-xs text-zinc-500">${new Date(entry.timestamp).toLocaleString()}</span>
                    <button onclick="deleteDiaryEntry('${entry.id}')" class="text-red-400 text-xs">✖</button></div>
                    <p class="text-white leading-relaxed">${entry.content}</p>
                </div>
            `).join('');
        }
        window.addDiaryEntry = async () => {
            const { value: text } = await Swal.fire({ title: 'Новая запись', input: 'textarea', inputPlaceholder: 'Мысли, события...', background: '#0c0c0c', color: '#fff' });
            if (text) {
                const newRef = push(ref(db, `diary/${user.phone}`));
                await set(newRef, { content: text, timestamp: Date.now() });
                loadDiaryEntries();
                Swal.fire({ icon: 'success', toast: true, title: 'Сохранено', timer: 1200, showConfirmButton: false, background: '#0c0c0c' });
            }
        };
        window.deleteDiaryEntry = async (id) => {
            await remove(ref(db, `diary/${user.phone}/${id}`));
            loadDiaryEntries();
        };

        // CHAT logic
        let currentChatRef = null, replyTarget = null, pinnedMessageId = null;
        window.openChat = async (id) => {
            document.getElementById('chat-win').classList.remove('hidden');
            document.getElementById('chat-flow').innerHTML = "";
            if (currentChatRef) off(currentChatRef);
            await loadPinnedMessage(id);
            currentChatRef = ref(db, `messages/${id}`);
            onChildAdded(currentChatRef, (s) => renderMessage(s.key, s.val()));
            onChildRemoved(currentChatRef, (s) => document.getElementById(s.key)?.remove());
            onChildChanged(currentChatRef, (s) => { const el = document.getElementById(s.key); if(el) el.querySelector('.msg-text').innerText = s.val().text; });
        };
        async function loadPinnedMessage(chatId) {
            const pinSnap = await get(ref(db, `pinned/${chatId}`));
            if(pinSnap.exists()) {
                const pin = pinSnap.val();
                pinnedMessageId = pin.id;
                document.getElementById('pinned-text').innerText = pin.text.length>50?pin.text.slice(0,50)+'...':pin.text;
                document.getElementById('pinned-bar').classList.remove('hidden');
            } else { document.getElementById('pinned-bar').classList.add('hidden'); pinnedMessageId=null; }
        }
        window.scrollToPinned = () => { if(pinnedMessageId && document.getElementById(pinnedMessageId)) document.getElementById(pinnedMessageId).scrollIntoView({behavior:'smooth',block:'center'}); };
        
        function renderMessage(id, m) {
            const isMe = m.phone === user.phone;
            const replyHtml = m.replyTo ? `<div class="text-[10px] mb-1 opacity-70">↩️ ${m.replyTo.name}: ${m.replyTo.text.substring(0,35)}</div>` : '';
            const html = `<div id="${id}" class="flex flex-col ${isMe ? 'items-end' : 'items-start'} animate-float" data-msg-id="${id}" data-msg-name="${m.name}" data-msg-phone="${m.phone}">
                <div class="msg-bubble ${isMe ? 'my-msg' : 'other-msg'}" data-id="${id}" data-text="${m.text.replace(/"/g, '&quot;')}" data-me="${isMe}" data-phone="${m.phone}">
                    ${!isMe ? `<div class="text-[10px] font-black text-[#6e9eff] mb-1">${m.name}</div>` : ''}
                    ${replyHtml}
                    ${m.file ? `<img src="${m.file}" class="rounded-xl mb-2 max-h-52 object-cover">` : ''}
                    <div class="msg-text">${m.text}</div>
                    <div class="text-[9px] opacity-40 text-right mt-1">${m.time}</div>
                </div>
            </div>`;
            document.getElementById('chat-flow').insertAdjacentHTML('beforeend', html);
            document.getElementById('chat-flow').scrollTo(0, document.getElementById('chat-flow').scrollHeight);
            // swipe left (ответ)
            const div = document.getElementById(id);
            let startX=0;
            div.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
            div.addEventListener('touchend', (e) => { if(e.changedTouches[0].clientX - startX < -45) { replyToMessage(id, { text: m.text, name: m.name }); } });
        }
        function replyToMessage(msgId, data) { replyTarget = { id: msgId, text: data.text, name: data.name }; document.getElementById('reply-preview-name').innerText = replyTarget.name; document.getElementById('reply-preview-text').innerText = replyTarget.text; document.getElementById('reply-preview-area').classList.remove('hidden'); }
        window.clearReply = () => { replyTarget = null; document.getElementById('reply-preview-area').classList.add('hidden'); };
        
        document.addEventListener('click', (e) => {
            const bubble = e.target.closest('.msg-bubble');
            if(!bubble) return;
            const id = bubble.dataset.id, text = bubble.dataset.text, isMe = bubble.dataset.me === "true", msgPhone = bubble.dataset.phone;
            const canEditDel = isMe || user.role === 'admin';
            Swal.fire({ background:'#0c0c0c', color:'#fff', showConfirmButton:false, showCloseButton:true, html:`
                <div class="flex flex-col gap-2 text-left">
                    <button onclick="Swal.close(); copyText('${text.replace(/'/g, "\\'")}')" class="p-3 rounded-xl bg-white/5">📋 Копировать</button>
                    <button onclick="Swal.close(); replyToMsgById('${id}','${text.replace(/'/g, "\\'")}','${bubble.closest('[data-msg-id]')?.dataset.msgName || ''}')" class="p-3 rounded-xl bg-white/5">↩️ Ответить</button>
                    ${isMe ? `<button onclick="Swal.close(); pinMessage('${id}','${text.replace(/'/g, "\\'")}')" class="p-3 rounded-xl bg-white/5">📌 Закрепить</button>` : ''}
                    ${canEditDel ? `<button onclick="Swal.close(); editMsg('${id}','${text.replace(/'/g, "\\'")}')" class="p-3 rounded-xl bg-white/5">✏️ Изменить</button>` : ''}
                    ${canEditDel ? `<button onclick="Swal.close(); delMsg('${id}')" class="p-3 rounded-xl bg-red-500/20 text-red-400">🗑️ Удалить</button>` : ''}
                </div>
            `});
        });
        window.replyToMsgById = (id, txt, name) => { replyToMessage(id, { text: txt, name: name }); };
        window.copyText = (t) => { navigator.clipboard.writeText(t); Swal.fire({ toast:true, icon:'success', title:'скопировано', timer:900, showConfirmButton:false, background:'#0c0c0c' }); };
        window.delMsg = (id) => { remove(ref(db, `messages/chat_8a/${id}`)); if(pinnedMessageId===id) remove(ref(db, `pinned/chat_8a`)); };
        window.editMsg = async (id, old) => { const {value:nt}=await Swal.fire({input:'text',inputValue:old, background:'#0c0c0c', color:'#fff'}); if(nt) update(ref(db, `messages/chat_8a/${id}`),{text:nt}); };
        window.pinMessage = async (id,text) => { await set(ref(db,`pinned/chat_8a`),{id,text}); pinnedMessageId=id; document.getElementById('pinned-text').innerText=text; document.getElementById('pinned-bar').classList.remove('hidden'); Swal.fire({icon:'success',toast:true,title:'Закреплено',timer:1000}); };
        
        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const inp = document.getElementById('m-in'), file = document.getElementById('f-in').files[0];
            if(!inp.value.trim() && !file) return;
            const send = async (f="") => {
                let replyObj = replyTarget ? { id: replyTarget.id, text: replyTarget.text, name: replyTarget.name } : null;
                await push(ref(db, `messages/chat_8a`), { phone: user.phone, name: user.username, text: inp.value, file: f, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), replyTo: replyObj });
                inp.value = ""; document.getElementById('f-in').value = ""; clearReply();
            };
            if(file) { const reader = new FileReader(); reader.onload = () => send(reader.result); reader.readAsDataURL(file); } else send();
        };
        window.closeChat = () => { document.getElementById('chat-win').classList.add('hidden'); if(currentChatRef) off(currentChatRef); clearReply(); };
        window.logout = () => { localStorage.clear(); location.reload(); };
        window.editData = async (f) => { const {value:v}=await Swal.fire({title:`Новый ${f}`, input:'text', background:'#0c0c0c', color:'#fff'}); if(v){ await update(ref(db,`users/${user.phone}`),{[f]:v}); user[f]=v; localStorage.setItem('user_data',JSON.stringify(user)); location.reload(); }};
    </script>
</body>
</html>
