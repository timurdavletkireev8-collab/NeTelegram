<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTelegram</title>

<link rel="icon" href="favicon.png">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
--bg:#000;
--glass:rgba(28,28,29,.75);
--border:rgba(255,255,255,.06);
--accent:#0088cc;
--text:#fff;
--muted:#8e8e93;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
height:100dvh;
overflow:hidden;
}

/* LAYOUT */
.app{
display:flex;
flex-direction:column;
height:100dvh;
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:10;
backdrop-filter:blur(16px);
background:var(--glass);
border-bottom:1px solid var(--border);
padding:14px;
display:flex;
align-items:center;
gap:10px;
}
.header img{width:26px;height:26px}
.header span{font-weight:600}

/* TABS */
.tabs{display:flex;background:var(--glass)}
.tab{
flex:1;
text-align:center;
padding:12px;
font-size:13px;
color:var(--muted);
cursor:pointer;
transition:.2s;
}
.tab.active{
color:var(--accent);
border-bottom:2px solid var(--accent);
}

/* PAGES */
.page{
flex:1;
overflow:auto;
padding:12px;
display:none;
}
.page.active{display:block}

/* CHAT LIST */
.chat{
background:rgba(255,255,255,0.02);
padding:16px;
border-radius:16px;
border:1px solid var(--border);
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}
.chat:hover{background:rgba(255,255,255,0.04)}

.chat-title{font-size:14px;font-weight:500}
.chat-last{
font-size:12px;
color:var(--muted);
margin-top:4px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* CHAT WINDOW */
.chat-window{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
z-index:20;
}
.chat-window.active{display:flex}

/* MESSAGES */
.messages{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
scroll-behavior:smooth;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:16px;
font-size:13px;
animation:fade .2s ease;
}

.mine{
align-self:flex-end;
background:var(--accent);
}
.other{
align-self:flex-start;
background:#1c1c1d;
}

.msg-name{font-size:10px;color:#aaa;margin-bottom:3px}
.msg-time{font-size:9px;color:#aaa;margin-top:4px;text-align:right}

/* INPUT */
.input{
display:flex;
gap:8px;
padding:10px 10px 50px;
background:var(--glass);
backdrop-filter:blur(12px);
border-top:1px solid var(--border);
}
.input input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:#1c1c1d;
color:#fff;
outline:none;
}
.input button{
background:var(--accent);
border:none;
padding:12px;
border-radius:12px;
color:#fff;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:50;
}
.box{
background:#1c1c1d;
padding:20px;
border-radius:16px;
width:80%;
text-align:center;
}
.box input{
margin-top:10px;
padding:10px;
width:100%;
border-radius:10px;
border:none;
background:#2a2a2a;
color:#fff;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<img src="favicon.png">
<span>NeTelegram</span>
</div>

<div class="tabs">
<div class="tab active" onclick="tab(event,'chats')">ЧАТЫ</div>
<div class="tab" onclick="tab(event,'diary')">ДНЕВНИК</div>
</div>

<div id="chats" class="page active">
<div class="chat" onclick="openChat()">
<div class="chat-title">БЕСЕДА 8А</div>
<div id="lastMsg" class="chat-last">Загрузка...</div>
</div>
</div>

<div id="diary" class="page">
<button onclick="window.open('https://one.astrobl.ru/authorize')">ОТКРЫТЬ ДНЕВНИК</button>
</div>

</div>

<!-- CHAT -->
<div id="chatWin" class="chat-window">

<div class="header">
<div onclick="closeChat()" style="cursor:pointer;color:#0088cc">Назад</div>
</div>

<div id="msgs" class="messages"></div>

<div class="input">
<input id="text">
<button onclick="send()">OK</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" style="display:none">
<div class="box">
Введите имя
<input id="name">
<br><br>
<button onclick="save()">Продолжить</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
authDomain:"netelegram-d8c52.firebaseapp.com",
databaseURL:"https://netelegram-d8c52-default-rtdb.firebaseio.com",
projectId:"netelegram-d8c52",
storageBucket:"netelegram-d8c52.firebasestorage.app",
messagingSenderId:"214817548440",
appId:"1:214817548440:web:05e6113620f7ce7a9548ed"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem('name');

if(!user){
document.getElementById('modal').style.display='flex';
}

function save(){
let n=document.getElementById('name').value.trim();
if(n){
localStorage.setItem('name',n);
user=n;
document.getElementById('modal').style.display='none';
}
}

/* tabs */
function tab(e,id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
e.target.classList.add('active');
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* chat */
function openChat(){
document.getElementById('chatWin').classList.add('active');
setTimeout(scrollBottom,200);
}
function closeChat(){
document.getElementById('chatWin').classList.remove('active');
}

/* send */
function send(){
let input=document.getElementById('text');
let txt=input.value.trim();
if(!txt)return;

db.ref('messages').push({
name:user,
text:txt,
time:firebase.database.ServerValue.TIMESTAMP
});

input.value='';
}

/* realtime */
const msgs=document.getElementById('msgs');

db.ref('messages').limitToLast(100).on('child_added',snap=>{
let m=snap.val();

let el=document.createElement('div');
el.className='msg '+(m.name===user?'mine':'other');

el.innerHTML=`
<div class="msg-name">${m.name}</div>
<div>${m.text}</div>
<div class="msg-time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
`;

msgs.appendChild(el);

updateLast(m);

setTimeout(scrollBottom,100);
});

/* last message */
function updateLast(m){
document.getElementById('lastMsg').innerText = m.name + ': ' + m.text;
}

/* scroll */
function scrollBottom(){
msgs.scrollTop = msgs.scrollHeight;
}
</script>

</body>
</html>
