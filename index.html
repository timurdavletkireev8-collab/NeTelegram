<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Классный мессенджер 8А</title>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, off, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };
        
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        window.firebaseApp = app;
        window.firebaseDatabase = database;
        window.firebaseRef = ref;
        window.firebasePush = push;
        window.firebaseOnChildAdded = onChildAdded;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseOff = off;
        window.firebaseServerTimestamp = serverTimestamp;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            background: #2c3e50;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #34495e;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
        }

        .user-name-input {
            background: #34495e;
            border: 1px solid #4a627a;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 180px;
        }

        .user-name-input::placeholder {
            color: #95a5a6;
        }

        /* Основной контейнер */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Боковая панель навигации */
        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
        }

        .nav-tabs {
            display: flex;
            padding: 16px 16px 0;
            gap: 8px;
            border-bottom: 1px solid #dee2e6;
        }

        .nav-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: none;
            border: none;
            color: #6c757d;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: #2c3e50;
            background: white;
            border: 1px solid #dee2e6;
            border-bottom: 2px solid #3498db;
        }

        .nav-tab:hover:not(.active) {
            background: #e9ecef;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .section-title {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }

        .chat-item:hover {
            background: #e9ecef;
        }

        .chat-item.active {
            background: #e3f2fd;
            border-left-color: #3498db;
        }

        .chat-item.pinned {
            background: #fff9e6;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 16px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 15px;
            color: #2c3e50;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pinned-badge {
            font-size: 10px;
            color: #f39c12;
        }

        .chat-last-message {
            font-size: 12px;
            color: #7f8c8d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Дневник */
        .diary-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: white;
        }

        .diary-header {
            margin-bottom: 24px;
        }

        .diary-header h2 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .diary-date {
            color: #7f8c8d;
            font-size: 14px;
        }

        .diary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .subject-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 16px;
        }

        .subject-name {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #dee2e6;
        }

        .assignment-item {
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .assignment-item:last-child {
            border-bottom: none;
        }

        .assignment-title {
            font-weight: 500;
            color: #34495e;
            margin-bottom: 4px;
        }

        .assignment-desc {
            font-size: 13px;
            color: #7f8c8d;
        }

        .assignment-date {
            font-size: 11px;
            color: #95a5a6;
            margin-top: 4px;
        }

        .add-assignment-btn {
            margin-top: 12px;
            padding: 8px 12px;
            background: white;
            border: 1px dashed #bdc3c7;
            border-radius: 4px;
            color: #7f8c8d;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .add-assignment-btn:hover {
            border-color: #3498db;
            color: #3498db;
        }

        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-title-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
        }

        .chat-title-text h3 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .chat-title-text span {
            font-size: 13px;
            color: #7f8c8d;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafbfc;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .own .message-content {
            background: #3498db;
            color: white;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-sender {
            font-weight: 600;
            font-size: 13px;
            color: #2c3e50;
        }

        .own .message-sender {
            color: rgba(255,255,255,0.9);
        }

        .message-time {
            font-size: 11px;
            color: #95a5a6;
        }

        .own .message-time {
            color: rgba(255,255,255,0.7);
        }

        .message-text {
            line-height: 1.5;
            word-break: break-word;
        }

        .message-input-area {
            padding: 16px 24px;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 12px;
            background: white;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dee2e6;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: #3498db;
        }

        .send-button {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: #2980b9;
        }

        .send-button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }

        /* Состояния */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #95a5a6;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #7f8c8d;
        }

        /* Модальное окно для добавления задания */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #34495e;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #7f8c8d;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Шапка -->
        <div class="header">
            <h1>Класс 8А</h1>
            <div class="user-info">
                <input type="text" id="userNameInput" class="user-name-input" placeholder="Ваше имя" maxlength="30">
                <div class="user-avatar" id="userAvatar">Г</div>
            </div>
        </div>

        <!-- Основной контейнер -->
        <div class="main-container">
            <!-- Боковая панель -->
            <div class="sidebar">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-tab="chats">Чаты</button>
                    <button class="nav-tab" data-tab="diary">Дневник</button>
                </div>

                <!-- Список чатов -->
                <div id="chatsPanel" class="chats-list">
                    <div class="section-title">Закрепленные</div>
                    <div id="pinnedChats"></div>
                    <div class="section-title">Все чаты</div>
                    <div id="allChats"></div>
                </div>

                <!-- Дневник -->
                <div id="diaryPanel" class="diary-container hidden">
                    <div class="diary-header">
                        <h2>Домашние задания</h2>
                        <div class="diary-date" id="currentDate"></div>
                    </div>
                    <div class="diary-grid" id="diaryGrid">
                        <!-- Предметы будут добавляться динамически -->
                    </div>
                </div>
            </div>

            <!-- Область чата -->
            <div id="chatArea" class="chat-area">
                <div class="chat-header">
                    <div class="chat-title">
                        <div class="chat-title-avatar" id="currentChatAvatar">Б</div>
                        <div class="chat-title-text">
                            <h3 id="currentChatName">БЕСЕДА 8А</h3>
                            <span id="currentChatInfo">Основной чат класса</span>
                        </div>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">
                        <h3>Нет сообщений</h3>
                        <p>Начните общение первым</p>
                    </div>
                </div>

                <div class="message-input-area">
                    <input type="text" id="messageInput" class="message-input" placeholder="Введите сообщение..." disabled>
                    <button id="sendMessageBtn" class="send-button" disabled>Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления задания -->
    <div id="assignmentModal" class="modal hidden">
        <div class="modal-content">
            <h3>Добавить задание</h3>
            <form id="assignmentForm">
                <div class="form-group">
                    <label>Предмет</label>
                    <select id="subjectSelect" required>
                        <option value="">Выберите предмет</option>
                        <option value="Алгебра">Алгебра</option>
                        <option value="Геометрия">Геометрия</option>
                        <option value="Русский язык">Русский язык</option>
                        <option value="Литература">Литература</option>
                        <option value="Физика">Физика</option>
                        <option value="Химия">Химия</option>
                        <option value="Биология">Биология</option>
                        <option value="История">История</option>
                        <option value="Обществознание">Обществознание</option>
                        <option value="Английский язык">Английский язык</option>
                        <option value="Информатика">Информатика</option>
                        <option value="География">География</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Название задания</label>
                    <input type="text" id="assignmentTitle" required placeholder="Например: §12, упр. 45">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="assignmentDesc" rows="3" placeholder="Подробное описание задания"></textarea>
                </div>
                <div class="form-group">
                    <label>Срок сдачи</label>
                    <input type="date" id="assignmentDueDate" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelAssignmentBtn">Отмена</button>
                    <button type="submit" class="btn btn-primary">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // Firebase references
            const database = window.firebaseDatabase;
            const dbRef = window.firebaseRef;
            const dbPush = window.firebasePush;
            const dbOnChildAdded = window.firebaseOnChildAdded;
            const dbSet = window.firebaseSet;
            const dbOnValue = window.firebaseOnValue;
            const dbOff = window.firebaseOff;
            const serverTimestamp = window.firebaseServerTimestamp;

            // Состояние приложения
            let currentUser = {
                name: 'Гость',
                avatar: 'Г'
            };
            
            let currentChat = {
                id: 'beseda8a',
                name: 'БЕСЕДА 8А',
                type: 'pinned',
                description: 'Основной чат класса'
            };

            // Список чатов (включая закрепленный)
            const chats = [
                { id: 'beseda8a', name: 'БЕСЕДА 8А', type: 'pinned', description: 'Основной чат класса' },
                { id: 'math', name: 'Математика', type: 'regular', description: 'Алгебра и геометрия' },
                { id: 'russian', name: 'Русский и Литература', type: 'regular', description: 'Обсуждение уроков' },
                { id: 'physics', name: 'Физика', type: 'regular', description: 'Лабораторные работы' },
                { id: 'english', name: 'Английский язык', type: 'regular', description: 'Practice English' },
                { id: 'history', name: 'История', type: 'regular', description: 'Даты и события' },
                { id: 'general', name: 'Общий', type: 'regular', description: 'Внеучебные темы' }
            ];

            // DOM элементы
            const userNameInput = document.getElementById('userNameInput');
            const userAvatar = document.getElementById('userAvatar');
            const chatsPanel = document.getElementById('chatsPanel');
            const diaryPanel = document.getElementById('diaryPanel');
            const chatArea = document.getElementById('chatArea');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendMessageBtn = document.getElementById('sendMessageBtn');
            const currentChatName = document.getElementById('currentChatName');
            const currentChatInfo = document.getElementById('currentChatInfo');
            const currentChatAvatar = document.getElementById('currentChatAvatar');
            const navTabs = document.querySelectorAll('.nav-tab');
            const diaryGrid = document.getElementById('diaryGrid');
            const currentDateEl = document.getElementById('currentDate');
            const assignmentModal = document.getElementById('assignmentModal');
            const assignmentForm = document.getElementById('assignmentForm');
            const cancelAssignmentBtn = document.getElementById('cancelAssignmentBtn');

            // Инициализация
            function init() {
                // Установка текущей даты
                const now = new Date();
                currentDateEl.textContent = now.toLocaleDateString('ru-RU', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

                // Загрузка имени пользователя из localStorage
                const savedName = localStorage.getItem('userName');
                if (savedName) {
                    userNameInput.value = savedName;
                    updateUserInfo(savedName);
                }

                // Обработчики событий
                userNameInput.addEventListener('input', (e) => {
                    const name = e.target.value.trim();
                    if (name) {
                        updateUserInfo(name);
                        localStorage.setItem('userName', name);
                    }
                    updateMessageInputState();
                });

                // Навигация
                navTabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const tabName = tab.dataset.tab;
                        
                        navTabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        
                        if (tabName === 'chats') {
                            chatsPanel.classList.remove('hidden');
                            diaryPanel.classList.add('hidden');
                            chatArea.classList.remove('hidden');
                        } else {
                            chatsPanel.classList.add('hidden');
                            diaryPanel.classList.remove('hidden');
                            chatArea.classList.add('hidden');
                            loadDiary();
                        }
                    });
                });

                // Отправка сообщения
                sendMessageBtn.addEventListener('click', sendMessage);
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                // Модальное окно
                cancelAssignmentBtn.addEventListener('click', () => {
                    assignmentModal.classList.add('hidden');
                });

                assignmentForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    addAssignment();
                });

                // Рендер списка чатов
                renderChatsList();
                
                // Загрузка сообщений для текущего чата
                loadMessages();
                
                // Обновление состояния ввода
                updateMessageInputState();
            }

            function updateUserInfo(name) {
                currentUser.name = name;
                currentUser.avatar = name.charAt(0).toUpperCase();
                userAvatar.textContent = currentUser.avatar;
            }

            function updateMessageInputState() {
                const hasName = currentUser.name && currentUser.name !== 'Гость';
                messageInput.disabled = !hasName;
                sendMessageBtn.disabled = !hasName;
                
                if (!hasName) {
                    messageInput.placeholder = 'Введите ваше имя в шапке';
                } else {
                    messageInput.placeholder = 'Введите сообщение...';
                }
            }

            function renderChatsList() {
                const pinnedContainer = document.getElementById('pinnedChats');
                const allContainer = document.getElementById('allChats');
                
                pinnedContainer.innerHTML = '';
                allContainer.innerHTML = '';
                
                chats.forEach(chat => {
                    const chatEl = createChatElement(chat);
                    if (chat.type === 'pinned') {
                        pinnedContainer.appendChild(chatEl);
                    } else {
                        allContainer.appendChild(chatEl);
                    }
                });
            }

            function createChatElement(chat) {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.type === 'pinned' ? 'pinned' : ''} ${currentChat.id === chat.id ? 'active' : ''}`;
                div.dataset.chatId = chat.id;
                
                const avatarLetter = chat.name.charAt(0).toUpperCase();
                
                div.innerHTML = `
                    <div class="chat-avatar">${avatarLetter}</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${chat.name}
                            ${chat.type === 'pinned' ? '<span class="pinned-badge">📌</span>' : ''}
                        </div>
                        <div class="chat-last-message">${chat.description}</div>
                    </div>
                `;
                
                div.addEventListener('click', () => {
                    switchChat(chat);
                });
                
                return div;
            }

            function switchChat(chat) {
                currentChat = chat;
                
                // Обновление UI
                currentChatName.textContent = chat.name;
                currentChatInfo.textContent = chat.description;
                currentChatAvatar.textContent = chat.name.charAt(0).toUpperCase();
                
                // Обновление активного чата в списке
                document.querySelectorAll('.chat-item').forEach(el => {
                    el.classList.remove('active');
                    if (el.dataset.chatId === chat.id) {
                        el.classList.add('active');
                    }
                });
                
                // Загрузка сообщений
                loadMessages();
            }

            function loadMessages() {
                const messagesRef = dbRef(database, `messages/${currentChat.id}`);
                
                // Очистка контейнера
                messagesContainer.innerHTML = '<div class="empty-state"><h3>Загрузка сообщений...</h3></div>';
                
                // Отписываемся от предыдущих слушателей
                if (window.currentMessagesListener) {
                    dbOff(messagesRef);
                }
                
                const messages = [];
                
                window.currentMessagesListener = dbOnChildAdded(messagesRef, (snapshot) => {
                    const message = snapshot.val();
                    message.id = snapshot.key;
                    messages.push(message);
                    
                    // Сортировка по времени
                    messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    
                    // Рендер всех сообщений
                    renderMessages(messages);
                });
            }

            function renderMessages(messages) {
                if (messages.length === 0) {
                    messagesContainer.innerHTML = `
                        <div class="empty-state">
                            <h3>Нет сообщений</h3>
                            <p>Начните общение первым</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                messages.forEach(msg => {
                    const isOwn = msg.sender === currentUser.name;
                    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    }) : '';
                    
                    html += `
                        <div class="message ${isOwn ? 'own' : ''}">
                            <div class="message-avatar">${msg.avatar || msg.sender.charAt(0).toUpperCase()}</div>
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="message-sender">${escapeHtml(msg.sender)}</span>
                                    <span class="message-time">${time}</span>
                                </div>
                                <div class="message-text">${escapeHtml(msg.text)}</div>
                            </div>
                        </div>
                    `;
                });
                
                messagesContainer.innerHTML = html;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text) return;
                if (!currentUser.name || currentUser.name === 'Гость') {
                    alert('Пожалуйста, введите ваше имя');
                    return;
                }
                
                const messageData = {
                    sender: currentUser.name,
                    avatar: currentUser.avatar,
                    text: text,
                    timestamp: Date.now()
                };
                
                const messagesRef = dbRef(database, `messages/${currentChat.id}`);
                const newMessageRef = dbPush(messagesRef);
                
                dbSet(newMessageRef, messageData)
                    .then(() => {
                        messageInput.value = '';
                        messageInput.focus();
                    })
                    .catch(error => {
                        console.error('Ошибка отправки:', error);
                        alert('Не удалось отправить сообщение');
                    });
            }

            function loadDiary() {
                const diaryRef = dbRef(database, 'diary');
                
                dbOnValue(diaryRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    renderDiary(data);
                }, {
                    onlyOnce: false
                });
            }

            function renderDiary(data) {
                const subjects = {};
                
                // Группировка по предметам
                Object.entries(data).forEach(([id, assignment]) => {
                    if (!subjects[assignment.subject]) {
                        subjects[assignment.subject] = [];
                    }
                    subjects[assignment.subject].push({ id, ...assignment });
                });
                
                if (Object.keys(subjects).length === 0) {
                    diaryGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 48px;">
                            <h3 style="color: #7f8c8d; margin-bottom: 16px;">Нет заданий</h3>
                            <button class="btn btn-primary" onclick="document.getElementById('addFirstAssignment').click()">
                                Добавить первое задание
                            </button>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                
                // Сортировка предметов
                const sortedSubjects = Object.keys(subjects).sort();
                
                sortedSubjects.forEach(subject => {
                    const assignments = subjects[subject].sort((a, b) => {
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    });
                    
                    html += `<div class="subject-card">`;
                    html += `<div class="subject-name">${escapeHtml(subject)}</div>`;
                    
                    assignments.forEach(assignment => {
                        const dueDate = new Date(assignment.dueDate);
                        const formattedDate = dueDate.toLocaleDateString('ru-RU', {
                            day: 'numeric', month: 'long'
                        });
                        
                        html += `
                            <div class="assignment-item">
                                <div class="assignment-title">${escapeHtml(assignment.title)}</div>
                                ${assignment.description ? `<div class="assignment-desc">${escapeHtml(assignment.description)}</div>` : ''}
                                <div class="assignment-date">Сдать до: ${formattedDate}</div>
                            </div>
                        `;
                    });
                    
                    html += `
                        <div class="add-assignment-btn" onclick="window.showAddAssignmentModal('${subject}')">
                            + Добавить задание
                        </div>
                    `;
                    
                    html += `</div>`;
                });
                
                // Кнопка добавления нового предмета
                html += `
                    <div class="subject-card" style="display: flex; align-items: center; justify-content: center; min-height: 150px;">
                        <button class="btn btn-primary" onclick="window.showAddAssignmentModal()">
                            + Добавить задание по предмету
                        </button>
                    </div>
                `;
                
                diaryGrid.innerHTML = html;
            }

            window.showAddAssignmentModal = function(preselectedSubject = '') {
                if (preselectedSubject) {
                    document.getElementById('subjectSelect').value = preselectedSubject;
                }
                assignmentModal.classList.remove('hidden');
                
                // Установка даты по умолчанию (завтра)
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                document.getElementById('assignmentDueDate').value = tomorrow.toISOString().split('T')[0];
            };

            function addAssignment() {
                const subject = document.getElementById('subjectSelect').value;
                const title = document.getElementById('assignmentTitle').value.trim();
                const description = document.getElementById('assignmentDesc').value.trim();
                const dueDate = document.getElementById('assignmentDueDate').value;
                
                if (!subject || !title || !dueDate) {
                    alert('Заполните все обязательные поля');
                    return;
                }
                
                const assignmentData = {
                    subject,
                    title,
                    description,
                    dueDate,
                    createdAt: Date.now(),
                    createdBy: currentUser.name
                };
                
                const diaryRef = dbRef(database, 'diary');
                const newAssignmentRef = dbPush(diaryRef);
                
                dbSet(newAssignmentRef, assignmentData)
                    .then(() => {
                        assignmentModal.classList.add('hidden');
                        assignmentForm.reset();
                        
                        // Переключение на дневник если не там
                        if (diaryPanel.classList.contains('hidden')) {
                            document.querySelector('[data-tab="diary"]').click();
                        }
                    })
                    .catch(error => {
                        console.error('Ошибка:', error);
                        alert('Не удалось добавить задание');
                    });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Глобальные функции для кнопок
            window.addAssignment = addAssignment;
            
            // Кнопка добавления первого задания
            document.addEventListener('click', (e) => {
                if (e.target.id === 'addFirstAssignment') {
                    window.showAddAssignmentModal();
                }
            });

            // Запуск
            init();
        })();
    </script>
</body>
</html>
