<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💬 Чат Нашего Класса</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- ОБЩИЕ СТИЛИ И СБРОСЫ ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 10px;
            color: #fff;
        }

        /* Контейнер приложения */
        #app {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            background: #0f0f1a;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        /* ----- ЭКРАН ЛОГИНА ----- */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 30px;
            background: linear-gradient(145deg, #16162a 0%, #0f0f1a 100%);
        }

        .login-card {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: #9ca3af;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1e1e32;
            border: 1.5px solid #2e2e4a;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #818cf8;
            background: #252542;
        }

        .avatar-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 30px;
        }

        .avatar-option {
            width: 55px;
            height: 55px;
            border-radius: 30px;
            background: #1e1e32;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.15s;
        }

        .avatar-option.selected {
            border-color: #818cf8;
            background: #2d2d5a;
            transform: scale(1.05);
        }

        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }

        .btn:hover {
            background: #6366f1;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ----- ЭКРАН ЧАТА ----- */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        /* Шапка чата */
        .chat-header {
            padding: 16px 20px;
            background: #16162a;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #current-avatar {
            font-size: 32px;
            background: #2a2a4a;
            width: 45px;
            height: 45px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-info h3 {
            font-size: 18px;
        }

        .user-info small {
            color: #94a3b8;
            font-size: 12px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        /* Область сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
        }

        .message-wrapper.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .own .message-bubble {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            font-size: 24px;
            width: 36px;
            height: 36px;
            background: #1e1e32;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .msg-content {
            background: #1e1e32;
            padding: 12px 16px;
            border-radius: 20px 20px 20px 4px;
            color: #f1f5f9;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .own .msg-content {
            background: #4f46e5;
            border-radius: 20px 20px 4px 20px;
            color: white;
        }

        .msg-sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #a78bfa;
        }

        .own .msg-sender {
            color: #c7d2fe;
        }

        .msg-text {
            word-break: break-word;
            line-height: 1.4;
        }

        .msg-time {
            font-size: 10px;
            margin-top: 6px;
            opacity: 0.6;
            text-align: right;
        }

        .system-message {
            text-align: center;
            color: #6b7280;
            font-size: 12px;
            margin: 10px 0;
            font-style: italic;
        }

        /* Поле ввода */
        .input-area {
            padding: 16px;
            background: #16162a;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: #0f0f1a;
            border: 1px solid #2e2e4a;
            border-radius: 40px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 55px;
            height: 55px;
            border-radius: 40px;
            background: #4f46e5;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: 0.15s;
        }

        .input-area button:active {
            transform: scale(0.92);
            background: #6366f1;
        }

        /* Кнопка очистки чата (для учителя) */
        .clear-chat-btn {
            background: none;
            border: 1px solid #3f3f6a;
            color: #f87171;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-card">
            <h1>📚 11«А» Чат</h1>
            <p>Войди под своим именем</p>
            
            <div class="input-group">
                <label><i class="far fa-user"></i> Твоё имя</label>
                <input type="text" id="login-name-input" placeholder="Например: Маша Иванова" maxlength="20">
            </div>

            <label>Выбери аватар:</label>
            <div class="avatar-selector">
                <div class="avatar-option" data-avatar="🦊">🦊</div>
                <div class="avatar-option" data-avatar="🐼">🐼</div>
                <div class="avatar-option" data-avatar="🐸">🐸</div>
                <div class="avatar-option" data-avatar="🐨">🐨</div>
                <div class="avatar-option" data-avatar="🦁">🦁</div>
            </div>

            <button class="btn" id="login-btn">Войти в чат <i class="fas fa-arrow-right"></i></button>
            <div style="margin-top: 20px; font-size: 12px; color: #6b7280;">
                <i class="fas fa-database"></i> Все данные на этом устройстве
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div id="current-avatar">👤</div>
                <div class="user-info">
                    <h3 id="current-username">Гость</h3>
                    <small><i class="fas fa-circle" style="color: #10b981; font-size: 8px;"></i> Онлайн (локально)</small>
                </div>
            </div>
            <div style="display: flex;">
                <button class="clear-chat-btn" id="clear-chat-btn" title="Очистить историю (только у себя)"><i class="fas fa-trash-alt"></i></button>
                <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="messages-container" id="messages-container">
            <!-- Сообщения будут рендериться здесь динамически -->
            <div class="system-message">👋 Добро пожаловать в классный чат!</div>
        </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Напиши что-нибудь..." autocomplete="off">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ----------
        let currentUser = {
            name: '',
            avatar: '👤'
        };

        // Ключ для хранения сообщений в localStorage
        const STORAGE_KEY = 'class_messenger_messages_v1';
        
        // Массив сообщений
        let messages = [];

        // DOM элементы
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginNameInput = document.getElementById('login-name-input');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const currentUsernameSpan = document.getElementById('current-username');
        const currentAvatarSpan = document.getElementById('current-avatar');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearChatBtn = document.getElementById('clear-chat-btn');

        // Аватары
        const avatarOptions = document.querySelectorAll('.avatar-option');
        let selectedAvatar = '🦊'; // По умолчанию

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // Загрузка сообщений из хранилища
        function loadMessages() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    messages = JSON.parse(stored);
                } catch(e) {
                    messages = [];
                }
            } else {
                // Добавим пару приветственных сообщений для демо
                messages = [
                    {
                        id: 'msg1',
                        sender: 'Система',
                        avatar: '🤖',
                        text: 'Всем привет! Это классный чат. Представьтесь :)',
                        timestamp: Date.now() - 3600000,
                        isSystem: true
                    },
                    {
                        id: 'msg2',
                        sender: 'Анна Петровна',
                        avatar: '👩‍🏫',
                        text: 'Не забудьте про домашку по алгебре!',
                        timestamp: Date.now() - 1800000,
                    }
                ];
                saveMessages();
            }
        }

        function saveMessages() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }

        // Очистка контейнера и рендер всех сообщений
        function renderAllMessages() {
            if (!messagesContainer) return;
            
            // Сохраняем позицию скролла
            const wasNearBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100;
            
            let html = '';
            messages.forEach(msg => {
                if (msg.isSystem) {
                    html += `<div class="system-message">${msg.text} <span style="margin-left:8px;font-size:10px;">${formatTime(msg.timestamp)}</span></div>`;
                    return;
                }

                const isOwn = (msg.sender === currentUser.name);
                const wrapperClass = isOwn ? 'message-wrapper own' : 'message-wrapper';
                
                html += `<div class="${wrapperClass}">`;
                html += `<div class="message-bubble">`;
                html += `<div class="msg-avatar">${msg.avatar || '👤'}</div>`;
                html += `<div class="msg-content">`;
                if (!isOwn) {
                    html += `<div class="msg-sender">${msg.sender}</div>`;
                }
                html += `<div class="msg-text">${escapeHtml(msg.text)}</div>`;
                html += `<div class="msg-time">${formatTime(msg.timestamp)}</div>`;
                html += `</div></div></div>`;
            });

            messagesContainer.innerHTML = html || '<div class="system-message">Пока нет сообщений...</div>';
            
            if (wasNearBottom) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        // Простейший escape для безопасности (XSS)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Добавить новое сообщение
        function addMessage(text, sender, avatar, isSystem = false) {
            const newMsg = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36),
                sender: sender,
                avatar: avatar,
                text: text,
                timestamp: Date.now(),
                isSystem: isSystem
            };
            messages.push(newMsg);
            
            // Ограничим историю 200 сообщениями, чтобы не забивать память
            if (messages.length > 200) {
                messages = messages.slice(-200);
            }
            
            saveMessages();
            renderAllMessages();
        }

        // Имитация "получения" сообщения от других вкладок (работает в пределах одного браузера)
        function handleStorageEvent(e) {
            if (e.key === STORAGE_KEY && e.newValue) {
                try {
                    const newMessages = JSON.parse(e.newValue);
                    // Просто обновим, если изменения пришли из другой вкладки
                    if (JSON.stringify(messages) !== JSON.stringify(newMessages)) {
                        messages = newMessages;
                        renderAllMessages();
                    }
                } catch (err) {}
            }
        }

        // ---------- ЛОГИКА ВХОДА / ВЫХОДА ----------
        function showChatScreen() {
            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            currentUsernameSpan.textContent = currentUser.name;
            currentAvatarSpan.textContent = currentUser.avatar;
            
            // Добавим системное сообщение о входе (только если не дублируется слишком часто)
            const lastMsg = messages[messages.length-1];
            if (!lastMsg || lastMsg.text !== `${currentUser.name} присоединился к чату`) {
                addMessage(`${currentUser.name} присоединился к чату`, 'Система', '🔔', true);
            }
            
            renderAllMessages();
            messageInput.focus();
        }

        function showLoginScreen() {
            chatScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
            currentUser = { name: '', avatar: '👤' };
        }

        function performLogin() {
            const name = loginNameInput.value.trim();
            if (!name) {
                alert('Введи имя!');
                return;
            }
            if (name.length > 20) {
                alert('Слишком длинное имя (макс 20)');
                return;
            }
            
            currentUser = {
                name: name,
                avatar: selectedAvatar
            };
            
            showChatScreen();
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ И ОБРАБОТЧИКИ ----------
        function init() {
            loadMessages();
            
            // Проверяем, может уже были залогинены? Для простоты всегда начинаем с логина.
            
            // Выбор аватара
            avatarOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    avatarOptions.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedAvatar = opt.dataset.avatar;
                });
            });
            // Выделим первый
            avatarOptions[0].classList.add('selected');
            
            // Логин
            loginBtn.addEventListener('click', performLogin);
            loginNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performLogin();
            });
            
            // Логаут
            logoutBtn.addEventListener('click', () => {
                if (currentUser.name) {
                    addMessage(`${currentUser.name} вышел из чата`, 'Система', '🔕', true);
                }
                showLoginScreen();
            });
            
            // Отправка сообщения
            function sendMessageHandler() {
                const text = messageInput.value.trim();
                if (!text) return;
                if (!currentUser.name) return;
                
                addMessage(text, currentUser.name, currentUser.avatar);
                messageInput.value = '';
                messageInput.focus();
            }
            
            sendBtn.addEventListener('click', sendMessageHandler);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessageHandler();
                }
            });
            
            // Очистка чата (только локально у этого пользователя, админская фича)
            clearChatBtn.addEventListener('click', () => {
                if (confirm('Очистить всю историю чата на этом устройстве?')) {
                    messages = [];
                    saveMessages();
                    // Добавим системное
                    addMessage('История очищена', 'Система', '🧹', true);
                    renderAllMessages();
                }
            });
            
            // Слушаем изменения в других вкладках
            window.addEventListener('storage', handleStorageEvent);
            
            // Рендер при загрузке (если вдруг зашли сразу)
            renderAllMessages();
        }

        // Запуск
        init();
    })();
</script>
</body>
</html>
