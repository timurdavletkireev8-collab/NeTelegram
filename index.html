<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:image" content="preview.png">
    <meta property="og:title" content="NeTelegram — Классное приложение">
    <meta property="og:description" content="Чат 8А и школьный дневник">
    
    <title>NeTelegram</title>
    
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #151515;
            --surface-hover: #222222;
            --accent-color: #2a85ff;
            --accent-gradient: linear-gradient(135deg, #2a85ff 0%, #00c6ff 100%);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(21, 21, 21, 0.8);
            --glass-blur: blur(20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* КОНТЕЙНЕР АДАПТИВНОСТИ */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column; /* Мобилки: вертикально */
        }

        /* БОКОВАЯ / НИЖНЯЯ ПАНЕЛЬ */
        .nav-bar {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-brand {
            display: none; /* Скрыто на мобильных */
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .nav-btn.active {
            color: var(--accent-color);
        }

        .nav-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ШАПКА */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-brand-mobile {
            font-size: 16px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ВКЛАДКИ */
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* СПИСОК ЧАТОВ */
        .chat-list {
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background-color: var(--surface-color);
            border-radius: 18px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background-color: var(--surface-hover);
            border-color: var(--border-color);
        }

        .chat-avatar {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            margin-right: 15px;
            box-shadow: 0 4px 15px rgba(42, 133, 255, 0.2);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-last-msg {
            font-size: 14px;
            color: var(--text-secondary);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .pin-badge {
            color: var(--accent-color);
            font-size: 12px;
        }

        /* ДНЕВНИК */
        .diary-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .diary-card {
            background: var(--surface-color);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
        }

        .btn-main {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(42, 133, 255, 0.3);
        }

        /* КНОПКА СОЗДАТЬ ЧАТ */
        .add-chat-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(42, 133, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ДЕСКТОП ВЕРСИЯ (ПК) */
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
            }

            .nav-bar {
                flex-direction: column;
                width: 280px;
                height: 100%;
                justify-content: flex-start;
                border-top: none;
                border-right: 1px solid var(--border-color);
                padding: 40px 15px;
            }

            .nav-brand {
                display: block;
            }

            .nav-btn {
                flex-direction: row;
                padding: 16px 20px;
                border-radius: 14px;
                font-size: 16px;
                gap: 15px;
                margin-bottom: 8px;
            }

            .nav-btn.active {
                background: rgba(42, 133, 255, 0.1);
            }

            .header-brand-mobile {
                display: none;
            }

            .chat-list {
                max-width: 600px;
                margin: 0 auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="nav-bar">
            <div class="nav-brand">NeTelegram</div>
            
            <button class="nav-btn active" onclick="switchTab('chats', 'Чаты', this)">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22H17V20H12C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12V13.43C20 14.22 19.29 15 18.5 15C17.71 15 17 14.22 17 13.43V12C17 9.24 14.76 7 12 7C9.24 7 7 9.24 7 12C7 14.76 9.24 17 12 17C13.38 17 14.64 16.44 15.54 15.53C16.19 16.42 17.27 17 18.5 17C20.43 17 22 15.43 22 13.43V12C22 6.48 17.52 2 12 2ZM12 15C10.34 15 9 13.66 9 12C9 10.34 10.34 9 12 9C13.66 9 15 10.34 15 12C15 13.66 13.66 15 12 15Z"/></svg>
                Чаты
            </button>

            <button class="nav-btn" onclick="switchTab('diary', 'Дневник', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM7 7H17V9H7V7ZM7 11H17V13H7V11ZM7 15H14V17H7V15Z"/></svg>
                Дневник
            </button>
        </nav>

        <main class="main-content">
            
            <header class="header">
                <div class="header-title" id="page-name">Чаты</div>
                <div class="header-brand-mobile">NeTelegram</div>
            </header>

            <div id="tab-chats" class="tab-content active">
                <div class="chat-list">
                    <div class="chat-item">
                        <div class="chat-avatar">8А</div>
                        <div class="chat-info">
                            <div class="chat-name">БЕСЕДА 8А <span class="pin-badge">📌</span></div>
                            <span class="chat-last-msg">Александр: Дз по физике скиньте пж</span>
                        </div>
                    </div>

                    <div style="text-align: center; color: var(--text-secondary); margin-top: 50px; font-size: 14px; opacity: 0.5;">
                        Новые чаты появятся здесь
                    </div>
                </div>
                <button class="add-chat-btn">+</button>
            </div>

            <div id="tab-diary" class="tab-content">
                <div class="diary-section">
                    <div class="diary-card">
                        <h2>Дневник</h2>
                        <p style="color: var(--text-secondary); margin-top: 10px;">Расписание, оценки и домашние задания в одном месте.</p>
                        <button class="btn-main">Открыть дневник</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        function switchTab(id, name, btn) {
            // Скрыть все вкладки
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            // Деактивировать кнопки
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Активировать нужную
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
            
            // Сменить заголовок
            document.getElementById('page-name').innerText = name;
        }
    </script>
</body>
</html>
