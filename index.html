<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .auth-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        input { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
        .hidden { display: none; }
        .custom-file-upload { border: 1px dashed #334155; cursor: pointer; transition: 0.3s; }
        .custom-file-upload:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="auth-container" class="auth-card p-8 rounded-3xl w-full max-w-sm shadow-2xl transition-all">
        <div class="text-center mb-6">
            <h1 id="auth-title" class="text-2xl font-bold">Регистрация</h1>
            <p id="auth-subtitle" class="text-slate-500 text-sm mt-1">Мессенджер нашего класса</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="reg-fields" class="space-y-4">
                <div>
                    <input type="text" id="node-nick" class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ваш никнейм">
                </div>
                <div class="relative">
                    <label class="custom-file-upload flex items-center justify-center p-3 rounded-xl text-sm text-slate-400">
                        <input type="file" id="node-photo" class="hidden" accept="image/*">
                        <span id="file-name">Выбрать фото профиля</span>
                    </label>
                </div>
            </div>

            <div>
                <input type="tel" id="node-phone" class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Номер телефона" required>
            </div>
            <div>
                <input type="password" id="node-pass" class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Пароль" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl mt-2 hover:bg-slate-200 transition-all active:scale-95">
                Зарегистрироваться
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400">
            <span id="toggle-text">Уже зарегистрированы?</span>
            <button id="toggle-auth" class="text-blue-500 ml-1 font-medium">Войти</button>
        </div>
    </div>

    <div id="app-screen" class="hidden fixed inset-0 bg-black flex items-center justify-center">
        <div class="text-center">
            <div class="animate-pulse text-slate-500">Загрузка интерфейса...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let isLoginMode = false;
        let base64Photo = "";

        // Обработка выбора файла (конвертация в текст)
        document.getElementById('node-photo').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('file-name').innerText = file.name;
                const reader = new FileReader();
                reader.onloadend = () => { base64Photo = reader.result; };
                reader.readAsDataURL(file);
            }
        };

        // Переключение Вход / Регистрация
        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "С возвращением" : "Регистрация";
            document.getElementById('reg-fields').classList.toggle('hidden');
            document.getElementById('submit-btn').innerText = isLoginMode ? "Войти" : "Зарегистрироваться";
            document.getElementById('toggle-text').innerText = isLoginMode ? "Нет аккаунта?" : "Уже зарегистрированы?";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Создать" : "Войти";
        };

        // Логика формы
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const phone = document.getElementById('node-phone').value.trim();
            const pass = document.getElementById('node-pass').value.trim();
            const nick = document.getElementById('node-nick').value.trim();

            if (isLoginMode) {
                // ПРОВЕРКА ПРИ ВХОДЕ
                const snapshot = await get(child(ref(db), `users/${phone}`));
                if (snapshot.exists()) {
                    if (snapshot.val().password === pass) {
                        launchApp();
                    } else {
                        alert("Неверный пароль!");
                    }
                } else {
                    alert("Пользователь с таким номером не найден!");
                }
            } else {
                // РЕГИСТРАЦИЯ
                if (!nick || !base64Photo) { alert("Заполните ник и выберите фото!"); return; }
                
                await set(ref(db, 'users/' + phone), {
                    username: nick,
                    password: pass,
                    photo: base64Photo,
                    role: (phone === "+79225941382" ? "admin" : "user")
                });
                alert("Успешная регистрация!");
                launchApp();
            }
        };

        function launchApp() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
