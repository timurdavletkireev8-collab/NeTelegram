<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:image" content="preview.png">
    <title>NeTelegram</title>

    <style>
        :root {
            --bg: #000;
            --surface: #121212;
            --accent: #007AFF; /* Apple Blue */
            --accent-gradient: linear-gradient(180deg, #007AFF 0%, #0051FF 100%);
            --text: #fff;
            --text-secondary: #8E8E93;
            --glass: rgba(20, 20, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ШАПКА --- */
        header {
            padding: 50px 20px 15px; /* Отступ под челку/островок */
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand img {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        /* --- КОНТЕНТ --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
            padding-bottom: 100px; /* Чтобы контент не перекрывался таббаром */
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin: 15px 0 20px;
        }

        /* --- ЧАТЫ (ПРЕМИУМ ВИД) --- */
        .chat-card {
            background: var(--surface);
            padding: 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            transition: transform 0.2s;
            border: 0.5px solid var(--border);
        }

        .chat-card:active {
            transform: scale(0.97);
            background: #1c1c1e;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .name { font-weight: 600; font-size: 17px; }
        .time { color: var(--text-secondary); font-size: 13px; }
        .msg { 
            color: var(--text-secondary); 
            font-size: 15px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* --- КНОПКА СОЗДАТЬ --- */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-size: 30px;
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
        }

        /* --- НИЖНИЙ ТАББАР --- */
        .tabbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid var(--border);
            display: flex;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            justify-content: space-around;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            text-decoration: none;
            width: 25%;
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tab-item svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        /* Скрытие секций */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="favicon.png" alt="Logo">
            <span>NeTelegram</span>
        </div>
        <div style="width: 32px;"></div> </header>

    <main>
        <div id="chats" class="page active">
            <h1 class="section-title">Чаты</h1>
            
            <div class="chat-card">
                <div class="avatar">8А</div>
                <div class="chat-info">
                    <div class="chat-top">
                        <span class="name">БЕСЕДА 8А 📌</span>
                        <span class="time">14:51</span>
                    </div>
                    <p class="msg">Александр: Дз по физике скиньте пж</p>
                </div>
            </div>

            <div style="text-align: center; color: var(--text-secondary); margin-top: 40px; font-size: 14px;">
                Пока здесь только школьный чат...
            </div>
        </div>

        <div id="diary" class="page">
            <h1 class="section-title">Дневник</h1>
            <div style="background: var(--surface); padding: 25px; border-radius: 25px; text-align: center; border: 0.5px solid var(--border);">
                <p style="color: var(--text-secondary);">Все оценки и расписание будут подтянуты из базы.</p>
                <button style="margin-top: 20px; background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 15px; font-weight: 700; width: 100%;">Войти</button>
            </div>
        </div>
    </main>

    <button class="fab" onclick="alert('Скоро: создание чатов через Firebase')">+</button>

    <nav class="tabbar">
        <a href="#" class="tab-item active" onclick="showPage('chats', this)">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22H17V20H12C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12V13.43C20 14.22 19.29 15 18.5 15C17.71 15 17 14.22 17 13.43V12C17 9.24 14.76 7 12 7C9.24 7 7 9.24 7 12C7 14.76 9.24 17 12 17C13.38 17 14.64 16.44 15.54 15.53C16.19 16.42 17.27 17 18.5 17C20.43 17 22 15.43 22 13.43V12C22 6.48 17.52 2 12 2Z"/></svg>
            Чаты
        </a>
        <a href="#" class="tab-item" onclick="showPage('diary', this)">
            <svg viewBox="0 0 24 24"><path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM7 7H17V9H7V7ZM7 11H17V13H7V11ZM7 15H14V17H7V15Z"/></svg>
            Дневник
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed",
            measurementId: "G-GK4RMTBV4X"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // Функция для переключения страниц
        window.showPage = (pageId, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        };

        console.log("Firebase подключен! База готова к работе.");
    </script>
</body>
</html>
