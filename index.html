<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 22, 0.85); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: var(--sab); }
        
        .msg-bubble { max-width: 80%; position: relative; animation: slideUp 0.2s ease-out; user-select: none; -webkit-user-select: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .my-msg { background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 18px 18px 4px 18px; align-self: flex-end; }
        .other-msg { background: #1c1c1e; border-radius: 18px 18px 18px 4px; align-self: flex-start; }
        
        .admin-frame { border: 2px solid #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .admin-tag { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #ef4444; font-size: 8px; font-weight: 900; padding: 1px 6px; border-radius: 4px; }
        
        input[type="file"] { display: none; }
        .hidden { display: none !important; }
        #messages-flow { padding-bottom: 20px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-8 transition-opacity duration-300">
        <div class="w-full max-w-sm text-center">
            <img src="favicon.png" class="w-20 h-20 mx-auto rounded-3xl mb-4">
            <h1 class="text-3xl font-black mb-8">NeTelegram</h1>
            <form id="auth-form" class="space-y-3">
                <div id="reg-fields" class="space-y-3">
                    <input type="text" id="reg-nick" class="w-full p-4 bg-zinc-900 rounded-2xl outline-none" placeholder="Имя">
                </div>
                <input type="tel" id="reg-phone" class="w-full p-4 bg-zinc-900 rounded-2xl outline-none" placeholder="Телефон">
                <input type="password" id="reg-pass" class="w-full p-4 bg-zinc-900 rounded-2xl outline-none" placeholder="Пароль">
                <button type="submit" class="w-full bg-white text-black font-bold py-4 rounded-2xl mt-4">Далее</button>
            </form>
            <button id="toggle-auth" class="mt-6 text-blue-500 text-sm">Уже есть аккаунт? Войти</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-full">
        <header class="p-4 pt-[calc(1rem+var(--sat))] flex justify-between items-center border-b border-zinc-900">
            <h2 id="h-title" class="text-2xl font-black">Чаты</h2>
            <div id="h-avatar-wrap" class="relative">
                <img id="h-avatar" class="w-10 h-10 rounded-full object-cover bg-zinc-900">
            </div>
        </header>

        <div id="tab-chats" class="flex-1 overflow-y-auto">
            <div onclick="openChat('chat_8a')" class="p-4 flex items-center gap-4 active:bg-zinc-900 transition">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl">8А</div>
                <div class="flex-1 border-b border-zinc-900 pb-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">Беседа 8А</span>
                        <span class="text-[10px] text-blue-500 font-bold uppercase">Закреплено</span>
                    </div>
                    <p class="text-sm text-zinc-500 truncate">Нажми, чтобы открыть чат класса</p>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="hidden flex-1 overflow-y-auto p-6 space-y-6">
            <div class="flex flex-col items-center py-4">
                <div id="p-avatar-box" class="w-28 h-28 rounded-3xl relative mb-4">
                    <div id="p-admin-tag" class="admin-tag hidden">ADMIN</div>
                    <img id="p-avatar" class="w-full h-full rounded-3xl object-cover bg-zinc-900">
                </div>
                <h3 id="p-username" class="text-xl font-bold">...</h3>
                <p id="p-userphone" class="text-zinc-500 text-xs">...</p>
            </div>
            <div class="space-y-2">
                <button onclick="editData('username')" class="w-full p-4 bg-zinc-900 rounded-2xl flex justify-between text-sm"><span>Никнейм</span><span class="text-blue-500">Изм.</span></button>
                <button onclick="editData('password')" class="w-full p-4 bg-zinc-900 rounded-2xl flex justify-between text-sm"><span>Пароль</span><span class="text-blue-500">Изм.</span></button>
            </div>
            <button onclick="logout()" class="w-full p-4 text-red-500 font-bold bg-red-500/10 rounded-2xl">Выйти из аккаунта</button>
        </div>

        <nav class="glass flex justify-around p-3 pb-[calc(0.75rem+var(--sab))]">
            <button onclick="switchTab('chats')" id="nav-c" class="p-2 text-blue-500"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></button>
            <button onclick="switchTab('profile')" id="nav-p" class="p-2 text-zinc-600"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></button>
        </nav>
    </div>

    <div id="chat-win" class="hidden fixed inset-0 z-[110] bg-black flex flex-col">
        <header class="p-4 pt-[calc(1rem+var(--sat))] border-b border-zinc-900 flex items-center gap-4">
            <button onclick="closeChat()" class="text-blue-500"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg></button>
            <span class="font-bold">Беседа 8А</span>
        </header>
        <div id="chat-flow" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
        <form id="chat-form" class="p-3 pb-[calc(0.75rem+var(--sab))] bg-zinc-900 flex gap-2">
            <label class="p-3 text-blue-500"><input type="file" id="f-in" accept="image/*,video/*">📎</label>
            <input type="text" id="m-in" class="flex-1 bg-black rounded-xl px-4 outline-none text-sm" placeholder="Сообщение...">
            <button type="submit" class="bg-blue-600 p-3 rounded-xl">➤</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onChildAdded, onChildRemoved, onChildChanged, push, remove, update, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const conf = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };
        const app = initializeApp(conf);
        const db = getDatabase(app);
        let user = JSON.parse(localStorage.getItem('user_data')) || null;
        let isLogin = false;

        // AUTH LOGIC
        if (user) startApp();

        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('reg-fields').classList.toggle('hidden', isLogin);
            document.getElementById('toggle-auth').innerText = isLogin ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const ph = document.getElementById('reg-phone').value;
            const ps = document.getElementById('reg-pass').value;
            const ni = document.getElementById('reg-nick').value;
            
            if (isLogin) {
                const s = await get(child(ref(db), `users/${ph}`));
                if (s.exists() && s.val().password === ps) login(ph, s.val());
                else Swal.fire('Ошибка', 'Неверный вход', 'error');
            } else {
                const data = { username: ni, password: ps, photo: "", role: (ph === "+79225941382" ? "admin" : "user") };
                await set(ref(db, `users/${ph}`), data);
                login(ph, data);
            }
        };

        function login(ph, d) {
            const fullData = { ...d, phone: ph };
            localStorage.setItem('user_data', JSON.stringify(fullData));
            location.reload();
        }

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('h-avatar').src = user.photo || "favicon.png";
            document.getElementById('p-avatar').src = user.photo || "favicon.png";
            document.getElementById('p-username').innerText = user.username;
            document.getElementById('p-userphone').innerText = user.phone;
            if (user.role === 'admin') {
                document.getElementById('p-avatar-box').classList.add('admin-frame');
                document.getElementById('p-admin-tag').classList.remove('hidden');
                document.getElementById('h-avatar-wrap').classList.add('admin-frame', 'rounded-full');
            }
        }

        // TABS
        window.switchTab = (t) => {
            document.getElementById('tab-chats').classList.toggle('hidden', t !== 'chats');
            document.getElementById('tab-profile').classList.toggle('hidden', t !== 'profile');
            document.getElementById('h-title').innerText = t === 'chats' ? 'Чаты' : 'Профиль';
            document.getElementById('nav-c').classList.toggle('text-blue-500', t === 'chats');
            document.getElementById('nav-p').classList.toggle('text-blue-500', t === 'profile');
        };

        // CHAT LOGIC
        let chatRef = null;
        window.openChat = (id) => {
            document.getElementById('chat-win').classList.remove('hidden');
            document.getElementById('chat-flow').innerHTML = "";
            if (chatRef) off(chatRef);
            chatRef = ref(db, `messages/${id}`);
            
            onChildAdded(chatRef, (s) => renderMsg(s.key, s.val()));
            onChildRemoved(chatRef, (s) => document.getElementById(s.key)?.remove());
            onChildChanged(chatRef, (s) => {
                const el = document.getElementById(s.key);
                if (el) el.querySelector('.msg-text').innerText = s.val().text;
            });
        };

        function renderMsg(key, m) {
            const isMe = m.phone === user.phone;
            const html = `
                <div id="${key}" class="flex flex-col ${isMe ? 'items-end' : 'items-start'}" oncontextmenu="return false;">
                    <div class="msg-bubble p-3 ${isMe ? 'my-msg' : 'other-msg'}" data-key="${key}" data-text="${m.text}" data-owner="${isMe}">
                        ${!isMe ? `<span class="text-[10px] font-bold text-blue-400 block mb-1">${m.name}</span>` : ''}
                        ${m.file ? `<img src="${m.file}" class="rounded-lg mb-2 max-h-48 object-cover">` : ''}
                        <span class="msg-text text-sm">${m.text}</span>
                        <span class="text-[9px] opacity-40 block text-right mt-1">${m.time}</span>
                    </div>
                </div>
            `;
            document.getElementById('chat-flow').insertAdjacentHTML('beforeend', html);
            document.getElementById('chat-flow').scrollTo(0, document.getElementById('chat-flow').scrollHeight);
        }

        // LONG PRESS HANDLER
        let pressTimer;
        document.addEventListener('touchstart', (e) => {
            const bubble = e.target.closest('.msg-bubble');
            if (bubble) {
                pressTimer = setTimeout(() => handleLongPress(bubble), 800);
            }
        });
        document.addEventListener('touchend', () => clearTimeout(pressTimer));

        async function handleLongPress(el) {
            const key = el.dataset.key;
            const isMe = el.dataset.owner === "true" || user.role === 'admin';
            
            const actions = { 'copy': 'Копировать' };
            if (isMe) {
                actions['edit'] = 'Изменить';
                actions['delete'] = 'Удалить у всех';
            }

            const { value: action } = await Swal.fire({
                background: '#1c1c1e', color: '#fff',
                showConfirmButton: false,
                html: Object.entries(actions).map(([k, v]) => 
                    `<button onclick="Swal.clickConfirm(); window.doAction('${k}','${key}','${el.dataset.text}')" class="w-full p-4 text-left border-b border-zinc-800 last:border-0">${v}</button>`
                ).join('')
            });
        }

        window.doAction = async (act, key, oldText) => {
            if (act === 'delete') await remove(ref(db, `messages/chat_8a/${key}`));
            if (act === 'edit') {
                const { value: newT } = await Swal.fire({ title: 'Изменить', input: 'text', inputValue: oldText, background:'#111', color:'#fff' });
                if (newT) await update(ref(db, `messages/chat_8a/${key}`), { text: newT });
            }
            if (act === 'copy') navigator.clipboard.writeText(oldText);
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('m-in');
            const file = document.getElementById('f-in').files[0];
            const text = input.value.trim();
            if (!text && !file) return;

            const send = (f = "") => {
                push(ref(db, `messages/chat_8a`), {
                    phone: user.phone, name: user.username, text, file: f,
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                });
                input.value = ""; document.getElementById('f-in').value = "";
            };

            if (file) {
                const r = new FileReader();
                r.onload = () => send(r.result);
                r.readAsDataURL(file);
            } else send();
        };

        window.closeChat = () => { document.getElementById('chat-win').classList.add('hidden'); off(chatRef); };
        window.logout = () => { localStorage.clear(); location.reload(); };
        window.editData = async (f) => {
            const { value: v } = await Swal.fire({ title: `Новый ${f}`, input: 'text', background: '#111', color: '#fff' });
            if (v) {
                await update(ref(db, `users/${user.phone}`), { [f]: v });
                user[f] = v;
                localStorage.setItem('user_data', JSON.stringify(user));
                location.reload();
            }
        };
    </script>
</body>
</html>
