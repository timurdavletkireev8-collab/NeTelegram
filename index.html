<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0088cc;
            --bg: #000000;
            --surface: #1c1c1d;
            --text: #ffffff;
            --text-gray: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- РЕГИСТРАЦИЯ --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .auth-card {
            background: var(--surface); padding: 30px; border-radius: 28px; width: 100%; max-width: 400px;
            text-align: center; border: 1px solid #333;
        }
        .auth-input {
            width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: none;
            background: #2c2c2e; color: white; font-size: 1rem; outline: none;
        }
        .auth-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-weight: 700; font-size: 1rem;
        }

        /* --- ШАПКА И НАВИГАЦИЯ --- */
        header { padding: 12px 20px; background: var(--surface); display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid #333; }
        .logo { width: 32px; height: 32px; border-radius: 50%; }
        nav { display: flex; background: var(--surface); padding: 4px; border-bottom: 0.5px solid #333; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-gray); font-weight: 600; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); }

        /* --- СТРАНИЦЫ --- */
        .content { flex: 1; position: relative; }
        .page { position: absolute; inset: 0; display: none; flex-direction: column; }
        .page.active { display: flex; }

        /* --- СПИСОК ЧАТОВ --- */
        .chat-item {
            display: flex; align-items: center; padding: 15px 20px; gap: 15px; border-bottom: 0.5px solid #222;
        }
        .chat-icon { width: 52px; height: 52px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .chat-info h4 { margin: 0; font-size: 1.05rem; }
        .chat-info p { margin: 4px 0 0; color: var(--text-gray); font-size: 0.85rem; }

        /* --- ОКНО ЧАТА --- */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; }
        #chat-window.active { display: flex; }
        .chat-header { padding: 10px 15px; background: var(--surface); display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #333; }
        
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 16px; font-size: 0.95rem; position: relative; }
        .msg.my { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #212121; border-bottom-left-radius: 4px; }
        .msg-user { display: block; font-size: 0.75rem; color: #40a7e3; font-weight: 700; margin-bottom: 2px; }
        .msg-time { font-size: 0.6rem; opacity: 0.5; text-align: right; margin-top: 4px; }

        /* --- ВВОД (FIXED) --- */
        .input-area { background: var(--surface); padding: 10px 15px 35px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; background: #242425; border: none; color: white; padding: 12px 18px; border-radius: 22px; outline: none; }
        #send-btn { color: var(--primary); background: none; border: none; font-weight: 700; font-size: 1rem; }

        /* --- ДНЕВНИК --- */
        .diary-card { margin: auto; background: var(--surface); padding: 40px 20px; border-radius: 24px; text-align: center; width: 90%; border: 1px solid #333; }
        .diary-btn { display: inline-block; margin-top: 20px; background: var(--primary); color: white; text-decoration: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <img src="favicon.png" width="60" style="border-radius: 50%" onerror="this.style.display='none'">
            <h2>Ваше имя</h2>
            <p style="color: var(--text-gray)">Оно будет отображаться в чате класса</p>
            <input type="text" id="user-name-input" class="auth-input" placeholder="Введите имя..." maxlength="20">
            <button class="auth-btn" onclick="saveName()">Войти</button>
        </div>
    </div>

    <header>
        <img src="favicon.png" class="logo" onerror="this.src='https://ui-avatars.com/api/?name=NT&background=0088cc&color=fff'">
        <span style="font-weight: 700; font-size: 1.2rem">NeTelegram</span>
    </header>

    <nav>
        <button class="tab-btn active" id="t-chats" onclick="setTab('chats')">ЧАТЫ</button>
        <button class="tab-btn" id="t-diary" onclick="setTab('diary')">ДНЕВНИК</button>
    </nav>

    <div class="content">
        <div id="p-chats" class="page active">
            <div class="chat-item" onclick="toggleChat(true)">
                <div class="chat-icon">👥</div>
                <div class="chat-info">
                    <h4>БЕСЕДА 8А <span style="color:var(--primary)">📌</span></h4>
                    <p id="preview">Нажми, чтобы войти в чат</p>
                </div>
            </div>
        </div>

        <div id="p-diary" class="page">
            <div class="diary-card">
                <div style="font-size: 3rem">📓</div>
                <h2>Дневник</h2>
                <p style="color: var(--text-gray)">Портал образования Астраханской области</p>
                <a href="https://one.astrobl.ru/authorize" target="_blank" class="diary-btn">ОТКРЫТЬ</a>
            </div>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button onclick="toggleChat(false)" style="background:none; border:none; color:var(--primary); font-size: 1.5rem">←</button>
            <span style="font-weight: 700">БЕСЕДА 8А</span>
        </div>
        <div id="msg-container"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение" autocomplete="off">
            <button id="send-btn" onclick="send()">ОТПР.</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref('messages');

        let userName = localStorage.getItem('nt_user');

        // Проверка регистрации
        if (!userName) {
            document.getElementById('auth-screen').style.display = 'flex';
        }

        function saveName() {
            const val = document.getElementById('user-name-input').value.trim();
            if (val.length >= 2) {
                localStorage.setItem('nt_user', val);
                userName = val;
                document.getElementById('auth-screen').style.display = 'none';
            }
        }

        function setTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + t).classList.add('active');
            document.getElementById('t-' + t).classList.add('active');
        }

        function toggleChat(show) {
            document.getElementById('chat-window').classList.toggle('active', show);
        }

        function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (text) {
                chatRef.push({
                    user: userName,
                    text: text,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                input.value = '';
            }
        }

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send() };

        chatRef.limitToLast(50).on('child_added', (snap) => {
            const m = snap.val();
            const isMy = m.user === userName;
            const div = document.createElement('div');
            div.className = `msg ${isMy ? 'my' : 'other'}`;
            div.innerHTML = `
                <span class="msg-user">${isMy ? 'Вы' : m.user}</span>
                ${m.text}
                <div class="msg-time">${m.time}</div>
            `;
            const cont = document.getElementById('msg-container');
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
            document.getElementById('preview').innerText = `${m.user}: ${m.text.substring(0, 15)}...`;
        });
    </script>
</body>
</html>
