<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassMessenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <h2 id="auth-title" class="text-3xl font-bold text-center mb-6 text-blue-400">Регистрация</h2>
        
        <form id="auth-form" class="space-y-4">
            <div id="photo-section" class="flex flex-col items-center mb-4">
                <label for="avatar" class="cursor-pointer bg-slate-700 w-20 h-20 rounded-full flex items-center justify-center border-2 border-dashed border-blue-500 overflow-hidden">
                    <span id="photo-label" class="text-xs text-center p-1 text-slate-400">Фото</span>
                    <img id="preview" class="hidden w-full h-full object-cover">
                </label>
                <input type="file" id="avatar" accept="image/*" class="hidden">
            </div>

            <input type="text" id="nickname" placeholder="Никнейм" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-xl focus:outline-none focus:border-blue-500 transition">
            
            <input type="tel" id="phone" placeholder="Номер телефона (+7...)" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-xl focus:outline-none focus:border-blue-500 transition">
            
            <input type="password" id="password" placeholder="Пароль" class="w-full bg-slate-800 border border-slate-600 p-3 rounded-xl focus:outline-none focus:border-blue-500 transition">

            <button type="submit" id="main-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/20">
                Создать аккаунт
            </button>
        </form>

        <div class="mt-6 text-center">
            <p id="switch-text" class="text-slate-400">Уже есть аккаунт?</p>
            <button id="switch-mode" class="text-blue-400 font-semibold mt-1">Войти</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isLoginMode = false;

        const authTitle = document.getElementById('auth-title');
        const photoSection = document.getElementById('photo-section');
        const nicknameInput = document.getElementById('nickname');
        const mainBtn = document.getElementById('main-btn');
        const switchBtn = document.getElementById('switch-mode');
        const switchText = document.getElementById('switch-text');
        const authForm = document.getElementById('auth-form');

        // Переключение между Входом и Регистрацией
        switchBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.innerText = "Вход";
                photoSection.classList.add('hidden');
                nicknameInput.classList.add('hidden');
                mainBtn.innerText = "Войти";
                switchText.innerText = "Нет аккаунта?";
                switchBtn.innerText = "Зарегистрироваться";
            } else {
                authTitle.innerText = "Регистрация";
                photoSection.classList.remove('hidden');
                nicknameInput.classList.remove('hidden');
                mainBtn.innerText = "Создать аккаунт";
                switchText.innerText = "Уже есть аккаунт?";
                switchBtn.innerText = "Войти";
            }
        });

        // Превью фото
        document.getElementById('avatar').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('preview');
                img.src = reader.result;
                img.classList.remove('hidden');
                document.getElementById('photo-label').classList.add('hidden');
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // Логика формы
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('password').value.trim();
            const nick = nicknameInput.value.trim();

            if (!phone || !pass) return alert("Заполни поля!");

            const dbRef = ref(db);

            if (isLoginMode) {
                // ЛОГИКА ВХОДА
                try {
                    const snapshot = await get(child(dbRef, `users/${phone}`));
                    if (snapshot.exists() && snapshot.val().password === pass) {
                        alert(`Привет, ${snapshot.val().nickname}! Вход выполнен.`);
                        // Тут будет переход ко 2 этапу
                    } else {
                        alert("Неверный номер или пароль");
                    }
                } catch (error) { console.error(error); }
            } else {
                // ЛОГИКА РЕГИСТРАЦИИ
                if (!nick) return alert("Введи ник");
                
                try {
                    await set(ref(db, 'users/' + phone), {
                        nickname: nick,
                        password: pass,
                        phone: phone,
                        role: (phone === "+79225941382") ? "admin" : "user",
                        approved: (phone === "+79225941382")
                    });
                    alert("Регистрация успешна! Ждите подтверждения админом.");
                } catch (error) { alert("Ошибка при регистрации"); }
            }
        });
    </script>
</body>
</html>
