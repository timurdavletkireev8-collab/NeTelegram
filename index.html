<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; height: 100dvh; overflow: hidden; }

        /* Дизайн чата */
        .glass-header { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); padding-top: calc(10px + var(--sat)); }
        .msg-bubble { position: relative; max-width: 85%; padding: 12px 16px; border-radius: 22px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; touch-action: pan-y; }
        .my-msg { background: linear-gradient(135deg, #007AFF, #0055FF); align-self: flex-end; border-bottom-right-radius: 4px; }
        .other-msg { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Свайп влево */
        .swipe-container { transition: transform 0.2s ease-out; }
        .reply-indicator { position: absolute; right: -50px; top: 50%; transform: translateY(-50%); opacity: 0; transition: 0.2s; }

        /* Закрепленное сообщение сверху */
        #pin-bar { background: rgba(30, 30, 30, 0.9); border-bottom: 1px solid #333; display: none; }

        /* Аватарка с кнопкой редактирования */
        .avatar-container { position: relative; width: 120px; height: 120px; }
        .edit-icon { position: absolute; bottom: 0; right: 0; background: #007AFF; border-radius: 50%; padding: 8px; border: 3px solid #000; }
        
        /* Меню действий */
        .action-menu { background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
    </style>
</head>
<body class="flex flex-col">

    <header class="glass-header px-6 py-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-lg">N</div>
            <h1 class="text-xl font-bold tracking-tight">NeTelegram</h1>
        </div>
        <img id="top-avatar" class="w-10 h-10 rounded-full object-cover bg-zinc-800" onclick="switchTab('profile')">
    </header>

    <div id="pin-bar" class="px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2 border-l-2 border-blue-500 pl-2">
            <div>
                <p class="text-[10px] text-blue-500 font-bold uppercase">Закрепленное сообщение</p>
                <p id="pin-text" class="text-xs text-zinc-400 truncate w-60">...</p>
            </div>
        </div>
        <button onclick="unpin()" class="text-zinc-500">✕</button>
    </div>

    <main id="tab-chats" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
        </main>

    <div id="tab-profile" class="hidden flex-1 overflow-y-auto p-8 flex flex-col items-center">
        <div class="avatar-container mb-6">
            <img id="profile-img" class="w-full h-full rounded-full object-cover bg-zinc-900 shadow-2xl">
            <label class="edit-icon cursor-pointer">
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"></path></svg>
            </label>
        </div>
        <h2 id="display-name" class="text-2xl font-bold mb-8">Имя Пользователя</h2>
        <button onclick="logout()" class="w-full p-4 bg-red-500/10 text-red-500 font-bold rounded-2xl">Выйти</button>
    </div>

    <div id="reply-preview" class="px-4 py-2 bg-zinc-900 border-t border-white/5 hidden">
        <div class="flex items-center justify-between border-l-2 border-blue-500 pl-2">
            <div class="text-xs">
                <p class="text-blue-500 font-bold">Ответ пользователю</p>
                <p id="reply-text-preview" class="text-zinc-400 truncate"></p>
            </div>
            <button onclick="cancelReply()">✕</button>
        </div>
    </div>
    <form id="chat-form" class="p-4 bg-black flex gap-3 pb-[calc(1rem + var(--sab))]">
        <input type="text" id="m-in" class="flex-1 bg-zinc-900 rounded-2xl px-4 py-3 outline-none" placeholder="Сообщение...">
        <button type="submit" class="bg-blue-600 px-6 rounded-2xl font-bold">➤</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, onChildRemoved, onChildChanged, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const conf = { /* Твой конфиг Firebase */ };
        const app = initializeApp(conf);
        const db = getDatabase(app);
        
        let user = JSON.parse(localStorage.getItem('user_data'));
        let replyId = null;

        // 1. СМЕНА ФОТО (Пункт 3)
        document.getElementById('avatar-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result;
                await update(ref(db, `users/${user.phone}`), { photo: base64 });
                user.photo = base64;
                localStorage.setItem('user_data', JSON.stringify(user));
                location.reload();
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 2. ОТРИСОВКА И КЛИК (Пункт 4 и 5)
        function renderMsg(id, m) {
            const isMe = m.phone === user.phone;
            const isAdmin = user.role === 'admin';
            
            const html = `
                <div id="msg-${id}" class="swipe-container flex flex-col ${isMe ? 'items-end' : 'items-start'}" 
                     onclick="showActionMenu('${id}', '${m.text}', ${isMe})">
                    <div class="msg-bubble ${isMe ? 'my-msg' : 'other-msg'}">
                        ${m.replyText ? `<div class="text-[10px] opacity-60 border-l-2 pl-1 mb-1 italic">${m.replyText}</div>` : ''}
                        <span class="text-sm">${m.text}</span>
                        <span class="text-[9px] block text-right opacity-40 mt-1">${m.time}</span>
                    </div>
                </div>
            `;
            document.getElementById('tab-chats').insertAdjacentHTML('beforeend', html);
            initSwipe(id, m.text);
        }

        // 3. МЕНЮ ПО КЛИКУ (Пункт 4, 5, 7)
        window.showActionMenu = async (id, text, isMe) => {
            const isAdmin = user.role === 'admin';
            
            // Проверка прав (Пункт 5)
            const canEdit = isMe || isAdmin;

            let buttons = `<button onclick="Swal.clickConfirm(); copyText('${text}')" class="p-4 border-b border-white/5 w-full">Скопировать</button>`;
            
            if (canEdit) {
                buttons += `<button onclick="Swal.clickConfirm(); editMsg('${id}', '${text}')" class="p-4 border-b border-white/5 w-full text-blue-400">Изменить</button>`;
                buttons += `<button onclick="Swal.clickConfirm(); deleteMsg('${id}')" class="p-4 border-b border-white/5 w-full text-red-500">Удалить</button>`;
            }

            // Пункт 7: Закреп (Своё или если ты админ)
            if (isMe || isAdmin) {
                buttons += `<button onclick="Swal.clickConfirm(); pinMsg('${id}', '${text}')" class="p-4 w-full text-yellow-500">Закрепить</button>`;
            }

            Swal.fire({
                html: `<div class="flex flex-col">${buttons}</div>`,
                showConfirmButton: false,
                background: '#1c1c1e',
                color: '#fff',
                position: 'bottom',
                customClass: { popup: 'action-menu' }
            });
        };

        // 4. СВАЙП ВЛЕВО (Пункт 6)
        function initSwipe(id, text) {
            const el = document.getElementById(`msg-${id}`);
            let startX = 0;
            
            el.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
            el.addEventListener('touchmove', (e) => {
                let diff = e.touches[0].clientX - startX;
                if (diff < -50) { // Свайп влево
                    el.style.transform = `translateX(-40px)`;
                    if (!replyId) triggerReply(id, text);
                }
            });
            el.addEventListener('touchend', () => el.style.transform = `translateX(0)`);
        }

        function triggerReply(id, text) {
            replyId = id;
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('reply-text-preview').innerText = text;
        }

        // 5. ЗАКРЕП (Пункт 7.1)
        window.pinMsg = async (id, text) => {
            await set(ref(db, 'pinned_msg'), { id, text });
        };

        // Слушатель закрепа
        onChildChanged(ref(db, 'pinned_msg'), (s) => {
            const data = s.val();
            document.getElementById('pin-bar').style.display = 'flex';
            document.getElementById('pin-text').innerText = data.text;
        });

        // Вспомогательные функции
        window.deleteMsg = (id) => remove(ref(db, `messages/chat_8a/${id}`));
        window.editMsg = async (id, old) => {
            const { value: val } = await Swal.fire({ input: 'text', inputValue: old, background: '#111', color: '#fff' });
            if (val) update(ref(db, `messages/chat_8a/${id}`), { text: val });
        };
        window.copyText = (t) => navigator.clipboard.writeText(t);

    </script>
</body>
</html>
