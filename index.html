<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram | Орион Мессенджер</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Tailwind + библиотеки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <!-- Анимации и кастомный дизайн -->
    <style>
        /* ----- RESET / ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --bg-black: #010101;
            --bg-card: #0c0c0e;
            --bg-elevated: #131316;
            --accent-blue: #2a6ef0;
            --accent-glow: rgba(42,110,240,0.25);
            --border-light: rgba(255,255,255,0.06);
            --text-primary: #f0f3fa;
            --text-secondary: #8e8e93;
        }
        body {
            background: var(--bg-black);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }
        /* Стили скролла */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2c2c30; border-radius: 20px; }
        
        /* Glass эффекты */
        .glass-header {
            background: rgba(1, 1, 1, 0.82);
            backdrop-filter: blur(28px) saturate(200%);
            border-bottom: 0.5px solid var(--border-light);
            padding-top: calc(0.8rem + var(--sat));
        }
        .glass-nav {
            background: rgba(5, 5, 8, 0.94);
            backdrop-filter: blur(28px);
            border-top: 0.5px solid var(--border-light);
            padding-bottom: calc(0.6rem + var(--sab));
        }
        /* Сообщения */
        .msg-bubble {
            max-width: 84%;
            padding: 12px 18px;
            font-size: 15px;
            line-height: 1.45;
            letter-spacing: -0.2px;
            transition: 0.1s ease;
            will-change: transform;
        }
        .my-msg {
            background: var(--accent-blue);
            border-radius: 26px 26px 6px 26px;
            box-shadow: 0 6px 14px rgba(42,110,240,0.25);
        }
        .other-msg {
            background: var(--bg-elevated);
            border-radius: 26px 26px 26px 6px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        /* Аватар с админ-градиентом */
        .admin-ring {
            position: relative;
            background: linear-gradient(135deg, #FFB347, #FF5E00);
            border-radius: 50%;
            padding: 2px;
        }
        .admin-badge {
            position: absolute;
            bottom: -4px;
            right: -6px;
            background: #ff3b2f;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 30px;
            color: white;
            border: 1.5px solid black;
        }
        /* Анимации появления */
        .animate-message {
            animation: messagePop 0.22s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes messagePop {
            from { opacity: 0; transform: translateY(10px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* Табы и кнопки */
        .nav-tab {
            transition: all 0.2s ease;
        }
        .nav-tab.active {
            color: var(--accent-blue);
            filter: drop-shadow(0 0 6px rgba(42,110,240,0.5));
        }
        .tap-scale:active { transform: scale(0.96); transition: 0.05s; }
        /* Дневник карточки */
        .diary-entry {
            background: var(--bg-card);
            border-radius: 28px;
            border: 0.5px solid var(--border-light);
            transition: 0.2s;
        }
        /* Премиум закреп */
        .pin-bar {
            background: rgba(20, 22, 32, 0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--accent-blue);
            font-size: 13px;
            font-weight: 500;
        }
        /* Ответ на сообщение */
        .reply-quote {
            background: rgba(42,110,240,0.18);
            border-left: 3px solid var(--accent-blue);
            border-radius: 18px;
            padding: 6px 12px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        /* Скрытые классы */
        .hidden { display: none !important; }
        input, textarea { background: transparent; outline: none; }
        .bg-surface { background: var(--bg-card); }
    </style>
</head>
<body class="flex flex-col">

    <!-- ЭКРАН АВТОРИЗАЦИИ С ЛОГОТИПОМ -->
    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6 transition-all duration-700">
        <div class="w-full max-w-sm text-center">
            <div class="flex justify-center mb-5">
                <div class="w-28 h-28 rounded-[34px] bg-gradient-to-br from-[#2a6ef0] to-[#0f2d6e] flex items-center justify-center shadow-2xl shadow-blue-500/20">
                    <span class="text-6xl font-black tracking-tighter text-white">NT</span>
                </div>
            </div>
            <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-white to-zinc-300 bg-clip-text text-transparent">NeTelegram</h1>
            <p class="text-zinc-500 text-[11px] font-black uppercase tracking-[0.3em] mt-2">ORION EDITION</p>
            <form id="auth-form" class="mt-12 space-y-4">
                <div id="reg-fields" class="space-y-4">
                    <input type="text" id="reg-nick" class="w-full p-4 bg-[#0c0c0e] border border-white/10 rounded-2xl focus:border-[#2a6ef0] text-white placeholder:text-zinc-600" placeholder="Ваше имя">
                </div>
                <input type="tel" id="reg-phone" class="w-full p-4 bg-[#0c0c0e] border border-white/10 rounded-2xl focus:border-[#2a6ef0] text-white placeholder:text-zinc-600" placeholder="Номер телефона">
                <input type="password" id="reg-pass" class="w-full p-4 bg-[#0c0c0e] border border-white/10 rounded-2xl focus:border-[#2a6ef0] text-white placeholder:text-zinc-600" placeholder="Пароль">
                <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-2xl shadow-xl tap-scale mt-3">Продолжить</button>
            </form>
            <button id="toggle-auth" class="mt-6 text-zinc-400 text-sm font-medium">Уже есть аккаунт? <span class="text-[#2a6ef0]">Войти</span></button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ИНТЕРФЕЙС -->
    <div id="main-app" class="hidden flex-col h-full bg-[#010101]">
        <!-- Верхняя панель с аватаркой мессенджера -->
        <header class="glass-header px-5 py-3 flex justify-between items-center z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#2a6ef0] to-[#1447b0] flex items-center justify-center shadow-md">
                    <span class="font-black text-base">NT</span>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight">NeTelegram</h1>
                    <p class="text-[9px] text-[#2a6ef0] font-black uppercase">онлайн 24/7</p>
                </div>
            </div>
            <div id="global-avatar-wrap" class="tap-scale cursor-pointer" onclick="switchTab('profile')">
                <div id="global-admin-ring">
                    <img id="global-avatar" class="w-10 h-10 rounded-full object-cover border border-white/20 bg-zinc-800">
                </div>
            </div>
        </header>

        <!-- Вкладка ЧАТЫ -->
        <div id="tab-chats" class="flex-1 overflow-y-auto px-4 pt-4 pb-4">
            <div onclick="openChat('chat_8a')" class="bg-[#0c0c0e] rounded-3xl p-4 flex items-center gap-4 active:bg-white/5 tap-scale border border-white/5 mb-2">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2a6ef0] to-[#0f3b9e] flex items-center justify-center shadow-md">
                    <span class="font-black text-xl text-white">8А</span>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between">
                        <span class="font-extrabold text-[17px]">Беседа 8А</span>
                        <span class="text-[9px] text-[#2a6ef0] font-black bg-[#2a6ef0]/10 px-2 py-0.5 rounded-full">★ КЛАСС</span>
                    </div>
                    <p class="text-[13px] text-zinc-400 truncate">Главный чат сообщества</p>
                </div>
            </div>
            <div class="mt-6 text-center opacity-40 text-[11px] text-zinc-600">— защищённый канал —</div>
        </div>

        <!-- Вкладка ДНЕВНИК (личные записи) -->
        <div id="tab-diary" class="hidden flex-1 overflow-y-auto p-5 space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black tracking-tight">Дневник</h2>
                <button onclick="addDiaryEntry()" class="bg-[#2a6ef0] px-5 py-2 rounded-full text-xs font-bold tap-scale shadow">+ запись</button>
            </div>
            <div id="diary-list-container" class="space-y-4">
                <div class="diary-entry p-6 text-center text-zinc-500 text-sm">✦ пусто. создайте первую запись ✦</div>
            </div>
        </div>

        <!-- Вкладка ПРОФИЛЬ -->
        <div id="tab-profile" class="hidden flex-1 overflow-y-auto p-6 space-y-8">
            <div class="flex flex-col items-center">
                <div id="profile-avatar-wrapper" class="relative w-28 h-28 rounded-[2rem] mb-5 cursor-pointer tap-scale" onclick="changeProfilePhoto()">
                    <div id="profile-admin-badge" class="admin-badge hidden">ADMIN</div>
                    <img id="profile-avatar-img" class="w-full h-full rounded-[2rem] object-cover border-2 border-white/10 bg-zinc-900">
                </div>
                <h3 id="profile-username" class="text-2xl font-black">Загрузка...</h3>
                <p id="profile-phone" class="text-zinc-500 text-sm font-medium mt-1">----</p>
                <button onclick="changeProfilePhoto()" class="mt-4 text-[#2a6ef0] text-xs font-bold bg-white/5 px-5 py-2 rounded-full">обновить фото</button>
            </div>
            <div class="space-y-3">
                <div onclick="editData('username')" class="p-5 bg-[#0c0c0e] rounded-2xl flex justify-between tap-scale cursor-pointer border border-white/5">
                    <span class="font-semibold">Изменить имя</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <div onclick="editData('password')" class="p-5 bg-[#0c0c0e] rounded-2xl flex justify-between tap-scale cursor-pointer border border-white/5">
                    <span class="font-semibold">Сменить пароль</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <button onclick="logout()" class="w-full p-5 text-red-400 font-bold bg-red-500/10 rounded-2xl tap-scale border border-red-500/20">Выйти из аккаунта</button>
            </div>
        </div>

        <!-- Нижняя навигация: ЧАТЫ / ДНЕВНИК / ПРОФИЛЬ с фирменными иконками -->
        <nav class="glass-nav flex justify-around items-center px-6 py-2">
            <button onclick="switchTab('chats')" id="nav-chats-btn" class="nav-tab p-2 text-[#2a6ef0] tap-scale">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
            </button>
            <button onclick="switchTab('diary')" id="nav-diary-btn" class="nav-tab p-2 text-zinc-600 tap-scale">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 7h10v2H7zm0 4h10v2H7zm0 4h7v2H7z"/></svg>
            </button>
            <button onclick="switchTab('profile')" id="nav-profile-btn" class="nav-tab p-2 text-zinc-600 tap-scale">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>
        </nav>
    </div>

    <!-- ОКНО ЧАТА (8А) с расширенными функциями -->
    <div id="chat-window" class="hidden fixed inset-0 z-[150] bg-black flex flex-col">
        <header class="glass-header px-4 py-3 flex items-center gap-3">
            <button onclick="closeChatWindow()" class="p-2 text-[#2a6ef0] tap-scale">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-[#2a6ef0] to-[#0f3b9e] flex items-center justify-center">
                    <span class="font-black text-sm">8А</span>
                </div>
                <div>
                    <h3 class="font-black text-base">Беседа 8А</h3>
                    <p class="text-[9px] text-emerald-500 font-black">● в сети</p>
                </div>
            </div>
        </header>

        <!-- Панель закрепленного сообщения -->
        <div id="pinnedMsgBar" class="pin-bar hidden px-4 py-3" onclick="scrollToPinnedMsg()">
            <span class="font-black mr-1">📌</span> Закреплено: <span id="pinnedMsgText" class="font-medium text-sm"></span>
        </div>

        <!-- Область сообщений -->
        <div id="chatMessagesContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

        <!-- Превью ответа -->
        <div id="replyPreviewBlock" class="hidden px-4 pt-2 bg-[#0c0c0e] border-t border-white/5">
            <div class="reply-quote flex justify-between items-center">
                <div><span class="font-extrabold text-[#2a6ef0]" id="replyPreviewName"></span> <span class="text-zinc-300 text-sm" id="replyPreviewText"></span></div>
                <button onclick="cancelReply()" class="text-xs bg-white/10 px-3 py-1 rounded-full">отмена</button>
            </div>
        </div>

        <!-- Форма ввода -->
        <form id="chatSendForm" class="p-3 bg-black border-t border-white/5 flex items-end gap-2 pb-[calc(0.8rem+var(--sab))]">
            <label class="p-3 bg-[#0f0f12] rounded-2xl tap-scale">
                <input type="file" id="chatFileInput" class="hidden" accept="image/*,video/*">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
            </label>
            <div class="flex-1 bg-[#0f0f12] rounded-2xl px-4 py-2.5 border border-white/5">
                <input type="text" id="chatMessageInput" class="w-full bg-transparent outline-none text-sm placeholder:text-zinc-600" placeholder="Сообщение..." autocomplete="off">
            </div>
            <button type="submit" class="bg-[#2a6ef0] p-3.5 rounded-2xl tap-scale shadow-md">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </form>
    </div>

    <!-- ПОДКЛЮЧЕНИЕ FIREBASE И ВСЯ ЛОГИКА -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onChildAdded, onChildRemoved, onChildChanged, push, remove, update, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = JSON.parse(localStorage.getItem('user_data'));
        let isLoginMode = false;
        if(currentUser) initAppUI();

        // АВТОРИЗАЦИЯ
        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('toggle-auth').innerHTML = isLoginMode ? 'Нет аккаунта? <span class="text-[#2a6ef0]">Регистрация</span>' : 'Уже есть аккаунт? <span class="text-[#2a6ef0]">Войти</span>';
        };
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const phone = document.getElementById('reg-phone').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            const name = document.getElementById('reg-nick').value.trim();
            if(isLoginMode) {
                const snapshot = await get(child(ref(db), `users/${phone}`));
                if(snapshot.exists() && snapshot.val().password === pass) authenticate(phone, snapshot.val());
                else Swal.fire({ icon:'error', title:'Ошибка', text:'Неверные данные', background:'#0c0c0e', color:'#fff' });
            } else {
                if(!name || !phone) return Swal.fire('Ошибка', 'Заполните имя и телефон', 'warning');
                const userData = { username: name, password: pass, photo: "", role: phone === "+79225941382" ? "admin" : "user" };
                await set(ref(db, `users/${phone}`), userData);
                authenticate(phone, userData);
            }
        };
        function authenticate(phone, data) {
            localStorage.setItem('user_data', JSON.stringify({ ...data, phone }));
            location.reload();
        }
        
        function initAppUI() {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }, 400);
            // аватары глобальные
            const avatarUrl = currentUser.photo || 'favicon.png';
            document.getElementById('global-avatar').src = avatarUrl;
            document.getElementById('profile-avatar-img').src = avatarUrl;
            document.getElementById('profile-username').innerText = currentUser.username;
            document.getElementById('profile-phone').innerText = currentUser.phone;
            if(currentUser.role === 'admin') {
                document.getElementById('global-admin-ring').classList.add('admin-ring');
                document.getElementById('profile-admin-badge').classList.remove('hidden');
            }
            loadDiaryEntriesUI();
        }

        // УПРАВЛЕНИЕ ТАБАМИ (Чаты / Дневник / Профиль)
        window.switchTab = (tabId) => {
            document.getElementById('tab-chats').classList.toggle('hidden', tabId !== 'chats');
            document.getElementById('tab-diary').classList.toggle('hidden', tabId !== 'diary');
            document.getElementById('tab-profile').classList.toggle('hidden', tabId !== 'profile');
            const chatsBtn = document.getElementById('nav-chats-btn');
            const diaryBtn = document.getElementById('nav-diary-btn');
            const profBtn = document.getElementById('nav-profile-btn');
            [chatsBtn, diaryBtn, profBtn].forEach(btn => btn.classList.remove('active', 'text-[#2a6ef0]'));
            if(tabId === 'chats') { chatsBtn.classList.add('active', 'text-[#2a6ef0]'); }
            else if(tabId === 'diary') { diaryBtn.classList.add('active', 'text-[#2a6ef0]'); loadDiaryEntriesUI(); }
            else { profBtn.classList.add('active', 'text-[#2a6ef0]'); }
        };
        
        // ДНЕВНИК (CRUD)
        async function loadDiaryEntriesUI() {
            const diaryRef = ref(db, `diary/${currentUser.phone}`);
            const snap = await get(diaryRef);
            const container = document.getElementById('diary-list-container');
            if(!snap.exists() || Object.keys(snap.val()).length === 0) {
                container.innerHTML = `<div class="diary-entry p-6 text-center text-zinc-500 text-sm">✦ нет записей. нажми +</div>`;
                return;
            }
            const entries = Object.entries(snap.val()).map(([id,val]) => ({ id, ...val })).sort((a,b)=>b.timestamp - a.timestamp);
            container.innerHTML = entries.map(entry => `
                <div class="diary-entry p-5 space-y-2" data-id="${entry.id}">
                    <div class="flex justify-between items-center"><span class="text-[10px] text-zinc-500 font-bold">${new Date(entry.timestamp).toLocaleString()}</span>
                    <button onclick="deleteDiary('${entry.id}')" class="text-red-400 text-xs bg-red-500/20 px-2 py-1 rounded-full">🗑</button></div>
                    <p class="text-white text-sm leading-relaxed">${escapeHtml(entry.content)}</p>
                </div>
            `).join('');
        }
        window.addDiaryEntry = async () => {
            const { value: text } = await Swal.fire({ title: 'Новая мысль', input: 'textarea', background: '#0c0c0e', color: '#fff' });
            if(text) {
                await push(ref(db, `diary/${currentUser.phone}`), { content: text, timestamp: Date.now() });
                loadDiaryEntriesUI();
                Swal.fire({ toast:true, icon:'success', title:'Сохранено', timer:1000, background:'#0c0c0e' });
            }
        };
        window.deleteDiary = async (id) => { await remove(ref(db, `diary/${currentUser.phone}/${id}`)); loadDiaryEntriesUI(); };
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        // ФОТО ПРОФИЛЯ
        window.changeProfilePhoto = async () => {
            const { value: url } = await Swal.fire({ title: 'URL фото', input: 'text', background: '#0c0c0e', color: '#fff' });
            if(url && url.startsWith('http')) {
                await update(ref(db, `users/${currentUser.phone}`), { photo: url });
                currentUser.photo = url;
                localStorage.setItem('user_data', JSON.stringify(currentUser));
                location.reload();
            }
        };
        
        // РЕДАКТИРОВАНИЕ ДАННЫХ
        window.editData = async (field) => {
            const { value: newVal } = await Swal.fire({ title: `Новый ${field}`, input: 'text', background: '#0c0c0e', color: '#fff' });
            if(newVal) {
                await update(ref(db, `users/${currentUser.phone}`), { [field]: newVal });
                currentUser[field] = newVal;
                localStorage.setItem('user_data', JSON.stringify(currentUser));
                location.reload();
            }
        };
        
        // ЧАТ: ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        let activeChatRef = null;
        let replyToMsg = null;
        let pinnedMsgId = null;
        const CHAT_ID = 'chat_8a';
        
        window.openChat = async () => {
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chatMessagesContainer').innerHTML = '';
            if(activeChatRef) off(activeChatRef);
            await loadPinnedStatus();
            activeChatRef = ref(db, `messages/${CHAT_ID}`);
            onChildAdded(activeChatRef, (snap) => renderChatMessage(snap.key, snap.val()));
            onChildRemoved(activeChatRef, (snap) => document.getElementById(snap.key)?.remove());
            onChildChanged(activeChatRef, (snap) => { const el = document.getElementById(snap.key); if(el) el.querySelector('.msg-text') && (el.querySelector('.msg-text').innerText = snap.val().text); });
        };
        async function loadPinnedStatus() {
            const pinSnap = await get(ref(db, `pinned/${CHAT_ID}`));
            if(pinSnap.exists()) {
                const pin = pinSnap.val();
                pinnedMsgId = pin.id;
                document.getElementById('pinnedMsgText').innerText = pin.text.length > 55 ? pin.text.slice(0,55)+'...' : pin.text;
                document.getElementById('pinnedMsgBar').classList.remove('hidden');
            } else { document.getElementById('pinnedMsgBar').classList.add('hidden'); pinnedMsgId = null; }
        }
        window.scrollToPinnedMsg = () => { if(pinnedMsgId && document.getElementById(pinnedMsgId)) document.getElementById(pinnedMsgId).scrollIntoView({ behavior:'smooth', block:'center' }); };
        
        function renderChatMessage(msgId, msgData) {
            const isMy = msgData.phone === currentUser.phone;
            const replyBlock = msgData.replyTo ? `<div class="reply-quote text-[11px] mb-1">↩️ ${msgData.replyTo.name}: ${msgData.replyTo.text.substring(0,40)}</div>` : '';
            const mediaHtml = msgData.file ? `<img src="${msgData.file}" class="rounded-xl mb-2 max-h-48 object-cover">` : '';
            const messageDiv = document.createElement('div');
            messageDiv.id = msgId;
            messageDiv.className = `flex flex-col ${isMy ? 'items-end' : 'items-start'} animate-message`;
            messageDiv.setAttribute('data-msg-id', msgId);
            messageDiv.setAttribute('data-msg-name', msgData.name);
            messageDiv.innerHTML = `
                <div class="msg-bubble ${isMy ? 'my-msg' : 'other-msg'}" data-id="${msgId}" data-text="${escapeHtml(msgData.text)}" data-me="${isMy}" data-phone="${msgData.phone}">
                    ${!isMy ? `<div class="text-[10px] font-black text-[#6e9eff] mb-1">${msgData.name}</div>` : ''}
                    ${replyBlock}
                    ${mediaHtml}
                    <div class="msg-text">${escapeHtml(msgData.text)}</div>
                    <div class="text-[9px] opacity-40 text-right mt-1">${msgData.time}</div>
                </div>
            `;
            document.getElementById('chatMessagesContainer').appendChild(messageDiv);
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            // Свайп влево для ответа
            let startTx = 0;
            messageDiv.addEventListener('touchstart', (e) => { startTx = e.touches[0].clientX; });
            messageDiv.addEventListener('touchend', (e) => { if(e.changedTouches[0].clientX - startTx < -45) { setReplyTarget(msgId, msgData.text, msgData.name); } });
        }
        
        function setReplyTarget(id, text, name) { replyToMsg = { id, text, name }; document.getElementById('replyPreviewName').innerText = name; document.getElementById('replyPreviewText').innerText = text.length>50?text.slice(0,50)+'...':text; document.getElementById('replyPreviewBlock').classList.remove('hidden'); }
        window.cancelReply = () => { replyToMsg = null; document.getElementById('replyPreviewBlock').classList.add('hidden'); };
        
        // Контекстное меню по клику на сообщении
        document.addEventListener('click', (e) => {
            const bubble = e.target.closest('.msg-bubble');
            if(!bubble || !document.getElementById('chat-window').classList.contains('hidden')) return;
            const id = bubble.dataset.id, text = bubble.dataset.text, isMe = bubble.dataset.me === "true", msgPhone = bubble.dataset.phone;
            const canEditDel = isMe || currentUser.role === 'admin';
            Swal.fire({ background:'#0c0c0e', color:'#fff', showConfirmButton:false, showCloseButton:true, html:`
                <div class="flex flex-col gap-2 text-left">
                    <button onclick="Swal.close(); copyMsgText('${text.replace(/'/g, "\\'")}')" class="p-3 rounded-xl bg-white/5">📋 Копировать</button>
                    <button onclick="Swal.close(); replyContext('${id}','${text.replace(/'/g, "\\'")}','${bubble.closest('[data-msg-id]')?.getAttribute('data-msg-name') || ''}')" class="p-3 rounded-xl bg-white/5">↩️ Ответить</button>
                    ${isMe ? `<button onclick="Swal.close(); pinCurrentMessage('${id}','${text.replace(/'/g, "\\'")}')" class="p-3 rounded-xl bg-white/5">📌 Закрепить</button>` : ''}
                    ${canEditDel ? `<button onclick="Swal.close(); editMessageById('${id}','${text.replace(/'/g, "\\'")}')" class="p-3 rounded-xl bg-white/5">✏️ Изменить</button>` : ''}
                    ${canEditDel ? `<button onclick="Swal.close(); deleteMessageById('${id}')" class="p-3 rounded-xl bg-red-500/20 text-red-400">🗑️ Удалить</button>` : ''}
                </div>
            `});
        });
        window.copyMsgText = (t) => { navigator.clipboard.writeText(t); Swal.fire({ toast:true, icon:'success', title:'Скопировано', timer:900, background:'#0c0c0e' }); };
        window.replyContext = (id, txt, name) => { setReplyTarget(id, txt, name); Swal.close(); };
        window.deleteMessageById = async (id) => { await remove(ref(db, `messages/${CHAT_ID}/${id}`)); if(pinnedMsgId === id) await remove(ref(db, `pinned/${CHAT_ID}`)); };
        window.editMessageById = async (id, oldText) => { const { value: newText } = await Swal.fire({ input:'text', inputValue:oldText, background:'#0c0c0e', color:'#fff' }); if(newText) await update(ref(db, `messages/${CHAT_ID}/${id}`), { text: newText }); };
        window.pinCurrentMessage = async (id, text) => { await set(ref(db, `pinned/${CHAT_ID}`), { id, text }); pinnedMsgId = id; document.getElementById('pinnedMsgText').innerText = text; document.getElementById('pinnedMsgBar').classList.remove('hidden'); Swal.fire({ toast:true, icon:'success', title:'Закреплено!' }); };
        
        document.getElementById('chatSendForm').onsubmit = async (e) => {
            e.preventDefault();
            const inputField = document.getElementById('chatMessageInput');
            const fileInput = document.getElementById('chatFileInput');
            const text = inputField.value.trim();
            const file = fileInput.files[0];
            if(!text && !file) return;
            const sendMsg = async (fileBase64 = "") => {
                const replyPayload = replyToMsg ? { id: replyToMsg.id, text: replyToMsg.text, name: replyToMsg.name } : null;
                await push(ref(db, `messages/${CHAT_ID}`), {
                    phone: currentUser.phone, name: currentUser.username, text: text, file: fileBase64,
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    replyTo: replyPayload
                });
                inputField.value = ""; fileInput.value = ""; cancelReply();
            };
            if(file) { const reader = new FileReader(); reader.onload = () => sendMsg(reader.result); reader.readAsDataURL(file); }
            else sendMsg();
        };
        window.closeChatWindow = () => { document.getElementById('chat-window').classList.add('hidden'); if(activeChatRef) off(activeChatRef); cancelReply(); };
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
