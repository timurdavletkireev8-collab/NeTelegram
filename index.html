<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0088cc; /* Классический цвет Telegram */
            --bg-dark: #0f0f0f;
            --surface: #1c1c1d;
            --text: #ffffff;
            --my-msg: #2b5278;
            --other-msg: #212121;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text);
            /* Решение проблемы с адресной строкой на мобильных */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Шапка */
        header {
            padding: 10px 15px;
            background: var(--surface);
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2d2d2d;
        }

        .header-content { display: flex; align-items: center; gap: 12px; }

        .logo {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }

        .brand { font-weight: 600; font-size: 1.2rem; }

        /* Вкладки */
        nav {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid #2d2d2d;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: none;
            color: #aaaaaa;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* Контейнер */
        .app-body { flex: 1; position: relative; overflow: hidden; }

        .tab-page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .tab-page.active { display: flex; }

        /* Закрепленный чат */
        .pinned-bar {
            background: #17212b;
            padding: 8px 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #2d2d2d;
            color: var(--primary);
        }

        /* Чат */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Темный паттерн */
            background-size: contain;
        }

        .msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .msg.my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--other-msg); border-bottom-left-radius: 4px; }

        .msg-info {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 2px;
            opacity: 0.6;
            font-weight: bold;
        }

        /* Поле ввода (с фиксом под мобилы) */
        .input-bar {
            background: var(--surface);
            padding: 10px 15px 25px 15px; /* Увеличили нижний отступ для мобильных браузеров */
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            background: #242425;
            border: 1px solid #333;
            color: white;
            padding: 12px 18px;
            border-radius: 22px;
            outline: none;
        }

        #send-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Дневник (iframe) */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <img src="favicon.png" class="logo" alt="logo">
            <span class="brand">NeTelegram</span>
        </div>
    </header>

    <nav>
        <button class="tab-btn active" onclick="showTab('chat-page')">ЧАТЫ</button>
        <button class="tab-btn" onclick="showTab('diary-page')">ДНЕВНИК</button>
    </nav>

    <div class="app-body">
        
        <div id="chat-page" class="tab-page active">
            <div class="pinned-bar">
                📌 <b>БЕСЕДА 8А</b>
            </div>
            <div id="chat-container">
                </div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Сообщение" autocomplete="off">
                <button id="send-btn">ОТПР.</button>
            </div>
        </div>

        <div id="diary-page" class="tab-page">
            <iframe src="https://one.astrobl.ru/authorize"></iframe>
        </div>

    </div>

    <script>
        // --- Настройки Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref('messages');

        // Имя для чата (можно заменить на prompt)
        const myName = "Ученик"; 

        const container = document.getElementById('chat-container');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        // Отправка данных
        function sendMessage() {
            const val = input.value.trim();
            if(val) {
                chatRef.push({
                    user: myName,
                    text: val,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                input.value = '';
                // Скрываем клавиатуру на мобилках после отправки (опционально)
                // input.blur(); 
            }
        }

        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage() };

        // Получение данных
        chatRef.limitToLast(40).on('child_added', (snap) => {
            const data = snap.val();
            const isMy = data.user === myName;
            const div = document.createElement('div');
            div.className = `msg ${isMy ? 'my' : 'other'}`;
            div.innerHTML = `
                <span class="msg-info">${isMy ? 'Вы' : data.user} • ${data.time}</span>
                ${data.text}
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });

        // Переключение вкладок
        function showTab(tabId) {
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
