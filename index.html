<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTelegram</title>
<link rel="icon" href="favicon.png">

<!-- Firebase Compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#000;color:#fff;height:100dvh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;}

header{position:sticky;top:0;background:#1c1c1d;padding:12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #333;z-index:10;}
header img{width:28px;height:28px;}
header h1{font-size:18px;}

.tabs{display:flex;background:#1c1c1d;}
.tab{flex:1;text-align:center;padding:12px;cursor:pointer;color:#aaa;}
.tab.active{color:#0088cc;border-bottom:2px solid #0088cc;}

.page{flex:1;overflow:auto;display:none;padding:10px;}
.page.active{display:block;animation:fade .3s;}
@keyframes fade{from{opacity:0}to{opacity:1}}

.chat-item{background:#1c1c1d;padding:15px;border-radius:12px;margin-bottom:10px;cursor:pointer;}

.diary-card{background:#1c1c1d;padding:20px;border-radius:16px;text-align:center;margin-top:30px;}
button{background:#0088cc;border:none;padding:12px 18px;border-radius:10px;color:#fff;font-size:16px;cursor:pointer;}

.chat-window{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:20;}
.chat-window.active{display:flex;}
.chat-header{background:#1c1c1d;padding:10px;display:flex;align-items:center;gap:10px;}
.back{cursor:pointer;color:#0088cc;}

.messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:75%;padding:10px;border-radius:12px;font-size:14px;animation:pop .2s ease;}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

.mine{align-self:flex-end;background:#0088cc;}
.other{align-self:flex-start;background:#1c1c1d;}

.input-area{padding:10px 10px 40px;background:#1c1c1d;display:flex;gap:8px;}
.input-area input{flex:1;padding:10px;border-radius:10px;border:none;background:#2a2a2a;color:#fff;}

.modal{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:50;}
.modal-box{background:#1c1c1d;padding:20px;border-radius:16px;width:80%;text-align:center;}
.modal input{margin-top:10px;padding:10px;width:100%;border-radius:10px;border:none;background:#2a2a2a;color:#fff;}
</style>
</head>
<body>
<div class="app">
<header>
<img src="favicon.png">
<h1>NeTelegram</h1>
</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('chats')">ЧАТЫ</div>
<div class="tab" onclick="switchTab('diary')">ДНЕВНИК</div>
</div>

<div id="chats" class="page active">
<div class="chat-item" onclick="openChat()">БЕСЕДА 8А 📌</div>
</div>

<div id="diary" class="page">
<div class="diary-card">
<h3>Школьный дневник</h3>
<br>
<button onclick="window.open('https://one.astrobl.ru/authorize','_blank')">ОТКРЫТЬ ДНЕВНИК</button>
</div>
</div>
</div>

<div id="chatWindow" class="chat-window">
<div class="chat-header">
<span class="back" onclick="closeChat()">← Назад</span>
<h3>БЕСЕДА 8А</h3>
</div>
<div id="messages" class="messages"></div>
<div class="input-area">
<input id="msgInput" placeholder="Сообщение...">
<button onclick="sendMessage()">➤</button>
</div>
</div>

<div id="modal" class="modal" style="display:none;">
<div class="modal-box">
<h3>Введите имя</h3>
<input id="nameInput" placeholder="Ваше имя">
<br><br>
<button onclick="saveName()">Продолжить</button>
</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
authDomain: "netelegram-d8c52.firebaseapp.com",
databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
projectId: "netelegram-d8c52",
storageBucket: "netelegram-d8c52.firebasestorage.app",
messagingSenderId: "214817548440",
appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem('name');
if(!username){document.getElementById('modal').style.display='flex';}

function saveName(){
const name=document.getElementById('nameInput').value.trim();
if(name){localStorage.setItem('name',name);username=name;document.getElementById('modal').style.display='none';}
}

function switchTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(tab).classList.add('active');
}

function openChat(){document.getElementById('chatWindow').classList.add('active');}
function closeChat(){document.getElementById('chatWindow').classList.remove('active');}

function sendMessage(){
const input=document.getElementById('msgInput');
const text=input.value.trim();
if(!text)return;

const msg={name:username,text:text,time:Date.now()};
db.ref('messages').push(msg);
input.value='';
}

const messagesDiv=document.getElementById('messages');

db.ref('messages').on('child_added',snap=>{
const m=snap.val();
const div=document.createElement('div');
div.className='msg '+(m.name===username?'mine':'other');

const time=new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

div.innerHTML=`<b>${m.name}</b><br>${m.text}<br><small>${time}</small>`;
messagesDiv.appendChild(div);
messagesDiv.scrollTop=messagesDiv.scrollHeight;
});
</script>
</body>
</html>
