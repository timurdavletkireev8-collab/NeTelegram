<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram Premium</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0088cc;
            --bg: #000000;
            --surface: #1c1c1d;
            --text: #ffffff;
            --text-gray: #8e8e93;
            --my-msg: #2b5278;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ЭКРАН РЕГИСТРАЦИИ */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px;
        }
        .auth-card {
            background: var(--surface); padding: 35px 25px; border-radius: 30px; width: 100%; max-width: 360px;
            text-align: center; border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
        .auth-input {
            width: 100%; padding: 16px; margin: 20px 0; border-radius: 14px; border: 2px solid #333;
            background: #2c2c2e; color: white; font-size: 1rem; outline: none; text-align: center;
        }
        .auth-btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: white; font-weight: 700; font-size: 1rem; cursor: pointer;
        }

        /* ШАПКА */
        header { 
            padding: 12px 20px; background: var(--surface); 
            display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid #333; 
        }
        .logo { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
        
        nav { display: flex; background: var(--surface); padding: 4px; border-bottom: 0.5px solid #333; }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; background: none; 
            color: var(--text-gray); font-weight: 600; font-size: 0.85rem; 
        }
        .tab-btn.active { color: var(--primary); }

        /* КОНТЕНТ */
        .main-area { flex: 1; position: relative; }
        .page { position: absolute; inset: 0; display: none; flex-direction: column; }
        .page.active { display: flex; }

        /* СПИСОК ЧАТОВ */
        .chat-row {
            display: flex; align-items: center; padding: 16px 20px; gap: 15px; 
            border-bottom: 0.5px solid #222; cursor: pointer;
        }
        .chat-row:active { background: #1a1a1a; }
        .chat-avatar { 
            width: 54px; height: 54px; background: linear-gradient(135deg, #0088cc, #005580); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
        }
        .chat-meta h4 { margin: 0; font-size: 1.05rem; display: flex; align-items: center; gap: 5px; }
        .chat-meta p { margin: 4px 0 0; color: var(--text-gray); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* ОКНО ЧАТА */
        #chat-window { 
            position: fixed; inset: 0; background: var(--bg); z-index: 500; 
            display: none; flex-direction: column; transition: 0.3s;
        }
        #chat-window.active { display: flex; }
        .chat-header { 
            padding: 10px 15px; background: var(--surface); display: flex; 
            align-items: center; gap: 15px; border-bottom: 0.5px solid #333; 
        }
        
        #msg-container { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 10px; background: #000;
        }
        .msg-bubble { 
            max-width: 80%; padding: 10px 14px; border-radius: 18px; 
            font-size: 0.95rem; line-height: 1.4; position: relative;
        }
        .msg-bubble.my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg-bubble.other { align-self: flex-start; background: #212121; border-bottom-left-radius: 4px; }
        
        .msg-user { display: block; font-size: 0.75rem; color: #40a7e3; font-weight: 700; margin-bottom: 2px; }
        .msg-time { font-size: 0.6rem; opacity: 0.4; text-align: right; margin-top: 4px; }

        /* ВВОД (УЛУЧШЕННЫЙ ДЛЯ ТЕЛЕФОНА) */
        .bottom-input { 
            background: var(--surface); padding: 12px 15px 35px; 
            display: flex; gap: 12px; align-items: center; border-top: 0.5px solid #333;
        }
        #input-field { 
            flex: 1; background: #242425; border: none; color: white; 
            padding: 12px 18px; border-radius: 22px; outline: none; font-size: 1rem;
        }
        #btn-send { color: var(--primary); background: none; border: none; font-weight: 800; font-size: 1rem; }

        /* ДНЕВНИК */
        .diary-content { margin: auto; text-align: center; width: 90%; }
        .diary-btn { 
            display: block; background: var(--primary); color: white; 
            text-decoration: none; padding: 18px; border-radius: 16px; font-weight: 700; margin-top: 25px;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="margin-top:0">NeTelegram</h1>
            <p style="color: var(--text-gray)">Введите ваше реальное имя для чата 8А класса</p>
            <input type="text" id="reg-name" class="auth-input" placeholder="Иван Иванов" maxlength="15">
            <button class="auth-btn" onclick="performAuth()">Войти в систему</button>
        </div>
    </div>

    <header>
        <img src="favicon.png" class="logo" onerror="this.src='https://ui-avatars.com/api/?name=NT&background=0088cc&color=fff'">
        <span style="font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px;">NeTelegram</span>
    </header>

    <nav>
        <button class="tab-btn active" id="tab-c" onclick="switchPage('chats')">ЧАТЫ</button>
        <button class="tab-btn" id="tab-d" onclick="switchPage('diary')">ДНЕВНИК</button>
    </nav>

    <div class="main-area">
        <div id="page-chats" class="page active">
            <div class="chat-row" onclick="openFullChat(true)">
                <div class="chat-avatar">👥</div>
                <div class="chat-meta">
                    <h4>БЕСЕДА 8А <span style="color:var(--primary)">📌</span></h4>
                    <p id="chat-preview">Нажмите, чтобы войти в беседу</p>
                </div>
            </div>
        </div>

        <div id="page-diary" class="page">
            <div class="diary-content">
                <div style="font-size: 4rem">📚</div>
                <h2 style="margin: 10px 0">Дневник</h2>
                <p style="color: var(--text-gray)">Портал образования Астраханской области</p>
                <a href="https://one.astrobl.ru/authorize" target="_blank" class="diary-btn">ОТКРЫТЬ ДНЕВНИК</a>
            </div>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button onclick="openFullChat(false)" style="background:none; border:none; color:var(--primary); font-size: 1.8rem; cursor:pointer;">←</button>
            <span style="font-weight: 700">БЕСЕДА 8А</span>
        </div>
        <div id="msg-container"></div>
        <div class="bottom-input">
            <input type="text" id="input-field" placeholder="Сообщение" autocomplete="off">
            <button id="btn-send" onclick="sendToFirebase()">ОТПР.</button>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed",
            measurementId: "G-GK4RMTBV4X"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatRef = database.ref('messages');

        // РЕГИСТРАЦИЯ
        let currentUserName = localStorage.getItem('nt_username');

        if (!currentUserName) {
            document.getElementById('auth-screen').style.display = 'flex';
        }

        function performAuth() {
            const nameInput = document.getElementById('reg-name').value.trim();
            if (nameInput.length >= 2) {
                localStorage.setItem('nt_username', nameInput);
                currentUserName = nameInput;
                document.getElementById('auth-screen').style.display = 'none';
            } else {
                alert("Введите нормальное имя");
            }
        }

        // НАВИГАЦИЯ
        function switchPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('tab-' + p[0]).classList.add('active');
        }

        function openFullChat(state) {
            const win = document.getElementById('chat-window');
            win.style.display = state ? 'flex' : 'none';
            if(state) {
                const cont = document.getElementById('msg-container');
                cont.scrollTop = cont.scrollHeight;
            }
        }

        // РАБОТА С REALTIME DATABASE
        function sendToFirebase() {
            const field = document.getElementById('input-field');
            const text = field.value.trim();
            
            if (text !== "") {
                chatRef.push({
                    user: currentUserName,
                    text: text,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                field.value = "";
            }
        }

        // Слушаем Enter
        document.getElementById('input-field').onkeypress = (e) => {
            if(e.key === 'Enter') sendToFirebase();
        };

        // ПОЛУЧЕНИЕ СООБЩЕНИЙ В РЕАЛЬНОМ ВРЕМЕНИ
        chatRef.limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const isMy = data.user === currentUserName;
            
            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${isMy ? 'my' : 'other'}`;
            
            bubble.innerHTML = `
                ${!isMy ? `<span class="msg-user">${data.user}</span>` : ''}
                ${data.text}
                <div class="msg-time">${data.time}</div>
            `;
            
            const container = document.getElementById('msg-container');
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;

            // Обновляем превью в списке чатов
            document.getElementById('chat-preview').innerText = `${data.user}: ${data.text}`;
        });

    </script>
</body>
</html>
