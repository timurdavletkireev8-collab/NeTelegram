<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 id="auth-title" class="text-3xl font-bold tracking-tight">Создать аккаунт</h1>
            <p id="auth-subtitle" class="text-slate-400 mt-2">Мессенджер для нашего класса</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="nickname-group">
                <label class="block text-sm font-medium mb-1">Никнейм</label>
                <input type="text" id="reg-nickname" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Напр. tima">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Номер телефона</label>
                <input type="tel" id="reg-phone" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="+79000000000" required>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Пароль</label>
                <input type="password" id="reg-password" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="••••••••" required>
            </div>

            <div id="photo-group">
                <label class="block text-sm font-medium mb-1">Ссылка на фото профиля</label>
                <input type="url" id="reg-photo" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="https://image.com/myfoto.jpg">
            </div>

            <button type="submit" id="main-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-4 shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                Зарегистрироваться
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <span id="switch-text" class="text-slate-400">Уже есть аккаунт?</span>
            <button id="switch-auth" class="text-blue-400 ml-1 font-semibold hover:underline">Войти</button>
        </div>
    </div>

    <div id="main-app" class="hidden text-center">
        <h2 class="text-2xl font-light italic">Вы успешно вошли. Идет загрузка мессенджера...</h2>
        <p class="text-slate-500 mt-2">Черный фон — этап №1 завершен.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            storageBucket: "netelegram-d8c52.firebasestorage.app",
            messagingSenderId: "214817548440",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isLoginMode = false;

        const authForm = document.getElementById('auth-form');
        const switchAuthBtn = document.getElementById('switch-auth');
        const authTitle = document.getElementById('auth-title');
        const nicknameGroup = document.getElementById('nickname-group');
        const photoGroup = document.getElementById('photo-group');
        const mainBtn = document.getElementById('main-btn');

        // ПЕРЕКЛЮЧАТЕЛЬ ВХОД / РЕГИСТРАЦИЯ
        switchAuthBtn.onclick = () => {
            isLoginMode = !isLoginMode;
            authTitle.innerText = isLoginMode ? "С возвращением!" : "Создать аккаунт";
            nicknameGroup.classList.toggle('hidden');
            photoGroup.classList.toggle('hidden');
            mainBtn.innerText = isLoginMode ? "Войти" : "Зарегистрироваться";
            switchAuthBtn.innerText = isLoginMode ? "Зарегистрироваться" : "Войти";
            document.getElementById('switch-text').innerText = isLoginMode ? "Впервые тут?" : "Уже есть аккаунт?";
        };

        // ЛОГИКА АВТОРИЗАЦИИ
        authForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('reg-phone').value.trim();
            const pass = document.getElementById('reg-password').value.trim();
            const nickname = document.getElementById('reg-nickname').value.trim();
            const photo = document.getElementById('reg-photo').value.trim();

            const dbRef = ref(db);

            if (isLoginMode) {
                // ПРОВЕРКА ВХОДА
                try {
                    const snapshot = await get(child(dbRef, `users/${phone}`));
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        if (userData.password === pass) {
                            enterApp();
                        } else {
                            alert("Неверный пароль!");
                        }
                    } else {
                        alert("Пользователь не найден!");
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // РЕГИСТРАЦИЯ
                try {
                    await set(ref(db, 'users/' + phone), {
                        username: nickname,
                        password: pass,
                        photo: photo,
                        role: (phone === "+79225941382" ? "admin" : "user")
                    });
                    alert("Регистрация успешна!");
                    enterApp();
                } catch (error) {
                    alert("Ошибка регистрации!");
                }
            }
        };

        function enterApp() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.body.style.backgroundColor = "black";
        }
    </script>
</body>
</html>
