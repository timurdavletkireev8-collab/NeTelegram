<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram - Dev Mode</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --accent: #ff3b30; 
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --glass: rgba(26, 26, 26, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- ШАПКА --- */
        header { padding: 50px 20px 15px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .logo-mini { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); }

        /* --- КОНТЕНТ --- */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .tab-content { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: flex; }

        /* --- ЧАТ --- */
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; position: relative; font-size: 15px; line-height: 1.4; }
        .msg-in { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: #007aff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-author { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: var(--accent); }
        .msg-time { font-size: 10px; opacity: 0.5; display: block; text-align: right; margin-top: 4px; }
        .btn-del { position: absolute; top: -8px; right: -8px; background: var(--accent); border: none; border-radius: 50%; width: 22px; height: 22px; color: white; cursor: pointer; display: none; }
        .is-admin .btn-del { display: block; }

        /* ВВОД */
        .input-area { padding: 15px; background: var(--glass); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; gap: 10px; padding-bottom: 35px; }
        #msg-input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; }

        /* --- ТАББАР --- */
        .tabbar { background: var(--glass); border-top: 1px solid var(--border); display: flex; padding: 10px 0 30px; }
        .tab { flex: 1; text-align: center; color: var(--text-secondary); font-size: 11px; cursor: pointer; transition: 0.2s; }
        .tab.active { color: var(--accent); transform: translateY(-2px); }
        .tab-icon { font-size: 20px; margin-bottom: 4px; display: block; }

        /* --- ДНЕВНИК --- */
        .diary-frame { width: 100%; height: 100%; border: none; background: #fff; }

        /* --- АДМИНКА --- */
        .admin-page { padding: 20px; }
        .status-card { background: var(--surface); padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="is-admin">

    <header>
        <div class="header-brand">
            <div class="logo-mini"></div>
            <b id="header-title">NeTelegram <small style="opacity:0.5; font-weight:normal;">dev</small></b>
        </div>
        <div style="font-size:12px; background: rgba(255,59,48,0.2); color:var(--accent); padding:4px 10px; border-radius:10px;">Admin Mode</div>
    </header>

    <main>
        <div id="tab-chat" class="tab-content active">
            <div id="chat-messages"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button onclick="sendMessage()" style="background:var(--accent); border:none; width:40px; height:40px; border-radius:50%; color:white; font-size:18px; cursor:pointer;">↑</button>
            </div>
        </div>

        <div id="tab-diary" class="tab-content">
            <iframe src="https://school.mosreg.ru/" class="diary-frame"></iframe>
        </div>

        <div id="tab-admin" class="tab-content">
            <div class="admin-page">
                <h3>Управление приложением</h3>
                <p style="color:var(--text-secondary); margin-bottom:20px;">Регистрация отключена (режим отладки)</p>
                
                <div class="status-card">
                    <b>Статус системы:</b><br>
                    <small>Подключение к Firebase: OK</small><br>
                    <small>Режим: Тестовый (Без логина)</small>
                </div>
            </div>
        </div>
    </main>

    <nav class="tabbar">
        <div class="tab active" onclick="showTab('chat')"><span class="tab-icon">💬</span>Чат</div>
        <div class="tab" onclick="showTab('diary')"><span class="tab-icon">📔</span>Дневник</div>
        <div class="tab" onclick="showTab('admin')"><span class="tab-icon">⚙️</span>Админ</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // КОНФИГУРАЦИЯ FIREBASE (Замени на свои данные)
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            databaseURL: "https://ТВОЙ_PROJECT.firebaseio.com",
            projectId: "ТВОЙ_PROJECT",
            appId: "ТВОЙ_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ФЕЙКОВЫЙ ТЕСТОВЫЙ ПОЛЬЗОВАТЕЛЬ (Чтобы не логиниться)
        const currentUser = {
            name: "Админ (Тест)",
            phone: "+79001112233" // Твой номер
        };

        // НАВИГАЦИЯ
        window.showTab = (name) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // ЧАТ: ЗАГРУЗКА
        function loadMessages() {
            const chatBox = document.getElementById('chat-messages');
            onValue(ref(db, 'messages'), (snapshot) => {
                chatBox.innerHTML = '';
                snapshot.forEach((child) => {
                    const m = child.val();
                    const isMe = m.phone === currentUser.phone;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
                    msgDiv.innerHTML = `
                        ${!isMe ? `<span class="msg-author">${m.name}</span>` : ''}
                        <p>${m.text}</p>
                        <span class="msg-time">${m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...'}</span>
                        <button class="btn-del" onclick="deleteMessage('${child.key}')">×</button>
                    `;
                    chatBox.appendChild(msgDiv);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // ЧАТ: ОТПРАВКА
        window.sendMessage = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            push(ref(db, 'messages'), {
                name: currentUser.name,
                phone: currentUser.phone,
                text: input.value,
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        // УДАЛЕНИЕ (Для админа)
        window.deleteMessage = (id) => {
            if(confirm("Удалить сообщение?")) remove(ref(db, 'messages/' + id));
        };

        // Следим за нажатием Enter
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // ЗАПУСК
        loadMessages();
    </script>
</body>
</html>
