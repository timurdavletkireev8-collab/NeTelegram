<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeTelegram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); }

        .msg-bubble { 
            max-width: 80%; padding: 12px 16px; border-radius: 20px; 
            font-size: 15px; position: relative; transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .my-msg { background: linear-gradient(135deg, #2563eb, #1d4ed8); align-self: flex-end; border-bottom-right-radius: 4px; }
        .other-msg { background: #1c1c1e; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Стиль закрепленного сообщения */
        #pinned-msg-bar { 
            background: rgba(28, 28, 30, 0.95); 
            border-left: 3px solid #3b82f6; 
            display: none; 
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* Ответ на сообщение (Reply) */
        .reply-preview { border-left: 2px solid #3b82f6; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 4px; color: #aaa; }

        /* Аватар с иконкой редактирования */
        .avatar-container { position: relative; width: 128px; height: 128px; }
        .edit-overlay { 
            position: absolute; bottom: 0; right: 0; 
            background: #3b82f6; border: 4px solid #000; 
            border-radius: 50%; padding: 8px;
        }

        .tap-effect:active { transform: scale(0.96); opacity: 0.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col">

    <div id="main-app" class="flex flex-col h-full bg-[#0a0a0a]">
        
        <header id="main-header" class="glass px-6 py-4 pt-[calc(1rem+var(--sat))] flex justify-between items-center z-50">
            <h1 class="text-2xl font-extrabold tracking-tight">NeTelegram</h1>
            <div onclick="switchTab('profile')" class="relative tap-effect">
                <img id="header-avatar" class="w-10 h-10 rounded-full object-cover bg-zinc-800 border border-white/10" src="favicon.png">
            </div>
        </header>

        <div id="tab-chats" class="flex-1 overflow-y-auto">
            <div onclick="openChatRoom('chat_8a')" class="px-6 py-4 flex items-center gap-4 active:bg-white/5 transition-all tap-effect border-b border-white/5">
                <div class="w-14 h-14 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-2xl flex items-center justify-center shadow-lg font-black text-white text-xl">8А</div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold">Беседа 8А</span>
                        <span class="text-[10px] text-blue-500 font-extrabold uppercase bg-blue-500/10 px-2 py-0.5 rounded">Pin</span>
                    </div>
                    <p class="text-xs text-zinc-500 truncate">Нажми, чтобы войти в чат...</p>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="hidden flex-1 overflow-y-auto p-8 space-y-8">
            <div class="flex flex-col items-center">
                <div class="avatar-container">
                    <img id="p-avatar" class="w-full h-full rounded-[2.8rem] object-cover bg-zinc-900 border-2 border-white/10" src="favicon.png">
                    <label for="avatar-upload" class="edit-overlay cursor-pointer tap-effect">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"/></svg>
                        <input type="file" id="avatar-upload" class="hidden" accept="image/*" onchange="uploadPhoto(event)">
                    </label>
                </div>
                <h3 id="p-username" class="text-2xl font-extrabold mt-6">...</h3>
                <p id="p-phone" class="text-zinc-500 text-sm">...</p>
            </div>
            <div class="space-y-3">
                <button onclick="logout()" class="w-full p-5 text-red-500 font-bold bg-red-500/10 rounded-2xl tap-effect">Выйти из аккаунта</button>
            </div>
        </div>

        <nav class="nav-glass flex justify-around items-center px-10 py-3 pb-[calc(1rem+var(--sab))]">
            <button onclick="switchTab('chats')" class="p-2 text-blue-500 tap-effect"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
            <button onclick="switchTab('profile')" class="p-2 text-zinc-600 tap-effect"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></button>
        </nav>
    </div>

    <div id="chat-win" class="hidden fixed inset-0 z-[100] bg-black flex flex-col">
        <div id="pinned-msg-bar" class="px-4 py-2 flex items-center justify-between z-10">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-1 h-8 bg-blue-500 rounded-full"></div>
                <div class="overflow-hidden">
                    <p class="text-[10px] text-blue-500 font-black uppercase">Pinned Message</p>
                    <p id="pinned-text" class="text-xs text-zinc-400 truncate">...</p>
                </div>
            </div>
            <button onclick="unpinMessage()" class="p-2 text-zinc-500">✕</button>
        </div>

        <header class="glass px-4 py-4 pt-[calc(1rem+var(--sat))] flex items-center gap-4">
            <button onclick="closeChatRoom()" class="p-2 text-blue-500 tap-effect">←</button>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xs">8А</div>
                <h3 class="font-bold text-sm">Беседа 8А</h3>
            </div>
        </header>

        <div id="chat-flow" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4"></div>

        <div id="reply-bar" class="hidden px-4 py-2 bg-[#1c1c1e] flex items-center justify-between border-l-4 border-blue-500">
            <div class="overflow-hidden">
                <p id="reply-to-name" class="text-[10px] text-blue-500 font-bold uppercase"></p>
                <p id="reply-to-text" class="text-xs text-zinc-400 truncate"></p>
            </div>
            <button onclick="cancelReply()" class="text-zinc-500">✕</button>
        </div>

        <form id="chat-form" class="p-3 bg-black flex items-end gap-2 pb-[calc(1rem+var(--sab))]">
            <input type="text" id="m-input" class="flex-1 bg-zinc-900/50 p-4 rounded-2xl outline-none text-sm border border-white/5" placeholder="Сообщение..." autocomplete="off">
            <button type="submit" class="bg-blue-600 p-4 rounded-2xl tap-effect text-white">➤</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onChildAdded, onChildRemoved, onChildChanged, push, remove, update, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config (Из твоего файла)
        const conf = {
            apiKey: "AIzaSyDtbTs3c5EEU0AdWXDw4qxCmwDwBJVtMwY",
            authDomain: "netelegram-d8c52.firebaseapp.com",
            databaseURL: "https://netelegram-d8c52-default-rtdb.firebaseio.com",
            projectId: "netelegram-d8c52",
            appId: "1:214817548440:web:05e6113620f7ce7a9548ed"
        };
        const app = initializeApp(conf);
        const db = getDatabase(app);

        let user = JSON.parse(localStorage.getItem('user_data')) || { phone: "+79225941382", username: "Админ", role: "admin", photo: "" }; 
        let currentReply = null;
        let startX = 0;

        // Запуск интерфейса
        function initApp() {
            document.getElementById('header-avatar').src = user.photo || 'favicon.png';
            document.getElementById('p-avatar').src = user.photo || 'favicon.png';
            document.getElementById('p-username').innerText = user.username;
            document.getElementById('p-phone').innerText = user.phone;
            loadPinned();
        }
        initApp();

        // Пункт 2: Логика загрузки фото
        window.uploadPhoto = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result;
                // В реальности тут должна быть обрезка, для примера сохраняем в БД сразу
                await update(ref(db, `users/${user.phone}`), { photo: base64 });
                user.photo = base64;
                localStorage.setItem('user_data', JSON.stringify(user));
                initApp();
                Swal.fire({ title: 'Готово!', text: 'Фото профиля обновлено', icon: 'success', background: '#111', color: '#fff' });
            };
            reader.readAsDataURL(file);
        };

        // Пункт 3 и 4: Клик по сообщению и меню действий
        window.openMsgMenu = async (id, text, ownerPhone) => {
            const isAdmin = user.role === 'admin';
            const isMe = ownerPhone === user.phone;

            let actions = { 'copy': 'Копировать' };
            
            // Проверка прав (Пункт 5)
            if (isMe || isAdmin) {
                actions['edit'] = 'Изменить';
                actions['delete'] = 'Удалить';
                actions['pin'] = 'Закрепить'; // Пункт 7.1
            }

            const { value: action } = await Swal.fire({
                background: '#1c1c1e',
                color: '#fff',
                showConfirmButton: false,
                padding: '0',
                html: `
                    <div class="flex flex-col text-left">
                        <button onclick="Swal.clickConfirm(); handleAction('copy','${text}')" class="p-4 border-b border-white/5 w-full active:bg-white/10">Копировать</button>
                        ${actions.edit ? `<button onclick="Swal.clickConfirm(); handleAction('edit','${id}','${text}')" class="p-4 border-b border-white/5 w-full active:bg-white/10 text-blue-500">Изменить</button>` : ''}
                        ${actions.pin ? `<button onclick="Swal.clickConfirm(); handleAction('pin','${id}','${text}')" class="p-4 border-b border-white/5 w-full active:bg-white/10">Закрепить</button>` : ''}
                        ${actions.delete ? `<button onclick="Swal.clickConfirm(); handleAction('delete','${id}')" class="p-4 w-full active:bg-white/10 text-red-500">Удалить для всех</button>` : ''}
                    </div>
                `
            });
        };

        window.handleAction = async (type, id, extra) => {
            if (type === 'copy') navigator.clipboard.writeText(id);
            if (type === 'delete') await remove(ref(db, `messages/chat_8a/${id}`));
            if (type === 'edit') {
                const { value: newText } = await Swal.fire({ 
                    title: 'Редактировать', 
                    input: 'text', 
                    inputValue: extra, 
                    background: '#111', 
                    color: '#fff' 
                });
                if (newText) await update(ref(db, `messages/chat_8a/${id}`), { text: newText });
            }
            if (type === 'pin') {
                await set(ref(db, `chat_8a/pinned`), { id, text: extra });
                loadPinned();
            }
        };

        // Пункт 6: Свайп влево для ответа
        window.handleSwipe = (e, name, text) => {
            const touch = e.changedTouches[0];
            const moveX = touch.clientX - startX;
            if (moveX < -50) { // Если свайпнули влево больше чем на 50px
                currentReply = { name, text };
                document.getElementById('reply-bar').classList.remove('hidden');
                document.getElementById('reply-to-name').innerText = name;
                document.getElementById('reply-to-text').innerText = text;
                document.getElementById('m-input').focus();
            }
        };

        // Чат и Рендеринг
        let chatRef = null;
        window.openChatRoom = (room) => {
            document.getElementById('chat-win').classList.remove('hidden');
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = "";
            chatRef = ref(db, `messages/${room}`);
            onChildAdded(chatRef, (s) => renderMessage(s.key, s.val()));
            onChildRemoved(chatRef, (s) => document.getElementById(s.key)?.remove());
            onChildChanged(chatRef, (s) => {
                const msg = document.getElementById(s.key);
                if (msg) msg.querySelector('.m-body').innerText = s.val().text;
            });
        };

        function renderMessage(id, m) {
            const isMe = m.phone === user.phone;
            const html = `
                <div id="${id}" class="flex flex-col ${isMe ? 'items-end' : 'items-start'}" 
                     touchstart="startX = event.touches[0].clientX" 
                     touchend="handleSwipe(event, '${m.name}', '${m.text}')">
                    <div class="msg-bubble ${isMe ? 'my-msg' : 'other-msg'} tap-effect" 
                         onclick="openMsgMenu('${id}', '${m.text}', '${m.phone}')">
                        ${m.reply ? `<div class="reply-preview"><b>${m.reply.name}</b><br>${m.reply.text}</div>` : ''}
                        ${!isMe ? `<span class="text-[10px] font-black text-blue-400 block mb-1 uppercase">${m.name}</span>` : ''}
                        <span class="m-body">${m.text}</span>
                        <span class="text-[9px] opacity-40 block text-right mt-1 font-bold">${m.time}</span>
                    </div>
                </div>
            `;
            const flow = document.getElementById('chat-flow');
            flow.insertAdjacentHTML('beforeend', html);
            flow.scrollTo(0, flow.scrollHeight);
        }

        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('m-input');
            if (!input.value.trim()) return;

            push(ref(db, `messages/chat_8a`), {
                phone: user.phone,
                name: user.username,
                text: input.value,
                reply: currentReply,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            input.value = "";
            cancelReply();
        };

        // Вспомогательные функции
        window.cancelReply = () => {
            currentReply = null;
            document.getElementById('reply-bar').classList.add('hidden');
        };

        window.loadPinned = () => {
            get(ref(db, `chat_8a/pinned`)).then(s => {
                if (s.exists()) {
                    document.getElementById('pinned-msg-bar').style.display = 'flex';
                    document.getElementById('pinned-text').innerText = s.val().text;
                } else {
                    document.getElementById('pinned-msg-bar').style.display = 'none';
                }
            });
        };

        window.unpinMessage = async () => {
            if (user.role !== 'admin') return;
            await remove(ref(db, `chat_8a/pinned`));
            loadPinned();
        };

        window.switchTab = (tab) => {
            document.getElementById('tab-chats').classList.toggle('hidden', tab !== 'chats');
            document.getElementById('tab-profile').classList.toggle('hidden', tab !== 'profile');
            document.getElementById('main-header').classList.toggle('hidden', tab === 'profile');
        };

        window.closeChatRoom = () => { document.getElementById('chat-win').classList.add('hidden'); off(chatRef); };
        window.logout = () => { localStorage.clear(); location.reload(); };

    </script>
</body>
</html>
